<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Gallery — VoidWall</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #ffffff;
      height: 100vh;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }
    canvas#bg { position: fixed; inset: 0; z-index: 0; display: block; }
    #back {
      position: fixed; top: 22px; left: 22px; z-index: 100;
      font-size: 11px; color: rgba(0,0,0,0.28); letter-spacing: 0.08em;
      text-decoration: none; transition: color 0.2s;
    }
    #back:hover { color: rgba(0,0,0,0.65); }

    /* ── Попап ── */
    #popup {
      position: fixed; inset: 0; z-index: 200;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255,255,255,0.55);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      opacity: 0; pointer-events: none;
      transition: opacity 0.35s ease;
    }
    #popup.open { opacity: 1; pointer-events: all; }

    #popup-card {
      position: relative;
      width: min(480px, 90vw);
      background: #fff;
      border: 1px solid rgba(28,24,20,0.10);
      padding: 36px 36px 30px;
      display: flex; flex-direction: column; gap: 14px;
    }
    #popup-img {
      width: 100%; aspect-ratio: 3/4;
      object-fit: cover;
      display: block;
      filter: grayscale(8%);
    }
    #popup-title {
      font-size: 13px; font-weight: 300;
      letter-spacing: 0.16em; text-transform: uppercase;
      color: rgba(28,24,20,0.85);
    }
    #popup-meta {
      font-size: 10px; letter-spacing: 0.12em;
      color: rgba(28,24,20,0.35); text-transform: uppercase;
    }
    #popup-sale {
      font-size: 10px; font-weight: 300;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: rgb(110,18,18);
    }
    #popup-close {
      position: absolute; top: 14px; right: 18px;
      background: rgba(255,255,255,0.85); border: none; cursor: pointer;
      font-size: 18px; color: rgba(28,24,20,0.50);
      line-height: 1; transition: color 0.2s;
      z-index: 1; border-radius: 50%;
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
    }
    #popup-close:hover { color: rgba(28,24,20,0.75); }

    /* ── Плашка текущей работы ── */
    #info-panel {
      position: fixed;
      bottom: 56px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 50;
      background: none;
      padding: 16px 48px 14px;
      text-align: center;
      pointer-events: none;
      white-space: nowrap;
      transition: opacity 0.3s ease;
    }
    #info-title {
      font-size: 22px; font-weight: 300;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: rgba(28,24,20,1.0);
    }
    #info-sale {
      font-size: 14px; font-weight: 300;
      letter-spacing: 0.24em; text-transform: uppercase;
      color: rgb(110,18,18);
      margin-top: 9px;
    }

    @media (max-width: 480px) {
      #popup-card { padding: 24px 20px 20px; gap: 10px; }
      #popup-title { font-size: 11px; }
    }
  </style>
</head>
<body>

<canvas id="bg"></canvas>
<a id="back" href="../collections">← back</a>

<div id="info-panel">
  <div id="info-title"></div>
  <div id="info-sale">on sale</div>
</div>

<div id="popup">
  <div id="popup-card">
    <button id="popup-close">×</button>
    <img id="popup-img" src="" alt="" />
    <div id="popup-title"></div>
    <div id="popup-meta"></div>
    <div id="popup-sale">on sale</div>
  </div>
</div>

<script src="../js/i18n.js?v=2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const isMobile = /Android|iPhone|iPad|iPod|webOS/i.test(navigator.userAgent) || innerWidth < 768;
I18N.addToggle('light');
document.getElementById('back').textContent = '← ' + I18N.t('back');
window.addEventListener('langchange', () => {
  document.getElementById('back').textContent = '← ' + I18N.t('back');
});

// ─── Сцена ───────────────────────────────────────────────────────────
const canvas   = document.getElementById('bg');
const scene    = new THREE.Scene();
const camera   = new THREE.PerspectiveCamera(58, innerWidth / innerHeight, 0.1, 200);
camera.position.set(0, 2, 14);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ canvas, antialias: !isMobile, powerPreference: 'high-performance' });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setClearColor(0xffffff, 1);

// ─── Объёмная решётка ────────────────────────────────────────────────
const X1=-22, X2=22, DX=3;
const Y1=-10, Y2=10, DY=2.5;
const Z1=-35, Z2= 4, DZ=3;

const xs=[], ys=[], zs=[];
for (let x=X1; x<=X2; x+=DX) xs.push(x);
for (let y=Y1; y<=Y2; y+=DY) ys.push(y);
for (let z=Z1; z<=Z2; z+=DZ) zs.push(z);

const pts = [];
for (const y of ys) for (const z of zs) pts.push(X1,y,z, X2,y,z);
for (const x of xs) for (const z of zs) pts.push(x,Y1,z, x,Y2,z);
for (const x of xs) for (const y of ys) pts.push(x,y,Z1, x,y,Z2);

const gridGeo = new THREE.BufferGeometry();
gridGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(pts), 3));
scene.add(new THREE.LineSegments(gridGeo, new THREE.LineBasicMaterial({
  color: 0x1c1814, transparent: true, opacity: 0.05,
})));

// ─── Заглушки на линиях сетки ────────────────────────────────────────
// Позиции привязаны к узлам сетки (DX=3, DY=2.5, DZ=3)
const WORKS = [
  { w: 2.4, h: 3.4, src: '../assets/images/trees-and-glass.jpg', title: 'Trees and Glass',  meta: 'Pencil on paper · 2026' },
  { w: 2.4, h: 3.4, src: '../assets/images/downtown.jpg',        title: 'Downtown',         meta: 'Pencil on paper · 2026' },
  { w: 2.4, h: 3.4, src: '../assets/images/rooftop-view.jpg',    title: 'Rooftop View',     meta: 'Pencil on paper · 2026' },
  { w: 2.4, h: 3.4, src: '../assets/images/the-shop.jpg',        title: 'The Shop',         meta: 'Pencil on paper · 2026' },
  { w: 2.4, h: 3.4, src: '../assets/images/banyan-street.jpg',   title: 'Banyan Street',    meta: 'Pencil on paper · 2026' },
  { w: 2.4, h: 3.4, src: '../assets/images/tower-riverside.jpg', title: 'Tower Riverside',  meta: 'Pencil on paper · 2026' },
  { w: 2.4, h: 3.4, src: '../assets/images/cafe-window.jpg',     title: 'Cafe Window',      meta: 'Pencil on paper · 2026' },
  { w: 2.4, h: 3.4, src: '../assets/images/mahanakhon.jpg',      title: 'MahaNakhon',       meta: 'Pencil on paper · 2026' },
  { w: 2.4, h: 3.4, src: '../assets/images/temple.jpg',          title: 'Temple',           meta: 'Pencil on paper · 2026', owner: 'Anfisa Lapteva' },
];
const N = WORKS.length;
const R_CAROUSEL = 3.8; // радиус невидимого горизонтального круга
const Z_CAROUSEL = -2.0; // смещение карусели (отрицательное — дальше от камеры)

const texLoader = new THREE.TextureLoader();
const frameMat = new THREE.LineBasicMaterial({ color: 0x1c1814, transparent: true, opacity: 0.22 });

const workMeshes  = [];
const frameMeshes = [];

WORKS.forEach((work, i) => {
  const { w, h, src } = work;
  const a0 = (2 * Math.PI * i) / N;

  const mat = new THREE.MeshBasicMaterial({ side: THREE.DoubleSide });
  const mesh = new THREE.Mesh(new THREE.PlaneGeometry(w, h), mat);
  mesh.position.set(R_CAROUSEL * Math.sin(a0), 0.7, R_CAROUSEL * Math.cos(a0) - R_CAROUSEL + Z_CAROUSEL);
  mesh.rotation.y = -a0;
  mesh.userData.workIndex = i;
  scene.add(mesh);
  workMeshes.push(mesh);
  texLoader.load(src, tex => { mat.map = tex; mat.needsUpdate = true; });

  const fp = 0.05;
  const frameGeo = new THREE.BufferGeometry();
  frameGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array([
    -w/2 - fp, -h/2 - fp, 0,
     w/2 + fp, -h/2 - fp, 0,
     w/2 + fp,  h/2 + fp, 0,
    -w/2 - fp,  h/2 + fp, 0,
  ]), 3));
  const frame = new THREE.LineLoop(frameGeo, frameMat);
  frame.position.copy(mesh.position);
  frame.rotation.y = mesh.rotation.y;
  scene.add(frame);
  frameMeshes.push(frame);
});

// ─── Попап ───────────────────────────────────────────────────────────
const popup     = document.getElementById('popup');
const popupImg  = document.getElementById('popup-img');
const popupTitle= document.getElementById('popup-title');
const popupMeta = document.getElementById('popup-meta');

function openPopup(work) {
  popupImg.src     = work.src;
  popupImg.alt     = work.title;
  popupTitle.textContent = work.title;
  popupMeta.textContent  = work.meta;
  document.getElementById('popup-sale').textContent = work.owner ? work.owner : 'on sale';
  popup.classList.add('open');
}
function closePopup() { popup.classList.remove('open'); }

document.getElementById('popup-close').addEventListener('click', closePopup);
popup.addEventListener('click', e => { if (e.target === popup) closePopup(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closePopup(); });

// Рейкастер для кликов по работам
const raycaster = new THREE.Raycaster();
const _mouse2d  = new THREE.Vector2();

function onCanvasClick(cx, cy) {
  if (popup.classList.contains('open')) return;
  _mouse2d.set((cx / innerWidth) * 2 - 1, -(cy / innerHeight) * 2 + 1);
  raycaster.setFromCamera(_mouse2d, camera);
  const hit = raycaster.intersectObjects(workMeshes)[0];
  if (hit) openPopup(WORKS[hit.object.userData.workIndex]);
}

window.addEventListener('click', e => onCanvasClick(e.clientX, e.clientY));


// Тач
let _touchStart = null;
window.addEventListener('touchstart', e => {
  _touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
}, { passive: true });
window.addEventListener('touchend', e => {
  if (!_touchStart) return;
  const dx = e.changedTouches[0].clientX - _touchStart.x;
  const dy = e.changedTouches[0].clientY - _touchStart.y;
  if (Math.abs(dx) < 10 && Math.abs(dy) < 10)
    onCanvasClick(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
  _touchStart = null;
}, { passive: true });


// ─── Объёмный город ──────────────────────────────────────────────────
(function () {
  const GND = -10;
  let s = 31337;
  const rng = () => { s = Math.imul(s, 1664525) + 1013904223 | 0; return (s >>> 0) / 0xffffffff; };

  // Буферы с вершинными цветами
  const fPos = [], fCol = [];
  const lPos = [], lCol = [];
  const rPos = [], rCol = [];

  function pushFace(pts, shade) {
    for (let i = 0; i < pts.length; i += 3) {
      fPos.push(pts[i], pts[i+1], pts[i+2]);
      fCol.push(shade, shade, shade);
    }
  }
  function pushLines(pts, shade) {
    for (let i = 0; i < pts.length; i += 3) {
      lPos.push(pts[i], pts[i+1], pts[i+2]);
      lCol.push(shade, shade, shade);
    }
  }
  function pushRoad(x1, x2, z1, z2, shade) {
    const y = GND + 0.02;
    const pts = [x1,y,z2, x2,y,z2, x2,y,z1,  x1,y,z2, x2,y,z1, x1,y,z1];
    for (let i = 0; i < pts.length; i += 3) {
      rPos.push(pts[i], pts[i+1], pts[i+2]);
      rCol.push(shade, shade, shade);
    }
  }

  function addBox(x1, x2, y1, y2, z1, z2, faceShade, lineShade) {
    // Грани
    pushFace([
      x1,y1,z2, x2,y1,z2, x2,y2,z2,  x1,y1,z2, x2,y2,z2, x1,y2,z2, // front
      x2,y1,z1, x1,y1,z1, x1,y2,z1,  x2,y1,z1, x1,y2,z1, x2,y2,z1, // back
      x1,y1,z1, x1,y1,z2, x1,y2,z2,  x1,y1,z1, x1,y2,z2, x1,y2,z1, // left
      x2,y1,z2, x2,y1,z1, x2,y2,z1,  x2,y1,z2, x2,y2,z1, x2,y2,z2, // right
      x1,y2,z2, x2,y2,z2, x2,y2,z1,  x1,y2,z2, x2,y2,z1, x1,y2,z1, // top
    ], faceShade);
    // Рёбра
    pushLines([
      x1,y1,z2,x2,y1,z2, x2,y1,z2,x2,y2,z2, x2,y2,z2,x1,y2,z2, x1,y2,z2,x1,y1,z2,
      x1,y1,z1,x2,y1,z1, x2,y1,z1,x2,y2,z1, x2,y2,z1,x1,y2,z1, x1,y2,z1,x1,y1,z1,
      x1,y1,z2,x1,y1,z1, x2,y1,z2,x2,y1,z1, x1,y2,z2,x1,y2,z1, x2,y2,z2,x2,y2,z1,
    ], lineShade);
    // Горизонтали этажей
    const fl = Math.floor((y2-y1)/0.85);
    for (let f=1; f<fl; f++) {
      const fy = y1+(y2-y1)*f/fl;
      pushLines([x1,fy,z2, x2,fy,z2], lineShade * 0.6);
    }
  }

  // Ряды кварталов (zFront — ближняя стена, zBack — дальняя)
  const blockRows = isMobile ? [
    { zFront:  -0.5, zBack:  -3.2 },
    { zFront:  -5.0, zBack:  -8.0 },
    { zFront: -10.5, zBack: -13.5 },
    { zFront: -16.0, zBack: -19.0 },
  ] : [
    { zFront: -0.5, zBack: -3.2 },
    { zFront: -5.0, zBack: -8.0 },
    { zFront:-10.5, zBack:-13.5 },
    { zFront:-16.0, zBack:-19.0 },
  ];

  // Продольные улицы (между рядами) — только между существующими
  for (let r = 1; r < blockRows.length; r++) {
    const shade = 0.055 - (r - 1) * 0.01;
    pushRoad(-24, 24, blockRows[r].zFront, blockRows[r - 1].zBack, shade);
  }

  for (const row of blockRows) {
    const zF = row.zFront, zB = row.zBack, depth = zF - zB;
    let x = -24;
    while (x < 24) {
      // Поперечная улица перед кварталом
      const sw = 0.7 + rng() * 0.8;
      const roadShade = 0.04 + rng() * 0.04;
      pushRoad(x, x + sw, zB - 0.2, zF + 0.2, roadShade);
      x += sw;

      // Квартал — несколько зданий вплотную
      const blockW = 3.0 + rng() * 4.5;
      let bx = x;
      const blockEnd = Math.min(x + blockW, 24);

      while (bx + 0.6 < blockEnd) {
        const w  = 0.6 + rng() * 1.8;
        const h  = 1.2 + rng() * 6.2;
        const d  = depth * (0.7 + rng() * 0.3);
        const bz1 = zF - d, bz2 = zF;

        // Уникальный оттенок у каждого здания
        const fShade = 0.06 + rng() * 0.20;
        const lShade = fShade + 0.08 + rng() * 0.10;

        if (bx + w <= blockEnd)
          addBox(bx, bx+w, GND, GND+h, bz1, bz2, fShade, lShade);

        // Переулок между зданиями
        const gap = 0.08 + rng() * 0.18;
        pushRoad(bx+w, bx+w+gap, bz1-0.1, bz2+0.1, 0.03 + rng()*0.03);
        bx += w + gap;
      }
      x = blockEnd;
    }
  }

  function makeColorGeo(pos, col) {
    const g = new THREE.BufferGeometry();
    g.setAttribute('position', new THREE.BufferAttribute(new Float32Array(pos), 3));
    g.setAttribute('color',    new THREE.BufferAttribute(new Float32Array(col), 3));
    return g;
  }

  scene.add(new THREE.Mesh(makeColorGeo(fPos, fCol), new THREE.MeshBasicMaterial({
    vertexColors: true, transparent: true, opacity: 0.18,
    side: THREE.DoubleSide, depthWrite: false,
  })));
  scene.add(new THREE.LineSegments(makeColorGeo(lPos, lCol), new THREE.LineBasicMaterial({
    vertexColors: true, transparent: true, opacity: 0.22,
  })));
  scene.add(new THREE.Mesh(makeColorGeo(rPos, rCol), new THREE.MeshBasicMaterial({
    vertexColors: true, transparent: true, opacity: 0.22,
    side: THREE.DoubleSide, depthWrite: false,
  })));
})();

// ─── Дорожные частицы ────────────────────────────────────────────────
// Продольные улицы между рядами кварталов
const ROAD_ZS = [
  (-3.2 + -5.0)   / 2,   // -4.10
  (-8.0 + -10.5)  / 2,   // -9.25
  (-13.5 + -16.0) / 2,   // -14.75
];
const CAR_COUNT = isMobile ? 45 : 90;
const carGeo = new THREE.PlaneGeometry(0.55, 0.25);
const carMat = new THREE.MeshBasicMaterial({
  color: 0x1c1814, transparent: true, opacity: 0.45,
  side: THREE.DoubleSide, depthWrite: false,
});
const cars = new THREE.InstancedMesh(carGeo, carMat, CAR_COUNT);
scene.add(cars);

const carData = [];
const _dummy = new THREE.Object3D();
_dummy.rotation.x = -Math.PI / 2; // константа — горизонтальные прямоугольники
for (let i = 0; i < CAR_COUNT; i++) {
  const rz = ROAD_ZS[i % ROAD_ZS.length];
  const dir = (Math.random() < 0.5) ? 1 : -1;
  carData.push({
    x: (Math.random() - 0.5) * 48,
    y: -10 + 0.12,
    z: rz + (Math.random() - 0.5) * 0.35,
    vx: dir * (0.04 + Math.random() * 0.05),
  });
}

function updateCars() {
  for (let i = 0; i < CAR_COUNT; i++) {
    const d = carData[i];
    d.x += d.vx;
    if (d.x >  24.5) d.x = -24.5;
    if (d.x < -24.5) d.x =  24.5;
    _dummy.position.set(d.x, d.y, d.z);
    _dummy.updateMatrix();
    cars.setMatrixAt(i, _dummy.matrix);
  }
  cars.instanceMatrix.needsUpdate = true;
}
updateCars();

// ─── Надпись коллекции ───────────────────────────────────────────────
let titleMesh;
(function () {
  const W = 1024, H = 200;
  const c = document.createElement('canvas');
  c.width = W; c.height = H;
  const ctx = c.getContext('2d');

  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // Объёмные слои — смещённые копии для ощущения глубины
  ctx.font = '100 48px "Segoe UI", sans-serif';
  if ('letterSpacing' in ctx) ctx.letterSpacing = '0.22em';
  for (let i = 5; i >= 1; i--) {
    ctx.fillStyle = `rgba(28,24,20,${0.025 * i})`;
    ctx.fillText('BANGKOK GRAPHITE', W / 2 + i * 1.4, H / 2 - 18 + i * 1.4);
  }
  // Основной слой
  ctx.fillStyle = 'rgba(28,24,20,0.50)';
  ctx.fillText('BANGKOK GRAPHITE', W / 2, H / 2 - 18);

  // Подпись
  ctx.font = '300 18px "Segoe UI", sans-serif';
  if ('letterSpacing' in ctx) ctx.letterSpacing = '0.30em';
  ctx.fillStyle = 'rgba(28,24,20,0.28)';
  ctx.fillText('march 2026', W / 2, H / 2 + 36);

  const tex = new THREE.CanvasTexture(c);
  const ph = 2.0, pw = ph * (W / H);
  titleMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(pw, ph),
    new THREE.MeshBasicMaterial({ map: tex, transparent: true, depthWrite: false, side: THREE.DoubleSide })
  );
  titleMesh.position.set(0, 7.5, -16);
  scene.add(titleMesh);
})();

// ─── Звук города ─────────────────────────────────────────────────────
(function () {
  let started = false;

  function startAudio() {
    if (started) return;
    started = true;

    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return;
    const ctx = new AC();
    const rate = ctx.sampleRate;
    const len  = rate * 3; // 3-секундный буфер с петлёй

    // Коричневый шум — низкочастотный гул трафика
    const bufBrown = ctx.createBuffer(1, len, rate);
    const dBrown   = bufBrown.getChannelData(0);
    let b = 0;
    for (let i = 0; i < len; i++) {
      b = (b + 0.02 * (Math.random() * 2 - 1)) / 1.02;
      dBrown[i] = b * 3.2;
    }

    // Розовый шум — средний гул улицы
    const bufPink = ctx.createBuffer(1, len, rate);
    const dPink   = bufPink.getChannelData(0);
    let p0=0,p1=0,p2=0,p3=0,p4=0,p5=0,p6=0;
    for (let i = 0; i < len; i++) {
      const w = Math.random() * 2 - 1;
      p0=0.99886*p0+w*0.0555179; p1=0.99332*p1+w*0.0750759;
      p2=0.96900*p2+w*0.1538520; p3=0.86650*p3+w*0.3104856;
      p4=0.55000*p4+w*0.5329522; p5=-0.7616*p5-w*0.0168980;
      dPink[i] = (p0+p1+p2+p3+p4+p5+p6+w*0.5362) * 0.11;
      p6 = w * 0.115926;
    }

    function makeLoop(buf, lpFreq, gain) {
      const src = ctx.createBufferSource();
      src.buffer = buf; src.loop = true;
      const lp = ctx.createBiquadFilter();
      lp.type = 'lowpass'; lp.frequency.value = lpFreq; lp.Q.value = 0.4;
      const g = ctx.createGain();
      g.gain.setValueAtTime(0, ctx.currentTime);
      g.gain.linearRampToValueAtTime(gain, ctx.currentTime + 3.5); // плавный вход
      src.connect(lp); lp.connect(g); g.connect(ctx.destination);
      src.start();
    }

    makeLoop(bufBrown, 320, 0.055); // трафик
    makeLoop(bufPink,  900, 0.028); // общий гул
  }

  window.addEventListener('wheel',      startAudio, { once: true, passive: true });
  window.addEventListener('click',      startAudio, { once: true });
  window.addEventListener('touchstart', startAudio, { once: true, passive: true });
})();

// ─── Камера + мышь + стопка ──────────────────────────────────────────
const mouse  = new THREE.Vector2();
const target = new THREE.Vector2();

// Текущий индекс активной работы (float для плавности)
let stackT = 0, stackTTarget = 0;

window.addEventListener('mousemove', e => {
  target.x =  (e.clientX / innerWidth  - 0.5) * 2;
  target.y = -(e.clientY / innerHeight - 0.5) * 2;
  if (popup.classList.contains('open')) return;
  _mouse2d.set((e.clientX / innerWidth) * 2 - 1, -(e.clientY / innerHeight) * 2 + 1);
  raycaster.setFromCamera(_mouse2d, camera);
  document.body.style.cursor = raycaster.intersectObjects(workMeshes)[0] ? 'pointer' : 'default';
});

window.addEventListener('wheel', e => {
  stackTTarget += e.deltaY * 0.005;
}, { passive: true });

// Свайп вверх — следующая работа, вниз — предыдущая
let _touchScrollY = null;
window.addEventListener('touchmove', e => {
  if (popup.classList.contains('open')) return;
  if (_touchScrollY === null) { _touchScrollY = e.touches[0].clientY; return; }
  const dy = _touchScrollY - e.touches[0].clientY;
  stackTTarget += dy * 0.01;
  _touchScrollY = e.touches[0].clientY;
}, { passive: true });
window.addEventListener('touchend', () => { _touchScrollY = null; }, { passive: true });

// Гироскоп для параллакса на мобильном
if (isMobile && window.DeviceOrientationEvent) {
  let gyroBase = null;
  const onGyro = e => {
    const a = e.gamma || 0, b = e.beta || 0;
    if (!gyroBase) gyroBase = { a, b };
    target.x = Math.max(-1, Math.min(1, -(a - gyroBase.a) / 25));
    target.y = Math.max(-1, Math.min(1, -(b - gyroBase.b) / 35));
  };
  if (typeof DeviceOrientationEvent.requestPermission === 'function') {
    const btn = document.createElement('button');
    btn.textContent = I18N.t('gyro_enable');
    btn.style.cssText = 'position:fixed;bottom:22px;right:22px;z-index:300;padding:10px 18px;border-radius:22px;background:#1a1a1a;color:#fff;border:none;font-size:11px;font-family:inherit;letter-spacing:0.08em;cursor:pointer;';
    document.body.appendChild(btn);
    btn.addEventListener('click', async () => {
      try { if ((await DeviceOrientationEvent.requestPermission()) === 'granted') window.addEventListener('deviceorientation', onGyro, { passive: true }); } catch {}
      btn.remove();
    });
  } else {
    window.addEventListener('deviceorientation', onGyro, { passive: true });
  }
}

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

const infoTitle = document.getElementById('info-title');
const infoSale  = document.getElementById('info-sale');
let _lastFrontIdx = -1;

const clock = new THREE.Clock();
(function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  mouse.x += (target.x - mouse.x) * 0.025;
  mouse.y += (target.y - mouse.y) * 0.025;

  // Вращение карусели
  stackT += (stackTTarget - stackT) * 0.08;
  const frontIdx = ((Math.round(stackT) % N) + N) % N;
  if (frontIdx !== _lastFrontIdx) {
    _lastFrontIdx = frontIdx;
    const w = WORKS[frontIdx];
    infoTitle.textContent = w.title;
    infoSale.textContent  = w.owner ? w.owner : 'on sale';
  }
  const carouselAngle = stackT * (2 * Math.PI / N);

  workMeshes.forEach((mesh, i) => {
    const a = (2 * Math.PI * i / N) - carouselAngle;
    const tx  = R_CAROUSEL * Math.sin(a);
    const tz  = R_CAROUSEL * Math.cos(a) - R_CAROUSEL + Z_CAROUSEL;
    const tRy = -a;
    // Выброс вперёд для ближайшей к камере работы
    const frontness = Math.cos(a); // 1 = спереди, -1 = сзади
    const popZ = Math.max(0, frontness - 0.5) * 10;
    const k = 0.1;
    mesh.position.x += (tx       - mesh.position.x) * k;
    mesh.position.y += (0.7      - mesh.position.y) * k;
    mesh.position.z += (tz + popZ - mesh.position.z) * k;
    mesh.rotation.y += (tRy      - mesh.rotation.y) * k;
    frameMeshes[i].position.copy(mesh.position);
    frameMeshes[i].rotation.y = mesh.rotation.y;
  });

  camera.position.x = mouse.x * 2.38;
  camera.position.y = 2 + mouse.y * 1.32;
  camera.position.z = 9 + Math.sin(t * 0.07) * 0.4;
  camera.lookAt(0, 0, 0);

  titleMesh.position.y = 7.5 + Math.sin(t * 0.28 + 1.1) * 0.18;
  titleMesh.position.x =       Math.sin(t * 0.17 + 0.4) * 0.08;
  updateCars();
  renderer.render(scene, camera);
})();
</script>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Play — VoidWall</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      overflow: hidden;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      font-family: 'Segoe UI', sans-serif;
    }
    canvas { display: block; }

    #back {
      position: fixed;
      top: 22px; left: 22px; z-index: 10;
      font-size: 11px;
      color: rgba(255,255,255,0.28);
      letter-spacing: 0.10em;
      text-decoration: none;
      transition: color 0.2s;
    }
    #back:hover { color: rgba(255,255,255,0.75); }

    #score-el {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-weight: 100;
      font-size: clamp(80px, 22vw, 160px);
      color: rgba(255,255,255,0.055);
      pointer-events: none;
      z-index: 5;
      letter-spacing: -0.04em;
      transition: color 0.08s;
    }

    #hi-el {
      position: fixed;
      bottom: 28px; left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.16);
      pointer-events: none;
      z-index: 5;
    }

    #hint-el {
      position: fixed;
      bottom: 72px; left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      letter-spacing: 0.20em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.25);
      pointer-events: none;
      z-index: 5;
      white-space: nowrap;
      transition: opacity 1.2s;
    }
    #hint-el.gone { opacity: 0; }
  </style>
</head>
<body>

<a id="back" href="../">← back</a>
<div id="score-el">0</div>
<div id="hi-el">best  0</div>
<div id="hint-el">hold to create void</div>

<canvas id="c"></canvas>

<script src="../js/i18n.js?v=4"></script>
<script>
// i18n для кнопки назад
(function () {
  const el = document.getElementById('back');
  el.textContent = I18N.t('back');
  window.addEventListener('langchange', () => { el.textContent = I18N.t('back'); });
})();
I18N.addToggle('dark');

const canvas  = document.getElementById('c');
const ctx     = canvas.getContext('2d');
const scoreEl = document.getElementById('score-el');
const hiEl    = document.getElementById('hi-el');
const hintEl  = document.getElementById('hint-el');

let W, H;
function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ── Счёт ──
let score = 0;
let hi    = parseInt(localStorage.getItem('vw_void_hs') || '0');
hiEl.textContent = `best  ${hi}`;

// ── Текстура частицы ──
const GTEX = 64;
const glowC = document.createElement('canvas');
glowC.width = glowC.height = GTEX;
const gc = glowC.getContext('2d');
const gg = gc.createRadialGradient(32, 32, 0, 32, 32, 32);
gg.addColorStop(0,    'rgba(255,255,255,1)');
gg.addColorStop(0.22, 'rgba(220,225,255,0.88)');
gg.addColorStop(0.55, 'rgba(190,200,255,0.30)');
gg.addColorStop(1,    'rgba(170,185,255,0)');
gc.fillStyle = gg;
gc.fillRect(0, 0, GTEX, GTEX);

// ── Частицы ──
const N = 160;
const parts = [];

function mkPart(edge) {
  let x, y;
  if (edge) {
    const s = Math.floor(Math.random() * 4);
    if      (s === 0) { x = Math.random() * W; y = -18; }
    else if (s === 1) { x = W + 18;            y = Math.random() * H; }
    else if (s === 2) { x = Math.random() * W; y = H + 18; }
    else              { x = -18;               y = Math.random() * H; }
  } else {
    x = Math.random() * W;
    y = Math.random() * H;
  }
  const sp = 0.10 + Math.random() * 0.28;
  const a  = Math.random() * Math.PI * 2;
  return {
    x, y,
    vx: Math.cos(a) * sp,
    vy: Math.sin(a) * sp,
    r:  1.1 + Math.random() * 2.4,    // радиус для отрисовки
    br: 0.30 + Math.random() * 0.70,  // яркость
    dead: false,
    rt: 0,                             // таймер респауна
  };
}
for (let i = 0; i < N; i++) parts.push(mkPart(false));

// ── Воронка ──
const well = { on: false, x: 0, y: 0, rad: 0 };

// ── Эффекты ──
const bursts = [];  // { x, y, r, op }
const rings  = [];  // { x, y, r, target, op }

let hintGone = false;

function pointerDown(x, y) {
  well.on  = true;
  well.x   = x;
  well.y   = y;
  well.rad = 22;
  if (!hintGone) { hintGone = true; hintEl.classList.add('gone'); }
}
function pointerMove(x, y) {
  if (!well.on) return;
  well.x = x;
  well.y = y;
}
function pointerUp() {
  if (!well.on) return;
  // Разлёт частиц при отпускании
  for (const p of parts) {
    if (p.dead) continue;
    const dx = p.x - well.x, dy = p.y - well.y;
    const d  = Math.sqrt(dx * dx + dy * dy);
    if (d < well.rad && d > 0) {
      const f = ((well.rad - d) / well.rad) * 5.5;
      p.vx += (dx / d) * f;
      p.vy += (dy / d) * f;
    }
  }
  // Кольцо-всплеск
  rings.push({ x: well.x, y: well.y, r: well.rad * 0.35, target: well.rad * 1.9, op: 0.55 });
  well.on  = false;
  well.rad = 0;
}

// Мышь
canvas.addEventListener('mousedown',  e => pointerDown(e.clientX, e.clientY));
window.addEventListener('mousemove',  e => pointerMove(e.clientX, e.clientY));
window.addEventListener('mouseup',    pointerUp);
// Касания
canvas.addEventListener('touchstart', e => { e.preventDefault(); pointerDown(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
canvas.addEventListener('touchmove',  e => { e.preventDefault(); pointerMove(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
canvas.addEventListener('touchend',   e => { e.preventDefault(); pointerUp(); }, { passive: false });

// ── Анимация ──
let last = performance.now();
let flashT = 0;

function loop(ts) {
  requestAnimationFrame(loop);
  const dt = Math.min((ts - last) / 1000, 0.05);
  last = ts;

  // Фон
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  // Рост воронки
  if (well.on) {
    const maxR = Math.min(W, H) * 0.42;
    well.rad = Math.min(well.rad + 68 * dt, maxR);
  }

  // ── Частицы ──
  for (let i = 0; i < parts.length; i++) {
    const p = parts[i];

    if (p.dead) {
      p.rt -= dt;
      if (p.rt <= 0) parts[i] = mkPart(true);
      continue;
    }

    if (well.on) {
      const dx = well.x - p.x, dy = well.y - p.y;
      const d  = Math.sqrt(dx * dx + dy * dy);
      if (d < well.rad && d > 0) {
        // Притяжение со спиральным компонентом
        const force = 255 * dt / Math.max(d, 14);
        const nx = dx / d, ny = dy / d;
        const tx = -ny, ty = nx; // тангент (по часовой)
        p.vx += nx * force + tx * force * 0.40;
        p.vy += ny * force + ty * force * 0.40;

        // Поглощение
        if (d < 15) {
          p.dead = true;
          p.rt   = 1.8 + Math.random() * 2.2;
          bursts.push({ x: well.x, y: well.y, r: 2, op: 1.0 });
          score++;
          if (score > hi) {
            hi = score;
            localStorage.setItem('vw_void_hs', String(hi));
          }
          scoreEl.textContent = score;
          hiEl.textContent    = `best  ${hi}`;
          flashT = 0.20;
          continue;
        }
      }
    }

    // Демпфирование
    p.vx *= 0.9975;
    p.vy *= 0.9975;

    // Ограничение скорости
    const spd = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
    if (spd > 10) { p.vx = p.vx / spd * 10; p.vy = p.vy / spd * 10; }

    p.x += p.vx;
    p.y += p.vy;

    // Тороидальный wrap
    if      (p.x < -22) p.x += W + 44;
    else if (p.x > W + 22) p.x -= W + 44;
    if      (p.y < -22) p.y += H + 44;
    else if (p.y > H + 22) p.y -= H + 44;

    // Масштаб: ближе к воронке — ярче и крупнее
    let scale = 1;
    if (well.on) {
      const dx = well.x - p.x, dy = well.y - p.y;
      const d  = Math.sqrt(dx * dx + dy * dy);
      if (d < well.rad) scale = 1 + (1 - d / well.rad) * 1.5;
    }
    const sz = p.r * 7 * scale;
    ctx.globalAlpha = Math.min(p.br * scale * 0.72, 1);
    ctx.drawImage(glowC, p.x - sz * 0.5, p.y - sz * 0.5, sz, sz);
  }
  ctx.globalAlpha = 1;

  // ── Рендер воронки ──
  if (well.on && well.rad > 0) {
    // Внешнее свечение притяжения
    const g1 = ctx.createRadialGradient(well.x, well.y, well.rad * 0.6, well.x, well.y, well.rad);
    g1.addColorStop(0,   'rgba(255,255,255,0)');
    g1.addColorStop(0.5, 'rgba(255,255,255,0.025)');
    g1.addColorStop(1,   'rgba(255,255,255,0.10)');
    ctx.fillStyle = g1;
    ctx.beginPath();
    ctx.arc(well.x, well.y, well.rad, 0, Math.PI * 2);
    ctx.fill();

    // Тёмный центр-пустота
    const g2 = ctx.createRadialGradient(well.x, well.y, 0, well.x, well.y, well.rad * 0.50);
    g2.addColorStop(0,    'rgba(0,0,0,1)');
    g2.addColorStop(0.55, 'rgba(0,0,0,0.72)');
    g2.addColorStop(1,    'rgba(0,0,0,0)');
    ctx.fillStyle = g2;
    ctx.beginPath();
    ctx.arc(well.x, well.y, well.rad * 0.50, 0, Math.PI * 2);
    ctx.fill();

    // Тонкий контур
    ctx.strokeStyle = 'rgba(255,255,255,0.16)';
    ctx.lineWidth   = 0.7;
    ctx.beginPath();
    ctx.arc(well.x, well.y, well.rad, 0, Math.PI * 2);
    ctx.stroke();

    // Маленькая точка в центре
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.beginPath();
    ctx.arc(well.x, well.y, 2.5, 0, Math.PI * 2);
    ctx.fill();
  }

  // ── Вспышки поглощения ──
  for (let i = bursts.length - 1; i >= 0; i--) {
    const b = bursts[i];
    b.r  += 30 * dt;
    b.op -= 3.5 * dt;
    if (b.op <= 0) { bursts.splice(i, 1); continue; }
    ctx.strokeStyle = `rgba(255,255,255,${b.op.toFixed(3)})`;
    ctx.lineWidth   = 1;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.stroke();
  }

  // ── Кольца разлёта ──
  for (let i = rings.length - 1; i >= 0; i--) {
    const r = rings[i];
    r.r  += (r.target - r.r) * (1 - Math.pow(0.001, dt));
    r.op -= 1.4 * dt;
    if (r.op <= 0) { rings.splice(i, 1); continue; }
    ctx.strokeStyle = `rgba(255,255,255,${r.op.toFixed(3)})`;
    ctx.lineWidth   = 0.8;
    ctx.beginPath();
    ctx.arc(r.x, r.y, r.r, 0, Math.PI * 2);
    ctx.stroke();
  }

  // ── Flash счёта ──
  if (flashT > 0) {
    flashT -= dt;
    const t = Math.max(flashT, 0) / 0.20;
    scoreEl.style.color = `rgba(255,255,255,${(0.055 + 0.22 * t).toFixed(3)})`;
  } else {
    scoreEl.style.color = 'rgba(255,255,255,0.055)';
  }
}

requestAnimationFrame(ts => { last = ts; requestAnimationFrame(loop); });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Картины — VoidWall</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #fff;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    /* ── Навигация ─────────────────────────────────────────── */
    #nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: 44px;
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(0,0,0,0.07);
      display: flex; align-items: center;
      padding: 0 28px;
    }
    #back {
      font-size: 11px; color: rgba(0,0,0,0.38);
      text-decoration: none; letter-spacing: 0.06em;
      transition: color 0.2s;
    }
    #back:hover { color: #000; }
    #nav-title {
      position: absolute; left: 50%; transform: translateX(-50%);
      font-size: 11px; letter-spacing: 0.18em;
      text-transform: uppercase; color: rgba(0,0,0,0.3);
    }

    /* ── Страница ─────────────────────────────────────────── */
    #page {
      padding-top: 72px;
      padding-bottom: 100px;
    }

    /* ── Секция ──────────────────────────────────────────── */
    .section {
      margin-bottom: 56px;
    }

    .section-header {
      display: flex; align-items: center; gap: 14px;
      padding: 0 32px 16px;
    }
    .section-name {
      font-size: 10px; letter-spacing: 0.22em;
      text-transform: uppercase; color: rgba(0,0,0,0.3);
      white-space: nowrap;
    }
    .section-line {
      flex: 1; height: 1px; background: rgba(0,0,0,0.08);
    }
    .section-count {
      font-size: 10px; color: rgba(0,0,0,0.2);
    }

    /* ── Горизонтальная полоса ───────────────────────────── */
    .strip {
      display: flex;
      gap: 8px;
      padding: 0 32px;
      height: 260px;
      align-items: flex-start;
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch; /* iOS инерция */
      touch-action: pan-x;
      scrollbar-width: thin;
      scrollbar-color: rgba(0,0,0,0.15) transparent;
      cursor: grab;
    }
    .strip:active { cursor: grabbing; }
    .strip::-webkit-scrollbar { height: 3px; }
    .strip::-webkit-scrollbar-track { background: transparent; }
    .strip::-webkit-scrollbar-thumb {
      background: rgba(0,0,0,0.15);
      border-radius: 2px;
    }

    .strip .c {
      height: 100%;
      flex-shrink: 0;
    }
    .strip .c img {
      height: 100%;
      width: auto;
      display: block;
      opacity: 0;
      transition: opacity 0.5s ease;
      pointer-events: none; /* не мешает drag */
    }
    .strip .c img.loaded { opacity: 1; }

    /* Одиночная работа */
    .strip.solo {
      justify-content: center;
      height: 380px;
    }

    /* ── Мобильная ────────────────────────────────────────── */
    @media (max-width: 680px) {
      .section-header { padding: 0 16px 14px; }
      .strip {
        height: 190px;
        padding: 0 16px;
        gap: 6px;
      }
      .strip.solo { height: 280px; }
    }
  </style>
</head>
<body>

<div id="nav">
  <a id="back" href="../index.html">← назад</a>
  <span id="nav-title">Картины</span>
</div>

<div id="page">

  <!-- ══════════════ BANGKOK ══════════════ -->

    </div>
    <div class="strip">
      <div class="c"><img src="../assets/images/Bangkok%20%20banyan-street.jpg"   loading="lazy" alt=""></div>
      <div class="c"><img src="../assets/images/Bangkok%20%20cafe-window.jpg"     loading="lazy" alt=""></div>
      <div class="c"><img src="../assets/images/Bangkok%20%20downtown.jpg"        loading="lazy" alt=""></div>

      <div class="c"><img src="../assets/images/Bangkok%20%20rooftop-view.jpg"    loading="lazy" alt=""></div>
      <div class="c"><img src="../assets/images/Bangkok%20%20temple.jpg"          loading="lazy" alt=""></div>
      <div class="c"><img src="../assets/images/Bangkok%20%20the-shop.jpg"        loading="lazy" alt=""></div>

    <div class="strip">

      <div class="c"><img src="../assets/images/China%20%20_6262.jpeg"  loading="lazy" alt=""></div>
      <div class="c"><img src="../assets/images/China%20%20_6264.jpeg"  loading="lazy" alt=""></div>
      <div class="c"><img src="../assets/images/China%20%20_6265.jpeg"  loading="lazy" alt=""></div>
      <div class="c"><img src="../assets/images/China%20%20_6266.jpeg"  loading="lazy" alt=""></div>
      <div class="c"><img src="../assets/images/China%20%20_6267.jpeg"  loading="lazy" alt=""></div>
      <div class="c"><img src="../assets/images/China%20%20_6268.jpeg"  loading="lazy" alt=""></div>
    </div>
  </div>

  <!-- ══════════════ LIGHT ══════════════ -->

    <div class="section-header">

      <div class="c"><img src="../assets/images/lake%20and%20hills%20%20_7441.jpeg" loading="lazy" alt=""></div>

    </div>
  </div>

</div>

<script>
  // Плавное появление
  document.querySelectorAll('img').forEach(img => {
    if (img.complete && img.naturalWidth) img.classList.add('loaded');
    else img.addEventListener('load', () => img.classList.add('loaded'));
  });

  // Drag-to-scroll для каждой полосы
  document.querySelectorAll('.strip').forEach(strip => {
    let down = false, startX = 0, scrollLeft = 0;

    strip.addEventListener('mousedown', e => {
      down = true;
      startX = e.pageX - strip.offsetLeft;
      scrollLeft = strip.scrollLeft;
    });
    window.addEventListener('mouseup',   () => { down = false; });
    window.addEventListener('mousemove', e => {
      if (!down) return;
      e.preventDefault();
      const x = e.pageX - strip.offsetLeft;
      strip.scrollLeft = scrollLeft - (x - startX);
    }, { passive: false });

  });
</script>
</body>
</html>

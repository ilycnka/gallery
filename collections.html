<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Коллекции — VoidWall</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      overflow: hidden; background: #020408;
      touch-action: none; user-select: none; -webkit-user-select: none;
      font-family: 'Segoe UI', sans-serif;
    }
    canvas { display: block; }
    #back {
      position: fixed; top: 22px; left: 22px; z-index: 50;
      font-size: 11px; color: #334; letter-spacing: 0.08em;
      cursor: pointer; text-decoration: none; transition: color 0.2s;
    }
    #back:hover { color: #88aacc; }
    #wordmark {
      position: fixed; top: 22px; left: 50%; transform: translateX(-50%);
      font-size: 10px; color: #223; letter-spacing: 0.22em; text-transform: uppercase;
      z-index: 50; pointer-events: none;
    }
    #collection-info {
      position: fixed; top: 0; left: 0;
      transform: translate(-50%, -50%);
      z-index: 50; text-align: center; pointer-events: none;
      opacity: 0; transition: opacity 0.4s ease;
    }
    #collection-info.show { opacity: 1; }
    #collection-name {
      font-size: 11px; letter-spacing: 0.30em; text-transform: uppercase;
      color: #080e18;
    }
    #collection-zoom-hint {
      margin-top: 8px;
      font-size: 8px; letter-spacing: 0.18em; text-transform: uppercase;
      color: #3a6080; opacity: 0; transition: opacity 0.4s ease;
    }
    #collection-zoom-hint.show { opacity: 1; }

    #overlay {
      position: fixed; inset: 0; z-index: 100;
      background: #020408;
      opacity: 0; pointer-events: none;
      transition: opacity 0.55s ease;
    }
    #overlay.fade { opacity: 1; }

    #zoom-ring {
      position: fixed; bottom: 22px; right: 22px; z-index: 50;
      width: 28px; height: 28px;
      opacity: 0; transition: opacity 0.3s;
      pointer-events: none;
    }
    #zoom-ring.show { opacity: 1; }
    #zoom-ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
    #zoom-ring circle { fill: none; stroke: #3388ff; stroke-width: 2.5;
      stroke-dasharray: 72; stroke-dashoffset: 72;
      transition: stroke-dashoffset 0.1s linear; }

    #hint {
      position: fixed; bottom: 9%; left: 50%; transform: translateX(-50%);
      z-index: 50; pointer-events: none;
      display: flex; align-items: center; gap: 9px;
      background: rgba(10,18,32,0.72); border: 1px solid rgba(80,130,200,0.18);
      border-radius: 20px; padding: 7px 16px 7px 12px;
      backdrop-filter: blur(6px);
      opacity: 0; transition: opacity 0.55s ease;
      white-space: nowrap;
    }
    #hint.show { opacity: 1; }
    #hint .hint-icon {
      width: 18px; height: 18px; flex-shrink: 0; opacity: 0.75;
    }
    #hint .hint-text {
      font-size: 9px; color: #88aacc; letter-spacing: 0.16em; text-transform: uppercase;
    }

    /* Иконки анимированы */
    @keyframes hint-rotate {
      0%   { transform: rotate(0deg); }
      80%  { transform: rotate(340deg); }
      100% { transform: rotate(340deg); }
    }
    @keyframes hint-scroll {
      0%, 100% { transform: translateY(0); opacity: 1; }
      50%       { transform: translateY(3px); opacity: 0.4; }
    }
    @keyframes hint-pulse {
      0%, 100% { transform: scale(1); opacity: 0.75; }
      50%       { transform: scale(1.25); opacity: 1; }
    }
    .anim-rotate { animation: hint-rotate 2.2s ease-in-out infinite; transform-origin: center; }
    .anim-scroll { animation: hint-scroll 1.4s ease-in-out infinite; }
    .anim-pulse  { animation: hint-pulse  1.2s ease-in-out infinite; }
  </style>
</head>
<body>

<div id="overlay"></div>
<div id="collection-info">
  <div id="collection-name"></div>
  <div id="collection-zoom-hint">скролл чтобы перейти</div>
</div>
<div id="zoom-ring">
  <svg viewBox="0 0 26 26">
    <circle id="zoom-arc" cx="13" cy="13" r="11.5"/>
  </svg>
</div>
<a id="back" href="index.html">← назад</a>
<div id="wordmark">VoidWall</div>
<div id="hint"></div>

<script src="js/i18n.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const isMobile = /Android|iPhone|iPad|iPod|webOS/i.test(navigator.userAgent) || innerWidth < 768;
I18N.addToggle('dark');
document.getElementById('back').textContent = I18N.t('back');
document.getElementById('collection-zoom-hint').textContent = I18N.t('zoom_hint');

const COLLECTIONS = [
  { name: { ru: 'Bangkok Graphite', en: 'Bangkok Graphite' }, href: 'gallery.html' },
  { name: { ru: 'работаю над этим', en: 'working on it'    }, href: null },
  { name: { ru: 'когда-нибудь',     en: 'sometime'         }, href: null },
  { name: { ru: 'ещё думаю',        en: 'still thinking'   }, href: null },
  { name: { ru: 'может быть',       en: 'maybe'            }, href: null },
];

// ─── Kelvin → RGB (Tanner Helland approximation) ───
function kelvinToHex(K) {
  const t = Math.min(Math.max(K, 1000), 40000) / 100;
  let r, g, b;
  if (t <= 66) {
    r = 255;
    g = Math.min(255, Math.max(0, 99.4708 * Math.log(t) - 161.1196));
    b = t <= 19 ? 0 : Math.min(255, Math.max(0, 138.5177 * Math.log(t - 10) - 305.0448));
  } else {
    r = Math.min(255, Math.max(0, 329.6987 * Math.pow(t - 60, -0.1332)));
    g = Math.min(255, Math.max(0, 288.1222 * Math.pow(t - 60, -0.0755)));
    b = 255;
  }
  return (Math.round(r) << 16) | (Math.round(g) << 8) | Math.round(b);
}

// Температуры: тёплый → холодный
const TEMPS     = [2000, 3400, 5500, 9500, 18000];
// Расстояния от центра (множитель POLY_R): намеренно разные
const OBJ_RADII = [1.18, 0.62, 1.05, 0.78, 0.95];

// ─── Сцена ───
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020408);
const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 100);
camera.position.set(0, 0, 9);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

// ─── Звёзды ───
(function () {
  const n = isMobile ? 500 : 1200;
  const pos = new Float32Array(n * 3);
  for (let i = 0; i < n; i++) {
    const θ = Math.random() * Math.PI * 2;
    const φ = Math.acos(2 * Math.random() - 1);
    const r = 18 + Math.random() * 20;
    pos[i*3]   = r * Math.sin(φ) * Math.cos(θ);
    pos[i*3+1] = r * Math.cos(φ);
    pos[i*3+2] = r * Math.sin(φ) * Math.sin(θ);
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  scene.add(new THREE.Points(g, new THREE.PointsMaterial({
    color: 0x88aacc, size: 0.04, transparent: true, opacity: 0.4,
    sizeAttenuation: true, depthWrite: false,
  })));
})();

// ─── Группа ───
const group = new THREE.Group();
scene.add(group);

const POLY_R = isMobile ? 2.6 : 3.0;

// ─── Фоновый скелет: три вложенных многогранника ───
const polyGeo  = new THREE.IcosahedronGeometry(POLY_R, 1);
const edgesGeo = new THREE.EdgesGeometry(polyGeo);
group.add(new THREE.LineSegments(edgesGeo,
  new THREE.LineBasicMaterial({ color: 0x0d1e36, transparent: true, opacity: 0.22 })));
group.add(new THREE.LineSegments(new THREE.EdgesGeometry(new THREE.DodecahedronGeometry(POLY_R * 0.74, 0)),
  new THREE.LineBasicMaterial({ color: 0x091529, transparent: true, opacity: 0.16 })));
group.add(new THREE.LineSegments(new THREE.EdgesGeometry(new THREE.OctahedronGeometry(POLY_R * 0.42, 0)),
  new THREE.LineBasicMaterial({ color: 0x060f1e, transparent: true, opacity: 0.18 })));

// ─── Glow-текстура ───
const glowTex = (function () {
  const s = 64, cvs = document.createElement('canvas');
  cvs.width = cvs.height = s;
  const ctx = cvs.getContext('2d');
  const g = ctx.createRadialGradient(s/2,s/2,0, s/2,s/2,s/2);
  g.addColorStop(0.0,  'rgba(255,255,255,1.0)');
  g.addColorStop(0.15, 'rgba(220,240,255,1.0)');
  g.addColorStop(0.4,  'rgba(120,180,255,0.7)');
  g.addColorStop(1.0,  'rgba(60,100,255,0)');
  ctx.fillStyle = g; ctx.fillRect(0, 0, s, s);
  return new THREE.CanvasTexture(cvs);
})();

// ─── Частицы ───
// Показатель степени > 1 → плотность сгущается к центру (f_r ∝ r^(1/α − 1))
(function () {
  const N = isMobile ? 20000 : 76000;
  const R_MAX = POLY_R * 10;
  const pos = new Float32Array(N * 3);
  const col = new Float32Array(N * 3);
  for (let i = 0; i < N; i++) {
    const θ = Math.random() * Math.PI * 2;
    const φ = Math.acos(2 * Math.random() - 1);
    const r = R_MAX * Math.pow(Math.random(), 2.2); // плотность ~r^-1.55, сгущается к центру
    pos[i*3]   = r * Math.sin(φ) * Math.cos(θ);
    pos[i*3+1] = r * Math.cos(φ);
    pos[i*3+2] = r * Math.sin(φ) * Math.sin(θ);
    const bright = Math.max(0.04, 0.90 - (r / R_MAX) * 0.82); // яркость падает к краям
    const t = Math.random();
    col[i*3]   = (0.45 + t * 0.55) * bright;
    col[i*3+1] = (0.65 + t * 0.35) * bright;
    col[i*3+2] = bright;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('color',    new THREE.BufferAttribute(col, 3));
  // Явная ограничивающая сфера — иначе Three.js может срезать дальние частицы фрустумом
  geo.boundingSphere = new THREE.Sphere(new THREE.Vector3(), R_MAX);
  group.add(new THREE.Points(geo, new THREE.PointsMaterial({
    size: isMobile ? 0.052 : 0.040,
    vertexColors: true, map: glowTex,
    transparent: true, opacity: 1.0,
    blending: THREE.AdditiveBlending, depthWrite: false, sizeAttenuation: true,
  })));
})();

// ─── Вершины икосаэдра → направления для объектов ───
function getUniqueVerts(geo, eps) {
  const p = geo.attributes.position;
  const verts = [];
  for (let i = 0; i < p.count; i++) {
    const v = new THREE.Vector3().fromBufferAttribute(p, i);
    if (!verts.some(u => u.distanceTo(v) < eps)) verts.push(v);
  }
  return verts;
}
function seededRng(seed) {
  let s = seed;
  return () => { s = Math.imul(s, 1664525) + 1013904223 | 0; return (s >>> 0) / 4294967295; };
}
function seededShuffle(arr, seed) {
  const a = [...arr], rng = seededRng(seed);
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

const allVerts    = getUniqueVerts(polyGeo, 0.01);
// Направления из икосаэдра, расстояния — из OBJ_RADII
const objectVerts = seededShuffle(allVerts, 31337).slice(0, 5).map((v, i) =>
  v.clone().normalize().multiplyScalar(POLY_R * OBJ_RADII[i])
);

// ─── Нестандартная фигура: спицы к центру + рёбра между объектами ───
(function () {
  const linePos = [];
  const O = objectVerts;

  // Спицы: каждый объект → центр
  O.forEach(v => linePos.push(0,0,0, v.x,v.y,v.z));

  // Рёбра: каждый объект к 2 ближайшим соседям
  O.forEach((v, i) => {
    const sorted = O.map((u, j) => ({ j, d: j === i ? Infinity : v.distanceTo(u) }))
                    .sort((a, b) => a.d - b.d);
    sorted.slice(0, 2).forEach(({ j }) => {
      if (j > i) linePos.push(v.x,v.y,v.z, O[j].x,O[j].y,O[j].z);
    });
  });

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(linePos), 3));
  group.add(new THREE.LineSegments(geo,
    new THREE.LineBasicMaterial({ color: 0x2255aa, transparent: true, opacity: 0.50 })));

  // Точки в вершинах смежных с объектами рёбер на икосаэдре
  const ep  = edgesGeo.attributes.position;
  const eps = 0.01;
  const adjLines = [];
  O.forEach(ov => {
    for (let k = 0; k < ep.count; k += 2) {
      const a = new THREE.Vector3().fromBufferAttribute(ep, k);
      const b = new THREE.Vector3().fromBufferAttribute(ep, k + 1);
      // Nearest point on icosahedron to each object vertex (by direction)
      const aN = a.clone().normalize().multiplyScalar(ov.length());
      const bN = b.clone().normalize().multiplyScalar(ov.length());
      if (aN.distanceTo(ov) < 0.35 || bN.distanceTo(ov) < 0.35) {
        adjLines.push(a.x,a.y,a.z, b.x,b.y,b.z);
      }
    }
  });
  const adjGeo = new THREE.BufferGeometry();
  adjGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(adjLines), 3));
  group.add(new THREE.LineSegments(adjGeo,
    new THREE.LineBasicMaterial({ color: 0x3388ff, transparent: true, opacity: 0.55 })));

  // Светящиеся точки вершин объектов
  const dotPos = new Float32Array(O.length * 3);
  O.forEach((v, i) => { dotPos[i*3]=v.x; dotPos[i*3+1]=v.y; dotPos[i*3+2]=v.z; });
  const dotGeo = new THREE.BufferGeometry();
  dotGeo.setAttribute('position', new THREE.BufferAttribute(dotPos, 3));
  group.add(new THREE.Points(dotGeo, new THREE.PointsMaterial({
    color: 0xaaccff, size: 0.10, map: glowTex,
    transparent: true, opacity: 0.90,
    blending: THREE.AdditiveBlending, depthWrite: false, sizeAttenuation: true,
  })));
})();

// ─── Объекты — шары в цветах Кельвина ───
const SPHERE_R  = isMobile ? 0.16 : 0.20;
const GLOW_SIZE = isMobile ? 0.75 : 0.95;

const objects = objectVerts.map((vert, i) => {
  const col    = COLLECTIONS[i];
  const normal = vert.clone().normalize();

  const baseHex   = kelvinToHex(TEMPS[i]);
  const cBase     = new THREE.Color(baseHex).multiplyScalar(0.55);
  const cActive   = new THREE.Color(baseHex).multiplyScalar(1.50);

  const sphereMat = new THREE.MeshBasicMaterial({ color: cBase.clone(), transparent: true, opacity: 1.0, depthWrite: false });
  const sphere    = new THREE.Mesh(new THREE.SphereGeometry(SPHERE_R, 22, 14), sphereMat);
  sphere.position.copy(vert);
  group.add(sphere);

  const glowMat = new THREE.SpriteMaterial({
    map: glowTex, color: cBase.clone(),
    blending: THREE.AdditiveBlending,
    transparent: true, opacity: 0.55, depthWrite: false,
  });
  const glow = new THREE.Sprite(glowMat);
  glow.position.copy(vert);
  glow.scale.setScalar(GLOW_SIZE);
  group.add(glow);

  return { sphere, sphereMat, glow, glowMat, normal, col, frontT: 0, cBase, cActive };
});

// ─── Зум ───
const ZOOM_MIN = 3.8, ZOOM_MAX = 16, ZOOM_START = 9;
let zoomTarget  = ZOOM_START;
let transitioning = false;

const overlayEl  = document.getElementById('overlay');
const zoomRingEl = document.getElementById('zoom-ring');
const zoomArcEl  = document.getElementById('zoom-arc');
const ARC_LEN    = 72; // stroke-dasharray

window.addEventListener('wheel', e => {
  zoomTarget = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, zoomTarget + e.deltaY * 0.012));
  if (hintState === 1) hideHint();
}, { passive: true });

// ─── Вращение ───
// ─── Подсказки ───
const hintEl = document.getElementById('hint');
const HINTS = [
  { // 0 — вращение
    icon: `<svg class="hint-icon anim-rotate" viewBox="0 0 18 18" fill="none" stroke="#88aacc" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 9A6 6 0 1 1 9 3"/><polyline points="9,0.5 9,4 12.5,4"/></svg>`,
    key: 'hint_rotate',
  },
  { // 1 — зум скроллом
    icon: `<svg class="hint-icon anim-scroll" viewBox="0 0 18 18" fill="none" stroke="#88aacc" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><rect x="5.5" y="2" width="7" height="12" rx="3.5"/><line x1="9" y1="5" x2="9" y2="8"/><line x1="7.5" y1="7" x2="9" y2="8.5"/><line x1="10.5" y1="7" x2="9" y2="8.5"/></svg>`,
    key: 'hint_zoom',
  },
  { // 2 — открыть
    icon: `<svg class="hint-icon anim-pulse" viewBox="0 0 18 18" fill="none" stroke="#88aacc" stroke-width="1.4" stroke-linecap="round"><circle cx="9" cy="9" r="3"/><circle cx="9" cy="9" r="6" stroke-opacity="0.35"/></svg>`,
    key: 'hint_open',
  },
];
let hintState = -1;
let hintTimer = null;

function showHint(state) {
  if (hintState === state) return;
  hintState = state;
  const h = HINTS[state];
  hintEl.innerHTML = h.icon + `<span class="hint-text">${I18N.t(h.key)}</span>`;
  hintEl.classList.add('show');
  clearTimeout(hintTimer);
  hintTimer = setTimeout(hideHint, 5000);
}
function hideHint() {
  hintEl.classList.remove('show');
}

// Смена языка: обновляем активную подсказку и статичные тексты
window.addEventListener('langchange', () => {
  if (hintState >= 0 && hintEl.classList.contains('show')) {
    const span = hintEl.querySelector('.hint-text');
    if (span) span.textContent = I18N.t(HINTS[hintState].key);
  }
  document.getElementById('back').textContent = I18N.t('back');
  document.getElementById('collection-zoom-hint').textContent = I18N.t('zoom_hint');
});

// Показать подсказку о вращении через 1.5 с
setTimeout(() => showHint(0), 1500);

let drag = false, px = 0, py = 0;
const quatTarget  = new THREE.Quaternion();
const quatCurrent = new THREE.Quaternion();
const qRX = new THREE.Quaternion(), qRY = new THREE.Quaternion();
const AX  = new THREE.Vector3(1, 0, 0);
const AY  = new THREE.Vector3(0, 1, 0);
let firstDrag = false;

function dragStart(x, y) {
  drag = true; px = x; py = y;
  if (hintState === 0) {
    hideHint();
    // Через 2 с после первого вращения — подсказка о зуме
    if (!firstDrag) {
      firstDrag = true;
      clearTimeout(hintTimer);
      hintTimer = setTimeout(() => showHint(1), 2000);
    }
  }
}
function dragMove(x, y) {
  if (!drag) return;
  qRY.setFromAxisAngle(AY, (x - px) * 0.007);
  qRX.setFromAxisAngle(AX, (y - py) * 0.007);
  quatTarget.premultiply(qRY).premultiply(qRX);
  px = x; py = y;
}
function dragEnd() { drag = false; }

renderer.domElement.addEventListener('mousedown', e => dragStart(e.clientX, e.clientY));
window.addEventListener('mousemove',  e => dragMove(e.clientX, e.clientY));
window.addEventListener('mouseup',    dragEnd);
let pinchDist0 = 0;
renderer.domElement.addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    pinchDist0 = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
  } else {
    const t = e.touches[0]; dragStart(t.clientX, t.clientY);
  }
}, { passive: true });
window.addEventListener('touchmove', e => {
  if (e.touches.length === 2) {
    const d = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    zoomTarget = Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, zoomTarget - (d - pinchDist0) * 0.025));
    pinchDist0 = d;
    if (hintState === 1) hideHint();
  } else {
    const t = e.touches[0]; dragMove(t.clientX, t.clientY);
  }
}, { passive: true });
window.addEventListener('touchend', e => { if (e.touches.length < 2) dragEnd(); }, { passive: true });


window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

const collInfoEl     = document.getElementById('collection-info');
const collNameEl     = document.getElementById('collection-name');
const collZoomHintEl = document.getElementById('collection-zoom-hint');

// ─── Аудио (Web Audio API) ───
let _ac = null, _osc1 = null, _osc2 = null, _filt = null, _mGain = null;

function _initAudio() {
  if (_ac) return;
  try { _ac = new (window.AudioContext || window.webkitAudioContext)(); } catch { return; }
  _ac.resume();

  // Основной тон — слышимый диапазон 180–360 Гц
  _osc1 = _ac.createOscillator(); _osc1.type = 'sine';    _osc1.frequency.value = 180;
  _osc2 = _ac.createOscillator(); _osc2.type = 'sine';    _osc2.frequency.value = 180.6; // биение 0.6 Гц
  const osc3 = _ac.createOscillator(); osc3.type = 'sine'; osc3.frequency.value = 270;   // квинта
  const osc4 = _ac.createOscillator(); osc4.type = 'triangle'; osc4.frequency.value = 90; // октава ниже

  // Шум — космический шелест
  const nLen = Math.floor(_ac.sampleRate * 4);
  const nBuf = _ac.createBuffer(1, nLen, _ac.sampleRate);
  const nd = nBuf.getChannelData(0);
  for (let i = 0; i < nLen; i++) nd[i] = Math.random() * 2 - 1;
  const noise = _ac.createBufferSource(); noise.buffer = nBuf; noise.loop = true;
  const nFilt = _ac.createBiquadFilter(); nFilt.type = 'bandpass'; nFilt.frequency.value = 800; nFilt.Q.value = 2;
  const nGain = _ac.createGain(); nGain.gain.value = 0.06;

  // Финальный фильтр — открывается при зуме
  _filt = _ac.createBiquadFilter(); _filt.type = 'lowpass'; _filt.frequency.value = 900; _filt.Q.value = 4;

  _mGain = _ac.createGain(); _mGain.gain.value = 0;

  const g1 = _ac.createGain(); g1.gain.value = 0.35;
  const g2 = _ac.createGain(); g2.gain.value = 0.30;
  const g3 = _ac.createGain(); g3.gain.value = 0.15;
  const g4 = _ac.createGain(); g4.gain.value = 0.18;

  _osc1.connect(g1); g1.connect(_filt);
  _osc2.connect(g2); g2.connect(_filt);
  osc3.connect(g3); g3.connect(_filt);
  osc4.connect(g4); g4.connect(_filt);
  noise.connect(nFilt); nFilt.connect(nGain); nGain.connect(_filt);
  _filt.connect(_mGain); _mGain.connect(_ac.destination);

  _osc1.start(); _osc2.start(); osc3.start(); osc4.start(); noise.start();
  _mGain.gain.linearRampToValueAtTime(0.35, _ac.currentTime + 2.5);
}

['mousedown', 'touchstart', 'wheel'].forEach(ev =>
  window.addEventListener(ev, _initAudio, { once: true, passive: true })
);

// ─── Анимация ───
const clock = new THREE.Clock();
const _wn   = new THREE.Vector3();
const _fwd  = new THREE.Vector3(0, 0, 1);
let wasRingActive = false;

function animate() {
  requestAnimationFrame(animate);

  if (!drag) {
    qRY.setFromAxisAngle(AY, 0.0012);
    quatTarget.premultiply(qRY);
  }
  quatCurrent.slerp(quatTarget, 0.08);
  group.quaternion.copy(quatCurrent);

  // Плавный зум
  camera.position.z += (zoomTarget - camera.position.z) * 0.09;

  // Кольцо прогресса зума когда объект с переходом впереди
  const zoomFrac = Math.max(0, (ZOOM_MAX - camera.position.z) / (ZOOM_MAX - ZOOM_MIN));

  // Аудио: частота растёт при зуме, биение ускоряется при вращении
  if (_ac) {
    const now = _ac.currentTime;
    const baseFreq = 160 + zoomFrac * 200;         // 160–360 Гц при зуме
    const beat     = drag ? 3.0 : 0.6;             // биение быстрее при вращении
    _osc1.frequency.setTargetAtTime(baseFreq,        now, 0.4);
    _osc2.frequency.setTargetAtTime(baseFreq + beat, now, 0.25);
    _filt.frequency.setTargetAtTime(600 + zoomFrac * 3000, now, 0.3);
  }

  let frontObj = null, maxDot = -Infinity;
  objects.forEach(o => {
    _wn.copy(o.normal).applyQuaternion(group.quaternion);
    const d = _wn.dot(_fwd);
    if (d > maxDot) { maxDot = d; frontObj = o; }
  });

  objects.forEach(o => {
    const isFront = o === frontObj && maxDot > 0.20;
    o.frontT += ((isFront ? 1 : 0) - o.frontT) * 0.055;

    // Сфера растворяется — при полном выделении становится невидимой
    o.sphereMat.color.copy(o.cBase).lerp(o.cActive, o.frontT);
    o.sphereMat.opacity = 1.0 - o.frontT * 0.98;

    // Свечение расширяется в чистый свет
    o.glowMat.color.copy(o.cBase).lerp(o.cActive, o.frontT);
    o.glow.scale.setScalar(GLOW_SIZE * (1.0 + o.frontT * 4.0));
    o.glowMat.opacity = 0.45 + o.frontT * 0.45;
  });

  // Название коллекции на месте объекта
  const showInfo = frontObj && frontObj.frontT > 0.30;
  collInfoEl.classList.toggle('show', !!showInfo);
  if (showInfo) {
    // Проецируем мировую позицию объекта в экранные координаты
    const _wp = frontObj.sphere.position.clone().applyQuaternion(group.quaternion);
    _wp.project(camera);
    collInfoEl.style.left = `${(_wp.x * 0.5 + 0.5) * innerWidth}px`;
    collInfoEl.style.top  = `${(-_wp.y * 0.5 + 0.5) * innerHeight}px`;

    collNameEl.textContent = frontObj.col.name[I18N.lang];
    collZoomHintEl.classList.toggle('show', !!frontObj.col.href);
  }

  // Кольцо зума — показываем только когда передний объект кликабелен
  const ringActive = frontObj?.col.href && frontObj.frontT > 0.5;
  zoomRingEl.classList.toggle('show', !!ringActive);
  wasRingActive = !!ringActive;
  if (ringActive) {
    const offset = ARC_LEN * (1 - zoomFrac);
    zoomArcEl.style.strokeDashoffset = offset;
    // Цвет кольца = цвет объекта
    const c = frontObj.sphereMat.color;
    zoomArcEl.style.stroke = `rgb(${(c.r*255)|0},${(c.g*255)|0},${(c.b*255)|0})`;
  }

  // Переход при максимальном зуме-ин на кликабельный объект
  if (!transitioning && zoomFrac > 0.93 && frontObj?.col.href && frontObj.frontT > 0.55) {
    transitioning = true;
    overlayEl.classList.add('fade');
    setTimeout(() => { window.location.href = frontObj.col.href; }, 600);
  }

  // Переход при максимальном зуме-аут → главная страница
  if (!transitioning && zoomFrac < 0.07) {
    transitioning = true;
    overlayEl.classList.add('fade');
    setTimeout(() => { window.location.href = 'index.html'; }, 600);
  }

  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>

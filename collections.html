<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Коллекции — VoidWall</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      overflow: hidden;
      background: #111111;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      font-family: 'Segoe UI', sans-serif;
    }
    canvas { display: block; }

    #back {
      position: fixed; top: 22px; left: 22px; z-index: 50;
      font-size: 11px; color: #555; letter-spacing: 0.08em;
      cursor: pointer; text-decoration: none;
      transition: color 0.2s;
    }
    #back:hover { color: #ccc; }

    #wordmark {
      position: fixed; top: 22px; left: 50%; transform: translateX(-50%);
      font-size: 10px; color: #444; letter-spacing: 0.22em; text-transform: uppercase;
      z-index: 50; pointer-events: none;
    }

    #label {
      position: fixed; bottom: 14%; left: 50%; transform: translateX(-50%);
      text-align: center; z-index: 50;
      opacity: 0; transition: opacity 0.45s ease;
      pointer-events: none;
    }
    #label.visible { opacity: 1; pointer-events: auto; }
    #label-name {
      font-size: clamp(18px, 3vw, 30px);
      font-weight: 300; color: #e8e8e8;
      letter-spacing: -0.01em;
      white-space: nowrap;
      margin-bottom: 14px;
    }
    #label-cta {
      font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase;
      color: #666; text-decoration: none;
      border-bottom: 1px solid #444; padding-bottom: 3px;
      transition: color 0.25s, border-color 0.25s;
    }
    #label-cta:hover { color: #ccc; border-color: #888; }

    #hint {
      position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%);
      font-size: 9px; color: #444; letter-spacing: 0.14em; text-transform: uppercase;
      pointer-events: none; z-index: 50;
      opacity: 0; animation: fi 1s 1.8s forwards;
    }
    @keyframes fi { to { opacity: 1 } }
  </style>
</head>
<body>

<a id="back" href="index.html">← назад</a>
<div id="wordmark">VoidWall</div>
<div id="label">
  <div id="label-name"></div>
  <a id="label-cta" href="#">Открыть коллекцию →</a>
</div>
<div id="hint">потяните для вращения</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const isMobile = /Android|iPhone|iPad|iPod|webOS/i.test(navigator.userAgent) || window.innerWidth < 768;

// ─── Сцена ───
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111111);
scene.fog = new THREE.FogExp2(0x111111, 0.04);

const camera = new THREE.PerspectiveCamera(52, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.z = 10;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = !isMobile;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

// Слабый ambient — фон для нечитаемых теней
scene.add(new THREE.AmbientLight(0xf8f5f0, 0.38));

// Тёплый точечный источник в центре сферы
const coreLight = new THREE.PointLight(0xfff3dd, 2.4, 10);
coreLight.position.set(0, 0, 0);
if (!isMobile) {
  coreLight.castShadow = true;
  coreLight.shadow.mapSize.set(512, 512);
  coreLight.shadow.camera.near = 0.2;
  coreLight.shadow.camera.far = 7;
  coreLight.shadow.bias = -0.002;
}
scene.add(coreLight);

// Холодный контровой свет со стороны камеры (заполняет передние грани)
const fillLight = new THREE.DirectionalLight(0xe8eeff, 0.55);
fillLight.position.set(0, 2, 10);
scene.add(fillLight);

// ─── Данные коллекций ───
const PLACEHOLDER_PALETTES = [
  ['#e8e4dc','#b8a898'], ['#dce4e8','#a0b8c4'], ['#dce8dc','#a0b8a0'],
  ['#e8dce8','#b8a0b8'], ['#e4e4d8','#b0b088'], ['#dce0e8','#a0a8c0'],
  ['#e8d8d8','#c0a0a0'], ['#d8e8e0','#90b8a8'], ['#e8e0d4','#c0a888'],
  ['#dce8e8','#90b8b8'], ['#e4dce0','#b0a8a8'],
];

const COLLECTIONS = [
  {
    name: 'Bangkok Graphite',
    href: 'gallery.html',
    draw(ctx, w, h) {
      ctx.clearRect(0, 0, w, h);

      // Фон 20% — rgba напрямую, без globalAlpha
      ctx.fillStyle = 'rgba(20,18,16,0.20)';
      ctx.fillRect(0, 0, w, h);

      // Силуэты зданий 30%
      const bld = [
        [18,44,h*.46],[62,26,h*.60],[88,50,h*.33],[138,22,h*.54],
        [160,56,h*.22],[216,30,h*.42],[246,42,h*.28],[288,48,h*.50],
        [336,28,h*.37],[364,38,h*.30],
      ];
      bld.forEach(([x,bw,top]) => {
        const r = bw * 0.28;
        ctx.beginPath();
        ctx.moveTo(x+r,top); ctx.lineTo(x+bw-r,top);
        ctx.quadraticCurveTo(x+bw,top,x+bw,top+r);
        ctx.lineTo(x+bw,h); ctx.lineTo(x,h); ctx.lineTo(x,top+r);
        ctx.quadraticCurveTo(x,top,x+r,top);
        ctx.closePath();
        ctx.fillStyle = 'rgba(80,74,60,0.30)';
        ctx.fill();
      });

      // Огни 30% — seeded RNG чтобы картинка была стабильной
      let sl = 7919;
      function srl() { sl = Math.imul(sl, 1664525) + 1013904223 | 0; return (sl >>> 0) / 4294967295; }
      bld.forEach(([x,bw,top]) => {
        for (let wy=top+14; wy<h-14; wy+=18)
          for (let wx=x+7; wx<x+bw-7; wx+=11)
            if (srl()>0.50) { ctx.fillStyle='rgba(255,210,100,0.30)'; ctx.fillRect(wx,wy,3,5); }
      });

      // Текст 30%
      ctx.textAlign='left';
      ctx.fillStyle='rgba(200,165,100,0.30)';
      ctx.font='500 12px Segoe UI,sans-serif';
      ctx.fillText('B A N G K O K',28,h*.68);
      ctx.fillStyle='rgba(245,242,235,0.30)';
      ctx.font='200 28px Segoe UI,sans-serif';
      ctx.fillText('GRAPHITE',28,h*.77);
      ctx.fillStyle='rgba(160,145,118,0.30)';
      ctx.font='300 10px Segoe UI,sans-serif';
      ctx.fillText('2025  ·  12 работ',28,h*.84);
    }
  },
  ...PLACEHOLDER_PALETTES.map((pal, i) => ({
    name: null, href: null,
    draw(ctx, w, h) {
      ctx.clearRect(0, 0, w, h);

      // Фон 20%
      const hex = pal[0].replace('#','');
      const pr = parseInt(hex.slice(0,2),16), pg = parseInt(hex.slice(2,4),16), pb = parseInt(hex.slice(4,6),16);
      ctx.fillStyle = `rgba(${pr},${pg},${pb},0.20)`;
      ctx.fillRect(0, 0, w, h);

      // Органические формы 30% — seed по индексу
      let s = (i+1)*7919;
      function sr(){ s=Math.imul(s,1664525)+1013904223|0; return (s>>>0)/4294967295; }

      const cr = Math.min(pr+80,255), cg = Math.min(pg+80,255), cb = Math.min(pb+80,255);
      for (let k=0; k<8; k++) {
        const cx=sr()*w, cy=sr()*h, rx=w*(0.12+sr()*0.28), ry=h*(0.08+sr()*0.20), rot=sr()*Math.PI*2;
        ctx.beginPath();
        ctx.ellipse(cx, cy, rx, ry, rot, 0, Math.PI*2);
        ctx.fillStyle = `rgba(${cr},${cg},${cb},0.30)`;
        ctx.fill();
      }
      for (let k=0; k<5; k++) {
        ctx.beginPath();
        ctx.moveTo(sr()*w, sr()*h);
        ctx.bezierCurveTo(sr()*w,sr()*h, sr()*w,sr()*h, sr()*w,sr()*h);
        ctx.strokeStyle = `rgba(${cr},${cg},${cb},0.30)`;
        ctx.lineWidth = 1.5+sr()*3;
        ctx.stroke();
      }

      ctx.fillStyle = 'rgba(255,255,255,0.30)';
      ctx.font = '300 9px Segoe UI,sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('СКОРО', w/2, h-22);
    }
  })),
];

// ─── Фибоначчиева сфера ───
function fibonacciSphere(n, r) {
  const phi = (1 + Math.sqrt(5)) / 2;
  return Array.from({ length: n }, (_, i) => {
    const theta = Math.acos(1 - 2 * (i + 0.5) / n);
    const angle = 2 * Math.PI * i / phi;
    return new THREE.Vector3(
      r * Math.sin(theta) * Math.cos(angle),
      r * Math.cos(theta),
      r * Math.sin(theta) * Math.sin(angle),
    );
  });
}

const RADIUS = isMobile ? 3.0 : 3.6;
const CW = isMobile ? 300 : 420, CH = Math.round(CW * 1.42);
const sphereGroup = new THREE.Group();
scene.add(sphereGroup);

const positions = fibonacciSphere(COLLECTIONS.length, RADIUS);
const cards = [];

const DEPTH = 0.022;
const BEVEL = 0.009;
const cardW = isMobile ? 0.95 : 1.15, cardH = cardW * 1.42;

// Закруглённая карточка через ExtrudeGeometry
function roundedCardGeo(w, h) {
  const r = Math.min(w, h) * 0.06;
  const s = new THREE.Shape();
  s.moveTo(-w/2 + r, -h/2);
  s.lineTo( w/2 - r, -h/2);
  s.quadraticCurveTo( w/2, -h/2,  w/2, -h/2 + r);
  s.lineTo( w/2,  h/2 - r);
  s.quadraticCurveTo( w/2,  h/2,  w/2 - r,  h/2);
  s.lineTo(-w/2 + r,  h/2);
  s.quadraticCurveTo(-w/2,  h/2, -w/2,  h/2 - r);
  s.lineTo(-w/2, -h/2 + r);
  s.quadraticCurveTo(-w/2, -h/2, -w/2 + r, -h/2);
  const geo = new THREE.ExtrudeGeometry(s, {
    depth: DEPTH,
    bevelEnabled: true,
    bevelThickness: BEVEL,
    bevelSize: BEVEL,
    bevelSegments: 4,
  });
  geo.translate(0, 0, -(DEPTH / 2 + BEVEL)); // центрируем по Z
  return geo;
}

// Торец — видимое стеклянное ребро
const sideMat = new THREE.MeshStandardMaterial({
  color: 0xc2ddf0,
  roughness: 0.05,
  metalness: 0.08,
  transparent: true,
  opacity: 0.55,
  depthWrite: false,
});
const sharedCardGeo = roundedCardGeo(cardW, cardH); // одна геометрия на все карточки

COLLECTIONS.forEach((col, i) => {
  const cvs = document.createElement('canvas');
  cvs.width = CW; cvs.height = CH;
  const ctx = cvs.getContext('2d');
  col.draw(ctx, CW, CH);

  const pos = positions[i];
  const outward = pos.clone().normalize();

  const mesh = new THREE.Mesh(
    sharedCardGeo,
    [sideMat, new THREE.MeshStandardMaterial({
      map: new THREE.CanvasTexture(cvs),
      roughness: 0.05,
      metalness: 0.08,
      transparent: true,
      opacity: 0.28,   // поверхность стекла — полупрозрачная
      depthWrite: false,
    })]
  );
  const origLocalPos = pos.clone();
  const origLocalQuat = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0, 0, 1), outward);
  mesh.position.copy(origLocalPos.clone().applyQuaternion(sphereGroup.quaternion));
  mesh.quaternion.copy(sphereGroup.quaternion).multiply(origLocalQuat);
  if (!isMobile) { mesh.castShadow = true; mesh.receiveShadow = true; }
  scene.add(mesh); // вне группы — управляем вручную

  cards.push({ mesh, col, origLocalPos, origLocalQuat, t: 0 });
});

// Кэш массива мешей — не аллоцируем на каждый mousemove/click
const cardMeshes = cards.map(c => c.mesh);

// Светящееся ядро — рассеянный свет через спрайт с градиентом
// inner/outer — строки 'r,g,b'
function makeGlowTexture(inner, outer, size) {
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const ctx = c.getContext('2d');
  const r = size / 2;
  const grad = ctx.createRadialGradient(r, r, 0, r, r, r);
  grad.addColorStop(0,    `rgba(${inner},0.95)`);
  grad.addColorStop(0.15, `rgba(${inner},0.6)`);
  grad.addColorStop(0.45, `rgba(${outer},0.18)`);
  grad.addColorStop(1,    `rgba(${outer},0)`);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, size, size);
  return new THREE.CanvasTexture(c);
}

const coreMesh = new THREE.Sprite(
  new THREE.SpriteMaterial({
    map: makeGlowTexture('255,245,200', '255,220,120', 256),
    transparent: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
  })
);
coreMesh.scale.setScalar(3.2);
sphereGroup.add(coreMesh);

// ─── Частицы на поверхности сферы ───
(function() {
  const count = isMobile ? 400 : 900;
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(count * 3);

  for (let i = 0; i < count; i++) {
    // равномерное распределение по поверхности сферы
    const theta = Math.random() * Math.PI * 2;
    const phi   = Math.acos(2 * Math.random() - 1);
    const r = RADIUS + (Math.random() - 0.5) * 0.18; // лёгкий разброс ±0.09
    pos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
    pos[i*3+1] = r * Math.cos(phi);
    pos[i*3+2] = r * Math.sin(phi) * Math.sin(theta);
  }

  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const pts = new THREE.Points(geo, new THREE.PointsMaterial({
    color: 0xaaaaaa,
    size: isMobile ? 0.045 : 0.032,
    transparent: true,
    opacity: 0.55,
    sizeAttenuation: true,
    depthWrite: false,
  }));
  sphereGroup.add(pts); // добавляем в группу, чтобы вращались вместе
})();

// ─── Перетаскивание / инерция ───
let isDragging = false;
let prevX = 0, prevY = 0;
let velX = 0.005, velY = 0.002; // стартовый импульс при входе
const BASE_VEL = 0.0015; // скорость авторотирования в покое

// Вертикальное положение в мировом пространстве: local Z → камера, local Y → вверх
const Q_UPRIGHT = new THREE.Quaternion(); // identity
const PROTRUDE = 0.55; // насколько карточка выступает вперёд

// Переиспользуемые объекты для animate (без аллокаций в цикле)
const _sp = new THREE.Vector3();
const _sq = new THREE.Quaternion();
const _ap = new THREE.Vector3();
const _aq = new THREE.Quaternion();
const _rotQ = new THREE.Quaternion();
const _rotAxis = new THREE.Vector3();

function applyRotation(dx, dy) {
  sphereGroup.quaternion
    .premultiply(_rotQ.setFromAxisAngle(_rotAxis.set(0, 1, 0), dx))
    .premultiply(_rotQ.setFromAxisAngle(_rotAxis.set(1, 0, 0), dy));
}

renderer.domElement.addEventListener('mousedown', (e) => {
  isDragging = true; prevX = e.clientX; prevY = e.clientY; velX = 0; velY = 0;
});
window.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  velX = (e.clientX - prevX) * 0.002;
  velY = (e.clientY - prevY) * 0.002;
  applyRotation(velX, velY);
  prevX = e.clientX; prevY = e.clientY;
});
window.addEventListener('mouseup', () => { isDragging = false; });

let touchActive = false, touchMoved = false, tSX = 0, tSY = 0;
renderer.domElement.addEventListener('touchstart', (e) => {
  const t = e.touches[0];
  prevX = tSX = t.clientX; prevY = tSY = t.clientY;
  touchActive = true; touchMoved = false; velX = 0; velY = 0;
}, { passive: true });
window.addEventListener('touchmove', (e) => {
  if (!touchActive) return;
  const t = e.touches[0];
  velX = (t.clientX - prevX) * 0.002;
  velY = (t.clientY - prevY) * 0.002;
  if (Math.abs(t.clientX - tSX) > 5 || Math.abs(t.clientY - tSY) > 5) touchMoved = true;
  applyRotation(velX, velY);
  prevX = t.clientX; prevY = t.clientY;
}, { passive: true });
window.addEventListener('touchend', (e) => {
  touchActive = false;
  if (!touchMoved) handleTap(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
});

// ─── Тап / клик ───
const raycaster = new THREE.Raycaster();
window.addEventListener('click', (e) => { if (!isMobile) handleTap(e.clientX, e.clientY); });

function handleTap(cx, cy) {
  const m = new THREE.Vector2((cx / window.innerWidth) * 2 - 1, -(cy / window.innerHeight) * 2 + 1);
  raycaster.setFromCamera(m, camera);
  const hit = raycaster.intersectObjects(cardMeshes)[0];
  const card = hit ? cards.find(c => c.mesh === hit.object) : null;
  if (card?.col.href) window.location.href = card.col.href;
}

window.addEventListener('mousemove', (e) => {
  const m = new THREE.Vector2((e.clientX / window.innerWidth) * 2 - 1, -(e.clientY / window.innerHeight) * 2 + 1);
  raycaster.setFromCamera(m, camera);
  const hit = raycaster.intersectObjects(cardMeshes)[0];
  const card = hit ? cards.find(c => c.mesh === hit.object) : null;
  renderer.domElement.style.cursor = card?.col.href ? 'pointer' : 'default';
});

// ─── Лейбл ───
const labelEl = document.getElementById('label');
const labelNameEl = document.getElementById('label-name');
const labelCtaEl = document.getElementById('label-cta');
let activeCard = null;
const tmpNormal = new THREE.Vector3();
const tmpPos = new THREE.Vector3();
const tmpToCam = new THREE.Vector3();

function updateLabel() {
  let best = null, bestDot = 0.90;
  cards.forEach(card => {
    tmpNormal.set(0, 0, 1).transformDirection(card.mesh.matrixWorld);
    card.mesh.getWorldPosition(tmpPos);
    tmpToCam.subVectors(camera.position, tmpPos).normalize();
    const dot = tmpNormal.dot(tmpToCam);
    if (dot > bestDot) { bestDot = dot; best = card; }
  });

  if (best !== activeCard) {
    activeCard = best;
    if (best?.col.name) {
      labelNameEl.textContent = best.col.name;
      labelCtaEl.href = best.col.href || '#';
      labelCtaEl.style.visibility = best.col.href ? 'visible' : 'hidden';
      labelEl.classList.add('visible');
    } else {
      labelEl.classList.remove('visible');
    }
  }
}

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── Анимация ───
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  if (!isDragging && !touchActive) {
    velX += (BASE_VEL - velX) * 0.012;
    velY *= 0.92;
    applyRotation(velX, velY);
  }

  // Обновляем позиции карточек
  cards.forEach(card => {
    // Сферическая позиция/ориентация
    _sp.copy(card.origLocalPos).applyQuaternion(sphereGroup.quaternion);
    _sq.copy(sphereGroup.quaternion).multiply(card.origLocalQuat);

    // Активная позиция: чуть дальше по радиусу, ориентация — вертикально в мире
    _ap.copy(_sp).normalize().multiplyScalar(RADIUS + PROTRUDE);
    _aq.copy(Q_UPRIGHT); // identity: local Z → (0,0,1) камера, local Y → (0,1,0) вверх

    const tTarget = card === activeCard ? 1 : 0;
    card.t += (tTarget - card.t) * (tTarget < card.t ? 0.14 : 0.06); // возврат вдвое быстрее

    card.mesh.position.lerpVectors(_sp, _ap, card.t);
    card.mesh.quaternion.copy(_sq).slerp(_aq, card.t);
    card.mesh.updateMatrixWorld();
  });

  // Пульсация ядра
  const pulse = Math.sin(t * 1.1) * 0.5 + 0.5; // 0..1
  coreMesh.material.opacity = 0.55 + pulse * 0.35;
  const s = 3.2 + pulse * 0.6;
  coreMesh.scale.set(s, s, 1);

  updateLabel();
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>

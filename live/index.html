<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Live — VoidWall</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
      font-family: 'Segoe UI', sans-serif;
    }

    #video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transform: scaleX(-1);
    }

    /* Канвас скелета — тоже зеркалим, чтобы совпадало с видео */
    #overlay {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 3;
      pointer-events: none;
      transform: scaleX(-1);
    }

    #back {
      position: fixed;
      top: 22px; left: 22px; z-index: 10;
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.10em;
      text-decoration: none;
      transition: color 0.2s;
    }
    #back:hover { color: rgba(255,255,255,0.80); }

    #live-badge {
      position: fixed;
      top: 22px; right: 22px; z-index: 10;
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 10px;
      letter-spacing: 0.20em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.40);
      opacity: 0;
      transition: opacity 0.6s;
    }
    #live-badge.visible { opacity: 1; }
    #live-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #fff;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.25; }
    }

    #message {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 5;
      pointer-events: none;
    }
    #message span {
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.22);
    }
  </style>
</head>
<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="overlay"></canvas>

<a id="back" href="../">← back</a>
<div id="live-badge"><div id="live-dot"></div><span>live</span></div>
<div id="message"><span id="msg-text">opening camera</span></div>

<script src="../js/i18n.js?v=4"></script>

<!-- MediaPipe Hands -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

<script>
document.getElementById('back').textContent = I18N.t('back');
window.addEventListener('langchange', () => {
  document.getElementById('back').textContent = I18N.t('back');
});

const video   = document.getElementById('video');
const overlay = document.getElementById('overlay');
const ctx     = overlay.getContext('2d');
const badge   = document.getElementById('live-badge');
const message = document.getElementById('message');
const msgText = document.getElementById('msg-text');

// Синхронизируем размер канваса с окном
function resizeOverlay() {
  overlay.width  = window.innerWidth;
  overlay.height = window.innerHeight;
}
resizeOverlay();
window.addEventListener('resize', resizeOverlay);

// ── Соединения суставов руки (21 точка MediaPipe) ──
const CONNECTIONS = [
  [0,1],[1,2],[2,3],[3,4],          // большой
  [0,5],[5,6],[6,7],[7,8],          // указательный
  [0,9],[9,10],[10,11],[11,12],     // средний
  [0,13],[13,14],[14,15],[15,16],   // безымянный
  [0,17],[17,18],[18,19],[19,20],   // мизинец
  [5,9],[9,13],[13,17],             // ладонь
];
const FINGERTIPS = new Set([4, 8, 12, 16, 20]);

// ── Рисуем скелет ──
function drawHand(landmarks) {
  const W = overlay.width, H = overlay.height;

  // Линии
  ctx.strokeStyle = 'rgba(255,255,255,0.55)';
  ctx.lineWidth   = 1.2;
  for (const [a, b] of CONNECTIONS) {
    const p1 = landmarks[a], p2 = landmarks[b];
    ctx.beginPath();
    ctx.moveTo(p1.x * W, p1.y * H);
    ctx.lineTo(p2.x * W, p2.y * H);
    ctx.stroke();
  }

  // Точки
  for (let i = 0; i < landmarks.length; i++) {
    const lm = landmarks[i];
    const x  = lm.x * W, y = lm.y * H;
    const r  = FINGERTIPS.has(i) ? 5 : 3;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle = FINGERTIPS.has(i) ? 'rgba(255,255,255,0.95)' : 'rgba(255,255,255,0.65)';
    ctx.fill();
  }
}

// ── MediaPipe Hands ──
const isMobile = window.innerWidth < 768;

const hands = new Hands({
  locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`,
});
hands.setOptions({
  maxNumHands:          2,
  modelComplexity:      isMobile ? 0 : 1,
  minDetectionConfidence: 0.7,
  minTrackingConfidence:  0.5,
});
// ── Камера ──
const constraints = {
  video: { facingMode: { ideal: 'user' }, width: { ideal: 1280 }, height: { ideal: 720 } },
  audio: false,
};

navigator.mediaDevices.getUserMedia(constraints)
  .then(stream => {
    video.srcObject = stream;
    video.addEventListener('loadedmetadata', () => {
      badge.classList.add('visible');

      // Ждём первого кадра модели, потом скрываем сообщение
      let modelReady = false;
      hands.onResults(results => {
        if (!modelReady) { modelReady = true; message.style.display = 'none'; }
        ctx.clearRect(0, 0, overlay.width, overlay.height);
        if (results.multiHandLandmarks) {
          for (const lm of results.multiHandLandmarks) drawHand(lm);
        }
      });

      // Отправляем кадры напрямую через rAF — без Camera util
      let running = true;
      async function loop() {
        if (!running) return;
        if (video.readyState >= 2) await hands.send({ image: video });
        requestAnimationFrame(loop);
      }
      loop();

      window.addEventListener('pagehide', () => { running = false; });
    });
  })
  .catch(err => {
    if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
      msgText.textContent = 'camera access denied';
    } else if (err.name === 'NotFoundError') {
      msgText.textContent = 'no camera found';
    } else {
      msgText.textContent = 'camera unavailable';
    }
  });

window.addEventListener('pagehide', () => {
  if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
}, { once: true });
</script>
</body>
</html>

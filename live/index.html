<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Live — VoidWall</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
      font-family: 'Segoe UI', sans-serif;
    }
    #video {
      position: fixed;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transform: scaleX(-1);
    }
    #overlay {
      position: fixed;
      inset: 0;
      width: 100%; height: 100%;
      z-index: 3;
      pointer-events: none;
      transform: scaleX(-1);
    }
    #back {
      position: fixed;
      top: 22px; left: 22px; z-index: 10;
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.10em;
      text-decoration: none;
      transition: color 0.2s;
    }
    #back:hover { color: rgba(255,255,255,0.80); }
    #live-badge {
      position: fixed;
      top: 22px; right: 22px; z-index: 10;
      display: flex; align-items: center; gap: 7px;
      font-size: 10px; letter-spacing: 0.20em; text-transform: uppercase;
      color: rgba(255,255,255,0.40);
      opacity: 0; transition: opacity 0.6s;
    }
    #live-badge.visible { opacity: 1; }
    #live-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #fff;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }
    #message {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      z-index: 5; pointer-events: none;
    }
    #message span {
      font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase;
      color: rgba(255,255,255,0.22);
    }

    /* ── Кнопка записи жеста ── */
    #btn-capture {
      position: fixed;
      bottom: 32px; left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      background: none;
      border: 1px solid rgba(255,255,255,0.25);
      color: rgba(255,255,255,0.45);
      font-family: 'Segoe UI', sans-serif;
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      padding: 10px 28px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s, opacity 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    #btn-capture:hover  { border-color: rgba(255,255,255,0.65); color: rgba(255,255,255,0.85); }
    #btn-capture.dim    { opacity: 0.28; pointer-events: none; }

    /* Счётчик библиотеки */
    #lib-count {
      position: fixed;
      bottom: 70px; left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.20);
      pointer-events: none;
    }

    /* ── Оверлей именования ── */
    #name-overlay {
      position: fixed; inset: 0; z-index: 50;
      background: rgba(0,0,0,0.72);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.2s;
    }
    #name-overlay.open { opacity: 1; pointer-events: all; }

    #name-card {
      display: flex; flex-direction: column; gap: 18px;
      padding: 36px 32px;
      border: 1px solid rgba(255,255,255,0.15);
      min-width: min(320px, 88vw);
    }
    #name-label {
      font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase;
      color: rgba(255,255,255,0.35);
    }
    #name-input {
      background: none;
      border: none;
      border-bottom: 1px solid rgba(255,255,255,0.30);
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      font-size: 18px;
      font-weight: 200;
      padding: 6px 0;
      outline: none;
      width: 100%;
    }
    #name-input::placeholder { color: rgba(255,255,255,0.18); }
    #name-actions { display: flex; gap: 12px; justify-content: flex-end; }
    .name-btn {
      background: none; border: 1px solid rgba(255,255,255,0.22);
      color: rgba(255,255,255,0.55); font-family: inherit;
      font-size: 9px; letter-spacing: 0.20em; text-transform: uppercase;
      padding: 8px 20px; cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .name-btn:hover { border-color: rgba(255,255,255,0.60); color: #fff; }
    .name-btn.primary { border-color: rgba(255,255,255,0.50); color: rgba(255,255,255,0.85); }

    /* Toast подтверждения */
    #toast {
      position: fixed; bottom: 90px; left: 50%;
      transform: translateX(-50%);
      z-index: 60;
      font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
      color: rgba(255,255,255,0.70);
      opacity: 0; transition: opacity 0.3s;
      pointer-events: none;
    }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="overlay"></canvas>

<a id="back" href="../">← back</a>
<div id="live-badge"><div id="live-dot"></div><span>live</span></div>
<div id="message"><span id="msg-text">opening camera</span></div>

<div id="lib-count"></div>
<button id="btn-capture" class="dim">запомнить жест</button>

<div id="name-overlay">
  <div id="name-card">
    <div id="name-label">название жеста</div>
    <input id="name-input" type="text" placeholder="например: pinch" autocomplete="off" spellcheck="false" />
    <div id="name-actions">
      <button class="name-btn" id="btn-cancel">отмена</button>
      <button class="name-btn primary" id="btn-save">сохранить</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="../js/i18n.js?v=4"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script>
document.getElementById('back').textContent = I18N.t('back');
window.addEventListener('langchange', () => {
  document.getElementById('back').textContent = I18N.t('back');
});

const video   = document.getElementById('video');
const overlay = document.getElementById('overlay');
const ctx     = overlay.getContext('2d');
const badge   = document.getElementById('live-badge');
const message = document.getElementById('message');
const msgText = document.getElementById('msg-text');

function resizeOverlay() { overlay.width = window.innerWidth; overlay.height = window.innerHeight; }
resizeOverlay();
window.addEventListener('resize', resizeOverlay);

// ── Скелет руки ──
const CONNECTIONS = [
  [0,1],[1,2],[2,3],[3,4],
  [0,5],[5,6],[6,7],[7,8],
  [0,9],[9,10],[10,11],[11,12],
  [0,13],[13,14],[14,15],[15,16],
  [0,17],[17,18],[18,19],[19,20],
  [5,9],[9,13],[13,17],
];
const TIPS = [ {i:4,n:'1'}, {i:8,n:'2'}, {i:12,n:'3'}, {i:16,n:'4'}, {i:20,n:'5'} ];
const TIP_SET = new Set(TIPS.map(t => t.i));

function drawHand(lm) {
  const W = overlay.width, H = overlay.height;

  ctx.strokeStyle = 'rgba(255,255,255,0.55)';
  ctx.lineWidth = 1.2;
  for (const [a, b] of CONNECTIONS) {
    ctx.beginPath();
    ctx.moveTo(lm[a].x * W, lm[a].y * H);
    ctx.lineTo(lm[b].x * W, lm[b].y * H);
    ctx.stroke();
  }

  for (let i = 0; i < lm.length; i++) {
    const x = lm[i].x * W, y = lm[i].y * H;
    ctx.beginPath();
    ctx.arc(x, y, TIP_SET.has(i) ? 4.5 : 2.5, 0, Math.PI * 2);
    ctx.fillStyle = TIP_SET.has(i) ? 'rgba(255,255,255,0.95)' : 'rgba(255,255,255,0.60)';
    ctx.fill();
  }

  // Линия между 1 (большой) и 2 (указательный)
  ctx.strokeStyle = 'rgba(255,255,255,0.95)';
  ctx.lineWidth = 2.2;
  ctx.beginPath();
  ctx.moveTo(lm[4].x * W, lm[4].y * H);
  ctx.lineTo(lm[8].x * W, lm[8].y * H);
  ctx.stroke();

  // Номера пальцев
  ctx.font = '500 11px Segoe UI, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'bottom';
  for (const { i, n } of TIPS) {
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.fillText(n, lm[i].x * W, lm[i].y * H - 10);
  }
}

// ── Куб ──
const EDGES = [
  [0,1],[1,2],[2,3],[3,0],
  [4,5],[5,6],[6,7],[7,4],
  [0,4],[1,5],[2,6],[3,7],
];

function rotY([x,y,z], a) {
  return [x*Math.cos(a)+z*Math.sin(a), y, -x*Math.sin(a)+z*Math.cos(a)];
}
function rotX([x,y,z], a) {
  return [x, y*Math.cos(a)-z*Math.sin(a), y*Math.sin(a)+z*Math.cos(a)];
}
function proj([x,y,z], cx, cy) {
  const f = 280 / (280 + z);
  return [cx + x * f, cy + y * f];
}

function drawCube(cx, cy, rx, ry, alpha, s) {
  const verts = [
    [-s,-s,-s],[s,-s,-s],[s,s,-s],[-s,s,-s],
    [-s,-s,s],[s,-s,s],[s,s,s],[-s,s,s],
  ];
  const pts = verts
    .map(v => rotY(v, ry))
    .map(v => rotX(v, rx))
    .map(v => proj(v, cx, cy));

  ctx.globalAlpha = alpha;

  // Рёбра
  ctx.strokeStyle = 'rgba(255,255,255,1.0)';
  ctx.lineWidth = 2.0;
  for (const [a, b] of EDGES) {
    ctx.beginPath();
    ctx.moveTo(pts[a][0], pts[a][1]);
    ctx.lineTo(pts[b][0], pts[b][1]);
    ctx.stroke();
  }

  // Точки на углах
  for (const [x, y] of pts) {
    ctx.beginPath();
    ctx.arc(x, y, 4, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,1.0)';
    ctx.fill();
  }

  ctx.globalAlpha = 1;
}

// ── Состояние куба ──
let cubeAlpha  = 0;
let cubeCurS   = 42, cubeTargS = 42;
let cubeCurRX  = 0,  cubeCurRY  = 0;
let cubeTargRX = 0,  cubeTargRY = 0;

// ── MediaPipe ──
const isMobile = window.innerWidth < 768;
const hands = new Hands({
  locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`,
});
hands.setOptions({
  maxNumHands: 2,
  modelComplexity: isMobile ? 0 : 1,
  minDetectionConfidence: 0.7,
  minTrackingConfidence:  0.5,
});

let modelReady    = false;
let lastLandmarks = null; // последние обнаруженные лендмарки для записи

// ── Библиотека жестов (localStorage) ──
const STORAGE_KEY = 'vw_gesture_library';
function loadLibrary()  { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { return []; } }
function saveLibrary(l) { localStorage.setItem(STORAGE_KEY, JSON.stringify(l)); }

const btnCapture   = document.getElementById('btn-capture');
const nameOverlay  = document.getElementById('name-overlay');
const nameInput    = document.getElementById('name-input');
const btnSave      = document.getElementById('btn-save');
const btnCancel    = document.getElementById('btn-cancel');
const libCount     = document.getElementById('lib-count');
const toast        = document.getElementById('toast');

function updateCount() {
  const n = loadLibrary().length;
  libCount.textContent = n ? `${n} gesture${n === 1 ? '' : 's'} saved` : '';
}
updateCount();

let capturedLandmarks = null;
let toastTimer = null;

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
}

function openNaming() {
  nameInput.value = '';
  nameOverlay.classList.add('open');
  setTimeout(() => nameInput.focus(), 80);
}
function closeNaming() {
  nameOverlay.classList.remove('open');
  capturedLandmarks = null;
}

function confirmSave() {
  const name = nameInput.value.trim();
  if (!name || !capturedLandmarks) return;
  const lib = loadLibrary();
  lib.push({
    name,
    landmarks: capturedLandmarks,          // 21 точка {x,y,z}
    created: new Date().toISOString(),
  });
  saveLibrary(lib);
  updateCount();
  closeNaming();
  showToast(`"${name}" сохранён`);
}

btnCapture.addEventListener('click', () => {
  if (!lastLandmarks) return;
  capturedLandmarks = JSON.parse(JSON.stringify(lastLandmarks));
  openNaming();
});
btnSave.addEventListener('click', confirmSave);
btnCancel.addEventListener('click', closeNaming);
nameInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') confirmSave();
  if (e.key === 'Escape') closeNaming();
});
nameOverlay.addEventListener('click', e => { if (e.target === nameOverlay) closeNaming(); });

hands.onResults(results => {
  if (!modelReady) { modelReady = true; message.style.display = 'none'; }

  const W = overlay.width, H = overlay.height;
  ctx.clearRect(0, 0, W, H);

  let rightWrist = null;
  const anyLm = results.multiHandLandmarks?.[0] || null;
  lastLandmarks = anyLm;
  btnCapture.classList.toggle('dim', !anyLm);

  if (results.multiHandLandmarks) {
    for (let i = 0; i < results.multiHandLandmarks.length; i++) {
      const lm         = results.multiHandLandmarks[i];
      const handedness = results.multiHandedness?.[i]?.label;
      drawHand(lm);
      // MediaPipe при фронталке возвращает "Left" для анатомически правой руки
      if (handedness === 'Left') {
        rightWrist = lm[0];

        // Вектор от 2 (указательный) к 1 (большой) в нормализованном 3D-пространстве
        const vx = lm[4].x - lm[8].x;
        const vy = lm[4].y - lm[8].y;
        const vz = lm[4].z - lm[8].z;
        const len = Math.sqrt(vx*vx + vy*vy + vz*vz) || 0.001;

        // Размер куба — длина линии на экране
        const px = vx * W, py = vy * H;
        cubeTargS = Math.max(14, Math.min(140, Math.sqrt(px*px + py*py) * 0.55));

        // Вращение куба = ориентация линии в 3D
        // RX: угол возвышения (насколько линия смотрит вверх/вниз)
        cubeTargRX = Math.asin(Math.max(-1, Math.min(1, -vy / len))) * 1.4;
        // RY: горизонтальный азимут (линия влево/вправо + глубина)
        cubeTargRY = Math.atan2(vx, Math.sqrt(vy*vy + vz*vz) + 0.05) * 1.6;
      }
    }
  }

  cubeAlpha = rightWrist
    ? Math.min(1, cubeAlpha + 0.06)
    : Math.max(0, cubeAlpha - 0.04);

  cubeCurS  += (cubeTargS  - cubeCurS)  * 0.12;
  cubeCurRX += (cubeTargRX - cubeCurRX) * 0.10;
  cubeCurRY += (cubeTargRY - cubeCurRY) * 0.10;

  if (cubeAlpha > 0) {
    const t      = performance.now() / 1000;
    const floatY = Math.sin(t * 1.6) * 10;
    // Фиксированная позиция: левый край экрана, центр по вертикали
    // Канвас зеркальный, поэтому рисуем справа (W * 0.85)
    drawCube(W * 0.85, H * 0.5 + floatY, cubeCurRX, cubeCurRY, cubeAlpha, cubeCurS);
  }
});

// ── Камера ──
navigator.mediaDevices.getUserMedia({
  video: { facingMode: { ideal: 'user' }, width: { ideal: 1280 }, height: { ideal: 720 } },
  audio: false,
})
.then(stream => {
  video.srcObject = stream;
  video.addEventListener('loadedmetadata', () => {
    badge.classList.add('visible');
    msgText.textContent = 'loading model';

    let running = true;
    async function loop() {
      if (!running) return;
      if (video.readyState >= 2) await hands.send({ image: video });
      requestAnimationFrame(loop);
    }
    loop();

    window.addEventListener('pagehide', () => { running = false; }, { once: true });
  });
})
.catch(err => {
  if (err.name === 'NotAllowedError') msgText.textContent = 'camera access denied';
  else if (err.name === 'NotFoundError') msgText.textContent = 'no camera found';
  else msgText.textContent = 'camera unavailable';
});

window.addEventListener('pagehide', () => {
  if (video.srcObject) video.srcObject.getTracks().forEach(t => t.stop());
}, { once: true });
</script>
</body>
</html>

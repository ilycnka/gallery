<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>About — VoidWall</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      -webkit-user-select: none;
      user-select: none;
    }

    #back {
      position: fixed;
      top: 22px; left: 22px; z-index: 10;
      font-size: 11px;
      color: rgba(255,255,255,0.28);
      letter-spacing: 0.10em;
      text-decoration: none;
      transition: color 0.2s;
    }
    #back:hover { color: rgba(255,255,255,0.75); }

    main {
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 100vh;
      padding: 120px 10vw;
      max-width: 900px;
    }

    .label {
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.28);
      margin-bottom: 40px;
    }

    h1 {
      font-size: clamp(32px, 5vw, 64px);
      font-weight: 200;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: #e0e0e0;
      margin-bottom: 48px;
    }

    .body-text {
      font-size: clamp(14px, 1.6vw, 18px);
      font-weight: 300;
      line-height: 1.8;
      color: rgba(255,255,255,0.55);
      max-width: 600px;
      margin-bottom: 32px;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: rgba(255,255,255,0.15);
      margin: 48px 0;
    }

    .meta {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.25);
      line-height: 2.2;
    }

    #scene-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      pointer-events: none;
      z-index: 1;
      opacity: 0.35;
    }
    /* текст поверх */
    main { position: relative; z-index: 2; }
    #lang-toggle { position: fixed; z-index: 10; }
  </style>
</head>
<body>

<canvas id="scene-canvas"></canvas>
<a id="back" href="index.html"></a>

<main>
  <div class="label">VoidWall — 2026</div>

  <h1 id="title"></h1>

  <p class="body-text" id="text1"></p>
  <p class="body-text" id="text2"></p>
  <p class="body-text" id="text3" style="font-weight:700; margin-top:1.4em;"></p>


</main>

<script src="js/i18n.js?v=2"></script>
<script>
  I18N.addToggle('dark');

  const CONTENT = {
    en: {
      back:  '← back',
      title: 'online gallery\nvoidwall',
      text1: 'my name is ilya i am 24 i grew up in minsk belarus built a career in it moved to asia and for the last year i have been living in bangkok love travelling space dinosaurs cats and drawing',
      text2: 'here i build virtual spaces where i put my drawings',
      text3: 'in return for your support i place your name on available works',
    },
    ru: {
      back:  '← назад',
      title: 'онлайн галерея\nvoidwall',
      text1: 'меня зовут илья мне 24 я вырос в минске беларусь построил карьеру в ит переехал в азию и последний год живу в бангкоке люблю путешествовать космос динозавров котов и рисовать',
      text2: 'здесь я создаю виртуальные пространства где выставляю свои рисунки',
      text3: 'за поддержку я размещаю ваше имя на свободных работах',
    },
  };

  function render() {
    const c = CONTENT[I18N.lang] || CONTENT.en;
    document.getElementById('back').textContent  = c.back;
    document.getElementById('title').textContent = c.title;
    document.getElementById('text1').textContent = c.text1;
    document.getElementById('text2').textContent = c.text2;
    document.getElementById('text3').textContent = c.text3;
    // meta element removed — nothing to render
    document.documentElement.lang = I18N.lang;
  }

  render();
  window.addEventListener('langchange', render);
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
  // ── Хаотичная wireframe-фигура ──
  const canvas   = document.getElementById('scene-canvas');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setClearColor(0x000000, 0);

  function resize() {
    const w = canvas.clientWidth, h = canvas.clientHeight;
    renderer.setSize(w, h, false);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  }

  const scene  = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
  camera.position.set(0, 0, 9);

  // ── Строим фигуру из случайных вершин ──
  function buildFigure() {
    const group = new THREE.Group();

    // 25 случайных лучей из центра разной длины
    const verts = [];
    const rays  = []; // конечные точки лучей
    const N = 25;
    for (let i = 0; i < N; i++) {
      const θ = Math.random() * Math.PI * 2;
      const φ = Math.acos(2 * Math.random() - 1);
      const len = 4.0 + Math.random() * 4.0;
      const ex = len * Math.sin(φ) * Math.cos(θ);
      const ey = len * Math.sin(φ) * Math.sin(θ);
      const ez = len * Math.cos(φ);
      verts.push(0, 0, 0, ex, ey, ez);
      rays.push(ex, ey, ez);
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
    group.add(new THREE.LineSegments(geo,
      new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.85 })));

    // Яркие источники света вдоль лучей — случайные точки на каждом луче
    const lightTex = (function () {
      const s = 128, c = document.createElement('canvas');
      c.width = c.height = s;
      const ctx = c.getContext('2d');
      const g = ctx.createRadialGradient(s/2, s/2, 0, s/2, s/2, s/2);
      g.addColorStop(0.0, 'rgba(255,255,255,1.0)');
      g.addColorStop(0.1, 'rgba(220,240,255,0.9)');
      g.addColorStop(0.5, 'rgba(180,210,255,0.3)');
      g.addColorStop(1.0, 'rgba(180,210,255,0)');
      ctx.fillStyle = g; ctx.fillRect(0, 0, s, s);
      return new THREE.CanvasTexture(c);
    })();

    const lPos = [];
    for (let i = 0; i < rays.length / 3; i++) {
      const t  = 0.2 + Math.random() * 0.8; // случайная позиция вдоль луча
      lPos.push(rays[i*3] * t, rays[i*3+1] * t, rays[i*3+2] * t);
    }
    const lGeo = new THREE.BufferGeometry();
    lGeo.setAttribute('position', new THREE.Float32BufferAttribute(lPos, 3));
    group.add(new THREE.Points(lGeo, new THREE.PointsMaterial({
      size: 0.55,
      map: lightTex,
      transparent: true,
      opacity: 1.0,
      depthWrite: false,
      blending: THREE.AdditiveBlending,
      sizeAttenuation: true,
    })));

    return group;
  }

  const figure = buildFigure();
  scene.add(figure);

  // ── Частицы (как в архивной симуляции) ──
  const glowTex = (function () {
    const s = 64, cvs = document.createElement('canvas');
    cvs.width = cvs.height = s;
    const ctx = cvs.getContext('2d');
    const g = ctx.createRadialGradient(s/2, s/2, 0, s/2, s/2, s/2);
    g.addColorStop(0.0,  'rgba(255,255,255,1.0)');
    g.addColorStop(0.3,  'rgba(200,200,200,0.7)');
    g.addColorStop(1.0,  'rgba(200,200,200,0)');
    ctx.fillStyle = g; ctx.fillRect(0, 0, s, s);
    return new THREE.CanvasTexture(cvs);
  })();

  (function () {
    const isMob = window.innerWidth < 768;
    const N     = isMob ? 3000 : 60000;
    const R_MAX = 30;
    const pos   = new Float32Array(N * 3);
    const col   = new Float32Array(N * 3);
    for (let i = 0; i < N; i++) {
      const θ = Math.random() * Math.PI * 2;
      const φ = Math.acos(2 * Math.random() - 1);
      const r = R_MAX * Math.pow(Math.random(), 2.2);
      pos[i*3]   = r * Math.sin(φ) * Math.cos(θ);
      pos[i*3+1] = r * Math.cos(φ);
      pos[i*3+2] = r * Math.sin(φ) * Math.sin(θ);
      const bright = Math.max(0.09, 0.99 - (r / R_MAX) * 0.90);
      col[i*3] = col[i*3+1] = col[i*3+2] = bright;
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    geo.setAttribute('color',    new THREE.BufferAttribute(col, 3));
    geo.boundingSphere = new THREE.Sphere(new THREE.Vector3(), R_MAX);
    figure.add(new THREE.Points(geo, new THREE.PointsMaterial({
      size: isMob ? 0.06 : 0.04,
      vertexColors: true,
      map: glowTex,
      alphaTest: 0.01,
      transparent: true,
      opacity: 0.6,
      depthWrite: false,
      sizeAttenuation: true,
    })));
  })();

  resize();
  window.addEventListener('resize', resize);

  // ── Вращение от drag ──
  let drag     = false;
  let lastX    = 0, lastY = 0;
  let velX     = 0, velY = 0;
  let rotX     = 0.3, rotY = 0.5;

  window.addEventListener('mousedown', e => { drag = true; lastX = e.clientX; lastY = e.clientY; });
  window.addEventListener('mouseup',   () => { drag = false; });
  window.addEventListener('mousemove', e => {
    if (!drag) return;
    velX = (e.clientY - lastY) * 0.01;
    velY = (e.clientX - lastX) * 0.01;
    lastX = e.clientX; lastY = e.clientY;
  });

  window.addEventListener('touchstart', e => {
    drag = true; lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
  }, { passive: true });
  window.addEventListener('touchend', () => { drag = false; });
  window.addEventListener('touchmove', e => {
    if (!drag) return;
    velX = (e.touches[0].clientY - lastY) * 0.01;
    velY = (e.touches[0].clientX - lastX) * 0.01;
    lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
  }, { passive: true });

  // ── Анимация ──
  const clock = new THREE.Clock();
  function animate() {
    requestAnimationFrame(animate);
    const t = clock.getElapsedTime();

    // Инерция вращения
    velX *= 0.88; velY *= 0.88;
    rotX += velX; rotY += velY;

    // Медленное авто-вращение когда не тянут
    if (!drag) { rotY += 0.003; rotX += 0.001; }

    figure.rotation.x = rotX;
    figure.rotation.y = rotY;

    // Хаотичное медленное дрейфование центра
    figure.position.x = Math.sin(t * 0.31) * 0.35 + Math.sin(t * 0.17) * 0.20;
    figure.position.y = Math.sin(t * 0.50) * 0.28 + Math.cos(t * 0.23) * 0.18;
    figure.position.z = Math.sin(t * 0.19) * 0.22;

    renderer.render(scene, camera);
  }
  animate();
</script>
</body>
</html>

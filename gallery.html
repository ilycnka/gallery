<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Галерея — 3D пространство</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="overlay">
  <div class="logo" id="gallery-title">Галерея <span id="gallery-sub">3D пространство</span></div>
  <div class="counter" id="counter"></div>
</div>

<div id="hint"></div>

<div id="speed-control">
  <label id="speed-label">Скорость</label>
  <input type="range" id="speedSlider" min="0" max="100" value="35" />
</div>

<div id="detail">
  <button id="detail-close">✕</button>
  <div id="detail-inner">
    <canvas id="detail-art" width="340" height="420"></canvas>
    <div id="detail-info">
      <div class="meta" id="d-meta"></div>
      <h2 id="d-title"></h2>
      <div class="line" id="d-line"></div>
      <p class="desc" id="art-desc">Оригинальная работа. При покупке вы становитесь единственным владельцем — ваше имя отображается на произведении в галерее.</p>
      <div class="price" id="d-price"></div>
      <button id="d-btn">ПРИОБРЕСТИ</button>
      <div id="detail-owner-badge"><span class="dot"></span><span id="d-owner-name"></span></div>
      <div class="back" id="d-back">← назад в галерею</div>

    </div>
  </div>
</div>

<script src="js/i18n.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// Применяем переводы к статичным элементам галереи
function applyGalleryLang() {
  document.getElementById('gallery-title').firstChild.textContent = I18N.t('gallery_title') + ' ';
  document.getElementById('gallery-sub').textContent = I18N.t('gallery_sub');
  document.getElementById('speed-label').textContent = I18N.t('speed_label');
  document.getElementById('art-desc').textContent = I18N.t('art_desc');
  document.getElementById('d-back').textContent = I18N.t('back_gallery');
}
applyGalleryLang();
window.addEventListener('langchange', applyGalleryLang);
I18N.addToggle('dark');
</script>
<script type="module" src="js/main.js"></script>
</body>
</html>

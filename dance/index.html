<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Dance Room — VoidWall</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
    #video {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }
    #colorOverlay {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      z-index: 1;
      mix-blend-mode: difference;
      pointer-events: none;
    }
    #canvas {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      z-index: 2;
    }
    #ui { position: fixed; inset: 0; z-index: 10; pointer-events: none; }
    #back {
      position: absolute; top: 18px; left: 18px;
      pointer-events: all;
      color: rgba(255,255,255,0.55);
      font-size: 11px; letter-spacing: 0.08em;
      text-decoration: none;
      background: rgba(0,0,0,0.45);
      padding: 7px 14px; border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(6px);
      transition: color 0.2s, background 0.2s;
    }
    #back:hover { color: #fff; background: rgba(0,0,0,0.65); }
    #label {
      position: absolute; top: 22px; right: 18px;
      font-size: 10px; letter-spacing: 0.3em;
      text-transform: uppercase; color: rgba(255,255,255,0.2);
    }
    #status {
      position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
      font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
      color: rgba(255,255,255,0.35); white-space: nowrap;
    }
    .ui-btn {
      position: absolute;
      pointer-events: all;
      color: rgba(255,255,255,0.55);
      font-size: 11px; letter-spacing: 0.08em;
      background: rgba(0,0,0,0.45);
      padding: 7px 14px; border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(6px);
      cursor: pointer;
      transition: color 0.2s, background 0.2s;
      user-select: none;
    }
    .ui-btn:hover { color: #fff; background: rgba(0,0,0,0.65); }
    .ui-btn.hidden { color: rgba(255,255,255,0.25); border-color: rgba(255,255,255,0.06); }
    #toggleSkeleton { bottom: 28px; right: 18px; }
    #changeMode     { bottom: 28px; right: 100px; }
  </style>
</head>
<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="colorOverlay"></canvas>
<canvas id="canvas"></canvas>

<div id="ui">
  <a id="back" href="../vr/">← назад</a>
  <span id="label">Dance Room</span>
  <div id="status">Загрузка...</div>
  <button id="changeMode" class="ui-btn">change mode</button>
  <button id="toggleSkeleton" class="ui-btn">скелет</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
<script>
  const video         = document.getElementById('video');
  const canvas        = document.getElementById('canvas');
  const ctx           = canvas.getContext('2d');
  const overlayCanvas = document.getElementById('colorOverlay');
  const overlayCtx    = overlayCanvas.getContext('2d');
  const statusEl      = document.getElementById('status');

  // Силуэт тела
  const silCv   = document.createElement('canvas');
  const maskCtx = silCv.getContext('2d');
  let   silFlash = 0;

  // Детектор ударов / хлопков (Web Audio)
  let beatAnalyser = null, beatTimeBuf = null, beatEnv = 0;

  let skeletonVisible = true;
  const toggleBtn = document.getElementById('toggleSkeleton');
  toggleBtn.addEventListener('click', () => {
    skeletonVisible = !skeletonVisible;
    toggleBtn.classList.toggle('hidden', !skeletonVisible);
  });

  let renderMode = 0; // 0 — скелет, 1 — цвет+RGB, 2 — тело из частиц
  const changeModeBtn = document.getElementById('changeMode');
  changeModeBtn.addEventListener('click', () => {
    renderMode = (renderMode + 1) % 3;
    changeModeBtn.textContent = ['change mode','change mode ●','change mode ◉'][renderMode];
  });

  function resize() {
    canvas.width  = overlayCanvas.width  = window.innerWidth;
    canvas.height = overlayCanvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  function lx(lms, i) { return (1 - lms[i].x) * canvas.width; }
  function ly(lms, i) { return lms[i].y * canvas.height; }
  function lv(lms, i) { return lms[i].visibility ?? 0; }

  // Сглаживание только для плеч (11, 12) — руки без задержки, плечи стабильны
  const SHOULDER_IDS = [11, 12];
  const shoulderBuf = {};
  const SHOULDER_ALPHA = 0.25;
  SHOULDER_IDS.forEach(id => { shoulderBuf[id] = null; });

  function smoothShoulders(lms) {
    SHOULDER_IDS.forEach(id => {
      const l = lms[id];
      const v = l.visibility ?? 0;
      if (!shoulderBuf[id]) {
        shoulderBuf[id] = { x: l.x, y: l.y, visibility: v };
      } else {
        shoulderBuf[id].x          += (l.x - shoulderBuf[id].x) * SHOULDER_ALPHA;
        shoulderBuf[id].y          += (l.y - shoulderBuf[id].y) * SHOULDER_ALPHA;
        shoulderBuf[id].visibility += (v   - shoulderBuf[id].visibility) * SHOULDER_ALPHA;
      }
      lms[id] = shoulderBuf[id];
    });
    return lms;
  }

  // Вычисляет виртуальную точку — макушку головы (выше носа)
  function crownPoint(lms) {
    const nose    = lms[0];
    // среднее по двум глазам для стабильности
    const eyeY    = (lms[2].y + lms[5].y) * 0.5;
    const eyeVis  = Math.min(lms[2].visibility ?? 0, lms[5].visibility ?? 0);
    const noseToEye = nose.y - eyeY;            // >0 нос ниже глаз
    return {
      x:          nose.x,
      y:          nose.y - noseToEye * 2.2,     // экстраполируем вверх
      visibility: Math.min(nose.visibility ?? 0, eyeVis),
    };
  }

  // Центр ладони: среднее запястья + указательного + мизинца
  function palmPoint(lms, wrist, index, pinky) {
    const vw = lms[wrist].visibility ?? 0;
    const vi = lms[index].visibility ?? 0;
    const vp = lms[pinky].visibility ?? 0;
    const vis = Math.min(vw, Math.max(vi, vp));
    // если пальцы не видны — смещаем от запястья в направлении index finger
    const sx = (lms[wrist].x * 0.5 + lms[index].x * 0.35 + lms[pinky].x * 0.15);
    const sy = (lms[wrist].y * 0.5 + lms[index].y * 0.35 + lms[pinky].y * 0.15);
    return { x: sx, y: sy, visibility: vis };
  }

  const SEGMENTS = [
    { color: '#a78bfa', pairs: [[0,1],[1,2],[2,3],[3,7],[0,4],[4,5],[5,6],[6,8],[9,10]] },
    { color: '#ffffff', pairs: [[11,12],[11,23],[12,24],[23,24]] },
    { color: '#ff2d55', pairs: [[11,13],[13,15],[12,14],[14,16]] },
    { color: '#30d5c8', pairs: [[23,25],[25,27],[24,26],[26,28]] },
    { color: '#ff9f0a', pairs: [[15,17],[15,19],[17,19],[16,18],[16,20],[18,20]] },
    { color: '#32d74b', pairs: [[27,29],[29,31],[27,31],[28,30],[30,32],[28,32]] },
  ];
  const BIG_JOINTS = new Set([11,12,15,16,23,24,27,28]);
  const VIS_MIN = 0.25; // порог ниже которого не рисуем (снижен для дальних планов)

  function drawMarker(x, y, r, color, alpha) {
    ctx.save();
    ctx.globalAlpha  = alpha;
    ctx.shadowBlur   = 18;
    ctx.shadowColor  = color;
    ctx.strokeStyle  = color;
    ctx.lineWidth    = 2;
    // внешнее кольцо
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.stroke();
    // внутренняя точка
    ctx.fillStyle = '#fff';
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(x, y, r * 0.35, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawSkeleton(lms) {
    const crown     = crownPoint(lms);
    const leftPalm  = palmPoint(lms, 15, 19, 17);
    const rightPalm = palmPoint(lms, 16, 20, 18);

    ctx.save();
    ctx.lineCap   = 'round';
    ctx.lineWidth = 3;

    SEGMENTS.forEach(({ color, pairs }) => {
      ctx.strokeStyle = color;
      ctx.shadowColor = color;
      ctx.shadowBlur  = 10;
      pairs.forEach(([a, b]) => {
        const va = lv(lms, a), vb = lv(lms, b);
        if (va < VIS_MIN || vb < VIS_MIN) return;
        ctx.globalAlpha = Math.min(va, vb);
        ctx.beginPath();
        ctx.moveTo(lx(lms, a), ly(lms, a));
        ctx.lineTo(lx(lms, b), ly(lms, b));
        ctx.stroke();
      });
    });

    ctx.fillStyle   = '#fff';
    ctx.shadowColor = '#fff';
    ctx.shadowBlur  = 12;
    for (let i = 0; i < lms.length; i++) {
      const v = lv(lms, i);
      if (v < VIS_MIN) continue;
      ctx.globalAlpha = v;
      ctx.beginPath();
      ctx.arc(lx(lms, i), ly(lms, i), BIG_JOINTS.has(i) ? 5 : 3, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.shadowBlur = 0;
    ctx.font       = 'bold 10px monospace';
    ctx.textAlign  = 'left';
    for (let i = 0; i < lms.length; i++) {
      const v = lv(lms, i);
      if (v < VIS_MIN) continue;
      ctx.globalAlpha = Math.min(v, 0.8);
      ctx.fillStyle   = '#ffff00';
      ctx.fillText(i, lx(lms, i) + 6, ly(lms, i) - 4);
    }

    function drawShoulderAngle(px, py, dx, dy, color) {
      const rad  = Math.atan2(dy, dx);
      const deg  = Math.round(rad * 180 / Math.PI);
      const arcR = 26;
      ctx.save();
      ctx.lineWidth = 1.5; ctx.strokeStyle = color; ctx.globalAlpha = 0.65;
      ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(px + arcR, py); ctx.stroke();
      ctx.beginPath(); ctx.arc(px, py, arcR, 0, rad, rad < 0); ctx.stroke();
      ctx.globalAlpha = 0.9; ctx.fillStyle = color;
      ctx.font = 'bold 11px monospace'; ctx.textAlign = 'center'; ctx.shadowBlur = 0;
      ctx.fillText(deg + '°', px, py + 18);
      ctx.restore();
    }

    if (lv(lms, 12) >= VIS_MIN && lv(lms, 14) >= VIS_MIN)
      drawShoulderAngle(lx(lms,12), ly(lms,12), lx(lms,14)-lx(lms,12), ly(lms,14)-ly(lms,12), '#00ffcc');
    if (lv(lms, 11) >= VIS_MIN && lv(lms, 13) >= VIS_MIN)
      drawShoulderAngle(lx(lms,11), ly(lms,11), lx(lms,13)-lx(lms,11), ly(lms,13)-ly(lms,11), '#ff9f0a');

    ctx.restore();

    if (crown.visibility > VIS_MIN)
      drawMarker((1-crown.x)*canvas.width, crown.y*canvas.height, 10, '#a78bfa', crown.visibility);
    if (leftPalm.visibility > VIS_MIN)
      drawMarker((1-leftPalm.x)*canvas.width, leftPalm.y*canvas.height, 12, '#ff9f0a', leftPalm.visibility);
    if (rightPalm.visibility > VIS_MIN)
      drawMarker((1-rightPalm.x)*canvas.width, rightPalm.y*canvas.height, 12, '#ff9f0a', rightPalm.visibility);
  }

  // ── Облако частиц вокруг точки 14 ────────────────────────────────────────
  const cloudParts    = [];
  let   cloudCx       = 0, cloudCy = 0;
  let   cloudWasActive = false;
  let   wristLastAngle = null;
  let   cloudAngVel    = 0;
  let   gestureIsActive = false;
  let   cloudAlpha     = 0;
  let   cloudSpeed     = 0;
  let   smoothSphScale = 1;

  const FOCAL = 500;

  function spawnCloudBurst(cx, cy) {
    cloudParts.length = 0;
    for (let i = 0; i < 350; i++) {
      const theta = Math.acos(2 * Math.random() - 1);
      const phi   = Math.random() * Math.PI * 2;
      const r     = 20 + Math.random() * 280;
      cloudParts.push({
        ox: Math.sin(theta) * Math.cos(phi) * r,
        oy: Math.cos(theta) * r,
        oz: Math.sin(theta) * Math.sin(phi) * r,
        sz: 2.8 + Math.random() * 3.5,
        psx: null, psy: null,
      });
    }
  }

  // Определение жеста и обновление состояния облака — работает всегда, скелет не нужен
  function processGesture(lms) {
    let angle11 = null, angle12 = null;
    if (lv(lms,12) >= VIS_MIN && lv(lms,14) >= VIS_MIN) {
      const dx = lx(lms,14)-lx(lms,12), dy = ly(lms,14)-ly(lms,12);
      angle12 = Math.atan2(dy, dx) * 180 / Math.PI;
    }
    if (lv(lms,11) >= VIS_MIN && lv(lms,13) >= VIS_MIN) {
      const dx = lx(lms,13)-lx(lms,11), dy = ly(lms,13)-ly(lms,11);
      angle11 = Math.atan2(dy, dx) * 180 / Math.PI;
    }
    gestureIsActive =
      angle11 !== null && angle12 !== null &&
      Math.abs(angle11 - 90) <= 20 &&
      Math.abs(angle12)      <= 20;

    if (gestureIsActive && lv(lms,14) >= VIS_MIN) {
      const ex = lx(lms,14), ey = ly(lms,14);
      cloudCx = ex; cloudCy = ey;
      if (!cloudWasActive) { spawnCloudBurst(ex, ey); cloudWasActive = true; }
      if (lv(lms,16) >= VIS_MIN) {
        const wa = Math.atan2(ly(lms,16)-ey, lx(lms,16)-ex);
        if (wristLastAngle !== null) {
          let delta = wa - wristLastAngle;
          if (delta >  Math.PI) delta -= 2 * Math.PI;
          if (delta < -Math.PI) delta += 2 * Math.PI;
          cloudAngVel = cloudAngVel * 0.92 + delta * 0.08;
        }
        wristLastAngle = wa;
      }
    } else {
      cloudWasActive = false;
      wristLastAngle = null;
      cloudAngVel   *= 0.97; // медленный распад — 2 сек инерции
    }
  }

  function drawGestureLight() {
    if (cloudAlpha < 0.01) return;
    const t   = Math.min(cloudSpeed / 0.06, 1);
    const hue = Math.round(200 - t * 170);
    const ex  = cloudCx, ey = cloudCy;
    ctx.save();
    ctx.globalAlpha = cloudAlpha;
    const glow = ctx.createRadialGradient(ex, ey, 0, ex, ey, 320);
    glow.addColorStop(0,   `hsla(${hue},80%,70%,0.50)`);
    glow.addColorStop(0.3, `hsla(${hue},70%,50%,0.18)`);
    glow.addColorStop(1,   'rgba(0,0,0,0)');
    ctx.fillStyle = glow;
    ctx.beginPath(); ctx.arc(ex, ey, 320, 0, Math.PI*2); ctx.fill();
    const core = ctx.createRadialGradient(ex, ey, 0, ex, ey, 80);
    core.addColorStop(0,   `hsla(${hue},40%,97%,1.0)`);
    core.addColorStop(0.2, `hsla(${hue},60%,82%,0.90)`);
    core.addColorStop(0.5, `hsla(${hue},70%,60%,0.45)`);
    core.addColorStop(1,   'rgba(0,0,0,0)');
    ctx.fillStyle = core;
    ctx.beginPath(); ctx.arc(ex, ey, 80, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  function updateCloudParticles() {
    cloudSpeed      = cloudSpeed * 0.94 + Math.abs(cloudAngVel) * 0.06;
    // держим alpha пока есть скорость — частицы вращаются по инерции ещё ~2 сек
    const spinAlive = gestureIsActive || cloudSpeed > 0.004;
    cloudAlpha     += ((spinAlive ? 1 : 0) - cloudAlpha) * (spinAlive ? 0.08 : 0.012);
    const t         = Math.min(cloudSpeed / 0.06, 1);
    smoothSphScale += ((1 + t * 0.8) - smoothSphScale) * 0.04; // плавный масштаб

    if (cloudParts.length === 0 || cloudAlpha < 0.01) return;

    const hue   = Math.round(200 - t * 170);
    const bright = Math.round(82 + t * 14);
    const sat    = Math.round(t * 80);
    const cosA   = Math.cos(cloudAngVel);
    const sinA   = Math.sin(cloudAngVel);
    const ss     = smoothSphScale;

    // вычисляем позиции и вращаем
    const sx = new Float32Array(cloudParts.length);
    const sy = new Float32Array(cloudParts.length);
    for (let i = 0; i < cloudParts.length; i++) {
      const p  = cloudParts[i];
      const nx = p.ox * cosA - p.oz * sinA;
      const nz = p.ox * sinA + p.oz * cosA;
      p.ox = nx; p.oz = nz;
      const sc = FOCAL / (FOCAL + p.oz * ss);
      sx[i] = sc > 0 ? cloudCx + p.ox * ss * sc : -9999;
      sy[i] = cloudCy + p.oy * ss * sc;
    }

    ctx.save();

    // шлейф — одна батч-линия при t > 0.3
    if (t > 0.3) {
      ctx.strokeStyle = `hsl(${hue},${sat}%,${bright}%)`;
      ctx.globalAlpha = cloudAlpha * t * 0.22;
      ctx.lineWidth   = 0.7;
      ctx.beginPath();
      for (let i = 0; i < cloudParts.length; i++) {
        const p = cloudParts[i];
        if (sx[i] < -1000 || p.psx === null) continue;
        ctx.moveTo(p.psx, p.psy);
        ctx.lineTo(sx[i], sy[i]);
      }
      ctx.stroke();
    }

    // точки
    ctx.fillStyle   = `hsl(${hue},${sat}%,${bright}%)`;
    ctx.globalAlpha = cloudAlpha * (0.78 + t * 0.22);
    for (let i = 0; i < cloudParts.length; i++) {
      if (sx[i] < -1000) continue;
      const p  = cloudParts[i];
      const sc = FOCAL / (FOCAL + p.oz * ss);
      const sr = Math.max(p.sz * sc, 0.8);
      ctx.fillRect(sx[i] - sr, sy[i] - sr, sr * 2, sr * 2);
      p.psx = sx[i]; p.psy = sy[i];
    }

    ctx.restore();
  }

  // ── Красный диск (жест: левая рука вверх + кулак) ───────────────────────
  let redDiskActive    = false;
  let redDiskWasActive = false;
  let redDiskX = 0, redDiskY = 0, redDiskR = 80;
  let redDiskAngle = 0;
  let redDiskAlpha = 0;
  const redDiskParts = [];

  function spawnRedDisk(cx, cy, r) {
    redDiskParts.length = 0;
    for (let i = 0; i < 140; i++) {
      const frac = 0.25 + Math.random() * 0.85;
      redDiskParts.push({
        a:   Math.random() * Math.PI * 2,
        r:   r * frac,
        spd: (0.018 + Math.random() * 0.02) * (Math.random() < 0.5 ? 1 : -1),
        sz:  1.2 + Math.random() * 2.5,
      });
    }
  }

  function processGesture2(lms) {
    let angle11 = null, angle12 = null;
    if (lv(lms,12) >= VIS_MIN && lv(lms,14) >= VIS_MIN) {
      angle12 = Math.atan2(ly(lms,14)-ly(lms,12), lx(lms,14)-lx(lms,12)) * 180/Math.PI;
    }
    if (lv(lms,11) >= VIS_MIN && lv(lms,13) >= VIS_MIN) {
      angle11 = Math.atan2(ly(lms,13)-ly(lms,11), lx(lms,13)-lx(lms,11)) * 180/Math.PI;
    }
    const poseOk = angle11 !== null && angle12 !== null &&
      Math.abs(angle11 - (-140)) <= 20 &&
      Math.abs(angle12 - 90)    <= 20;

    if (!poseOk || lv(lms,15) < VIS_MIN || lv(lms,13) < VIS_MIN) {
      redDiskActive = false; redDiskWasActive = false; return;
    }

    // кулак: указательный (19) близко к запястью (15) относительно предплечья
    const forearmLen = Math.hypot(lx(lms,15)-lx(lms,13), ly(lms,15)-ly(lms,13));
    const indexDist  = lv(lms,19) >= VIS_MIN
      ? Math.hypot(lx(lms,19)-lx(lms,15), ly(lms,19)-ly(lms,15)) : forearmLen;
    const isFist     = forearmLen > 10 && indexDist < forearmLen * 0.55;

    redDiskActive = isFist;
    if (redDiskActive) {
      redDiskX = lx(lms,15); redDiskY = ly(lms,15);
      redDiskR = Math.max(forearmLen * 0.75, 30);
      if (!redDiskWasActive) { spawnRedDisk(redDiskX, redDiskY, redDiskR); redDiskWasActive = true; }
    } else {
      redDiskWasActive = false;
    }
  }

  function drawRedDisk() {
    redDiskAlpha += ((redDiskActive ? 1 : 0) - redDiskAlpha) * (redDiskActive ? 0.1 : 0.02);
    if (redDiskAlpha < 0.01 || redDiskParts.length === 0) return;

    const cx = redDiskX, cy = redDiskY;
    ctx.save();

    // широкое рассеивание
    ctx.globalAlpha = redDiskAlpha * 0.85;
    const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, redDiskR * 2.2);
    glow.addColorStop(0,    'rgba(255,80,10,0.55)');
    glow.addColorStop(0.3,  'rgba(200,25,0,0.20)');
    glow.addColorStop(0.7,  'rgba(120,5,0,0.07)');
    glow.addColorStop(1,    'rgba(0,0,0,0)');
    ctx.fillStyle = glow;
    ctx.beginPath(); ctx.arc(cx, cy, redDiskR * 2.2, 0, Math.PI*2); ctx.fill();

    // яркое ядро
    ctx.globalAlpha = redDiskAlpha;
    const core = ctx.createRadialGradient(cx, cy, 0, cx, cy, redDiskR * 0.45);
    core.addColorStop(0,    'rgba(255,210,160,1.0)');
    core.addColorStop(0.25, 'rgba(255,80,20,0.90)');
    core.addColorStop(1,    'rgba(160,5,0,0)');
    ctx.fillStyle = core;
    ctx.beginPath(); ctx.arc(cx, cy, redDiskR * 0.45, 0, Math.PI*2); ctx.fill();

    // вращающиеся частицы
    ctx.globalAlpha = redDiskAlpha * 0.92;
    ctx.fillStyle   = '#ff4411';
    for (const p of redDiskParts) {
      p.a += p.spd;
      const x = cx + Math.cos(p.a) * p.r;
      const y = cy + Math.sin(p.a) * p.r;
      ctx.fillRect(x - p.sz, y - p.sz, p.sz * 2, p.sz * 2);
    }
    ctx.restore();
  }

  // Режим 1 — плотные точки с цветовой системой
  const BODY_DOTS = [
    { i: 0,  r: 16 },
    { i: 11, r: 18 }, { i: 12, r: 18 },
    { i: 13, r: 14 }, { i: 14, r: 14 },
    { i: 15, r: 11 }, { i: 16, r: 11 },
    { i: 23, r: 16 }, { i: 24, r: 16 },
  ];

  // Случайные соединения между точками тела (генерируются один раз)
  const bodyConns = [];
  // Скорость тела и смещение спектра
  const prevLandmarkPos = {};
  let   bodyMoveSpeed = 0;
  let   bodyHueOffset = 0;

  function initBodyConns() {
    bodyConns.length = 0;
    const n = BODY_DOTS.length;
    const used = new Set();
    let attempts = 0;
    while (bodyConns.length < 18 && attempts < 200) {
      attempts++;
      const a = Math.floor(Math.random() * n);
      const b = Math.floor(Math.random() * n);
      if (a === b) continue;
      const key = `${Math.min(a,b)}-${Math.max(a,b)}`;
      if (used.has(key)) continue;
      used.add(key);
      bodyConns.push({ a, b, key });
    }
  }

  // Суставы для дуг угла: { hinge, from, to }
  const ANGLE_JOINTS = [
    { hinge: 13, from: 11, to: 15 }, // левый локоть
    { hinge: 14, from: 12, to: 16 }, // правый локоть
    { hinge: 11, from: 13, to: 23 }, // левое плечо
    { hinge: 12, from: 14, to: 24 }, // правое плечо
  ];

  // 9 каналов цвета фона (левый, правый, тело)
  const bcs = { lR:0,lG:0,lB:0, rR:0,rG:0,rB:0, bR:0,bG:0,bB:0 };

  function initAudio() {
    if (beatAnalyser) return;
    navigator.mediaDevices.getUserMedia({ audio: true, video: false })
      .then(stream => {
        const ac = new AudioContext();
        beatAnalyser = ac.createAnalyser();
        beatAnalyser.fftSize = 512;
        beatAnalyser.smoothingTimeConstant = 0;
        ac.createMediaStreamSource(stream).connect(beatAnalyser);
        beatTimeBuf = new Uint8Array(beatAnalyser.fftSize);
      }).catch(() => {});
  }

  function measureBeat() {
    if (!beatAnalyser) return 0;
    beatAnalyser.getByteTimeDomainData(beatTimeBuf);
    let sum = 0;
    for (let i = 0; i < beatTimeBuf.length; i++) {
      const v = (beatTimeBuf[i] - 128) / 128;
      sum += v * v;
    }
    const rms = Math.sqrt(sum / beatTimeBuf.length);
    const spike = Math.max(0, rms - beatEnv * 2.2);
    beatEnv += rms > beatEnv ? (rms - beatEnv) * 0.8 : (rms - beatEnv) * 0.05;
    return spike;
  }

  function drawSilhouette(mask) {
    if (!mask) return;
    const a = 0.10 + silFlash * 0.90;
    if (a < 0.02) return;
    silCv.width  = canvas.width;
    silCv.height = canvas.height;
    maskCtx.clearRect(0, 0, silCv.width, silCv.height);
    // спокойный синеватый → ярко-белый при ударе
    const cr = Math.round(130 + silFlash * 125);
    const cg = Math.round(160 + silFlash * 95);
    maskCtx.fillStyle = `rgba(${cr},${cg},255,${a.toFixed(2)})`;
    maskCtx.fillRect(0, 0, silCv.width, silCv.height);
    // вырезаем силуэт маской (зеркалим под экран)
    maskCtx.globalCompositeOperation = 'destination-in';
    maskCtx.save();
    maskCtx.translate(silCv.width, 0); maskCtx.scale(-1, 1);
    maskCtx.drawImage(mask, 0, 0, silCv.width, silCv.height);
    maskCtx.restore();
    maskCtx.globalCompositeOperation = 'source-over';
    ctx.drawImage(silCv, 0, 0);
  }

  function drawBodyMode(lms) {
    const vis = i => lv(lms,i) >= VIS_MIN;
    const bodyCx = vis(11)&&vis(12) ? (lx(lms,11)+lx(lms,12))/2 : canvas.width/2;
    const ref = vis(11)&&vis(12) ? Math.max(Math.hypot(lx(lms,12)-lx(lms,11), ly(lms,12)-ly(lms,11)), 1) : 150;
    const nd = (a,b) => vis(a)&&vis(b) ? Math.sqrt(Math.min(Math.hypot(lx(lms,a)-lx(lms,b), ly(lms,a)-ly(lms,b))/(ref*1.6), 1)) : 0;
    const nh = i => {
      if (!vis(i)||!vis(11)||!vis(12)) return 0;
      return Math.sqrt(Math.min(Math.max(0, ((ly(lms,11)+ly(lms,12))/2-ly(lms,i))/(ref*1.2)), 1));
    };

    // Скорость тела — среднее смещение ключевых точек за кадр
    let totalSpd = 0, spCount = 0;
    for (const idx of [11,12,13,14,15,16]) {
      if (!vis(idx)) continue;
      const cx = lx(lms,idx), cy = ly(lms,idx);
      if (prevLandmarkPos[idx])
        totalSpd += Math.hypot(cx-prevLandmarkPos[idx].x, cy-prevLandmarkPos[idx].y);
      prevLandmarkPos[idx] = { x: cx, y: cy };
      spCount++;
    }
    if (spCount) bodyMoveSpeed = bodyMoveSpeed*0.75 + (totalSpd/spCount)*0.25;

    const dynA = Math.min(0.005 + bodyMoveSpeed * 0.003, 0.06);
    bodyHueOffset = (bodyHueOffset + bodyMoveSpeed * 0.8) % 360;

    // Правая рука (12→16) управляет ЛЕВЫМ фоном, левая (11→15) — ПРАВЫМ
    const tLR = nd(12,16); const tLG = nh(16);    const tLB = nd(14,24);
    const tRR = nd(11,15); const tRG = nh(15);    const tRB = nd(13,23);
    const tBR = nd(15,16); const tBG = nd(11,24); const tBB = nd(23,24);

    bcs.lR += (tLR-bcs.lR)*dynA; bcs.lG += (tLG-bcs.lG)*dynA; bcs.lB += (tLB-bcs.lB)*dynA;
    bcs.rR += (tRR-bcs.rR)*dynA; bcs.rG += (tRG-bcs.rG)*dynA; bcs.rB += (tRB-bcs.rB)*dynA;
    bcs.bR += (tBR-bcs.bR)*dynA; bcs.bG += (tBG-bcs.bG)*dynA; bcs.bB += (tBB-bcs.bB)*dynA;

    // Расстояние → позиция на цветовом круге (0=рука согнута, 1=вытянута, полный оборот)
    const lHue = (bcs.lR * 360 + bodyHueOffset) % 360;
    const rHue = (bcs.rR * 360 + bodyHueOffset + 120) % 360;
    const bHue = (bcs.bR * 360 + bodyHueOffset + 240) % 360;
    const lSat = 90, lLit = Math.round(38 + bcs.lG * 22);
    const rSat = 90, rLit = Math.round(38 + bcs.rG * 22);
    const bSat = 90, bLit = Math.round(42 + bcs.bG * 20);

    // Рисуем цвет на отдельный холст с CSS mix-blend-mode:difference → негатив поверх камеры
    const la = (0.12 + bcs.lR * 0.88).toFixed(2);
    const ra = (0.12 + bcs.rR * 0.88).toFixed(2);
    overlayCtx.save();
    const leftGrad = overlayCtx.createLinearGradient(bodyCx, 0, 0, 0);
    leftGrad.addColorStop(0,    `hsla(${lHue},92%,55%,0)`);
    leftGrad.addColorStop(0.3,  `hsla(${lHue},92%,55%,${(la*0.55).toFixed(2)})`);
    leftGrad.addColorStop(1,    `hsla(${lHue},92%,55%,${la})`);
    overlayCtx.fillStyle = leftGrad;
    overlayCtx.fillRect(0, 0, bodyCx, overlayCanvas.height);

    const rightGrad = overlayCtx.createLinearGradient(bodyCx, 0, overlayCanvas.width, 0);
    rightGrad.addColorStop(0,   `hsla(${rHue},92%,55%,0)`);
    rightGrad.addColorStop(0.3, `hsla(${rHue},92%,55%,${(ra*0.55).toFixed(2)})`);
    rightGrad.addColorStop(1,   `hsla(${rHue},92%,55%,${ra})`);
    overlayCtx.fillStyle = rightGrad;
    overlayCtx.fillRect(bodyCx, 0, overlayCanvas.width - bodyCx, overlayCanvas.height);
    overlayCtx.restore();

    // Ленивая инициализация случайных соединений
    if (bodyConns.length === 0) initBodyConns();

    // Соединения между точками + дистанции
    ctx.save();
    ctx.lineCap     = 'round';
    ctx.lineWidth   = 1.4;
    ctx.font        = 'bold 10px monospace';
    ctx.textAlign   = 'center';

    for (const { a, b } of bodyConns) {
      const da = BODY_DOTS[a], db = BODY_DOTS[b];
      if (!vis(da.i) || !vis(db.i)) continue;
      const ax = lx(lms,da.i), ay = ly(lms,da.i);
      const bx = lx(lms,db.i), by = ly(lms,db.i);
      const dist = Math.round(Math.hypot(bx-ax, by-ay));
      const lineHue = (bodyHueOffset + dist * 0.4) % 360;

      // линия — цвет из спектра, привязанный к длине
      ctx.globalAlpha = 0.72;
      ctx.strokeStyle = `hsl(${lineHue},90%,72%)`;
      ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(bx, by); ctx.stroke();

      // значение дистанции
      ctx.globalAlpha = 0.92;
      ctx.fillStyle   = `hsl(${lineHue},85%,88%)`;
      ctx.fillText(dist, (ax+bx)/2, (ay+by)/2 - 5);
    }
    ctx.restore();

    // Дуги углов на суставах
    ctx.save();
    ctx.font      = 'bold 9px monospace';
    ctx.textAlign = 'center';
    for (const { hinge, from, to } of ANGLE_JOINTS) {
      if (!vis(hinge) || !vis(from) || !vis(to)) continue;
      const hx = lx(lms,hinge), hy = ly(lms,hinge);
      const a1 = Math.atan2(ly(lms,from)-hy, lx(lms,from)-hx);
      const a2 = Math.atan2(ly(lms,to)  -hy, lx(lms,to)  -hx);
      let sweep = a2 - a1;
      if (sweep >  Math.PI) sweep -= 2*Math.PI;
      if (sweep < -Math.PI) sweep += 2*Math.PI;
      const deg = Math.abs(Math.round(sweep * 180 / Math.PI));
      const arcR = 20;
      ctx.globalAlpha  = 0.7;
      ctx.strokeStyle  = '#00ffcc';
      ctx.lineWidth    = 1.2;
      ctx.beginPath();
      ctx.arc(hx, hy, arcR, a1, a1 + sweep, sweep < 0);
      ctx.stroke();
      const midA = a1 + sweep * 0.5;
      ctx.globalAlpha = 0.85;
      ctx.fillStyle   = '#00ffcc';
      ctx.fillText(deg + '°', hx + Math.cos(midA)*(arcR+13), hy + Math.sin(midA)*(arcR+13));
    }
    ctx.restore();

    // Тело — точки со своим независимым HSL-цветом
    ctx.save();
    for (const { i, r } of BODY_DOTS) {
      const v = lv(lms,i);
      if (v < VIS_MIN) continue;
      const x = lx(lms,i), y = ly(lms,i);
      const dotHue = (bHue + i * 14) % 360;
      ctx.globalAlpha = v;
      ctx.fillStyle = `hsl(${dotHue},${bSat}%,${bLit+20}%)`;
      ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); ctx.fill();
      const g = ctx.createRadialGradient(x, y, r*0.4, x, y, r*4);
      g.addColorStop(0, `hsla(${dotHue},${bSat}%,${bLit+20}%,${0.55*v})`);
      g.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(x, y, r*4, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();

  }

  // ── Волна частиц (правая рука горизонтально + левая рука вверх) ──────────
  const waveParts   = [];
  const WAVE_MAX    = 600;
  let   waveActive  = false;
  let   waveHue     = 0;
  let   waveHandPX  = null, waveHandPY = null;
  let   waveVX = 0, waveVY = 0;

  function processWaveGesture(lms) {
    // Правая рука горизонтально: угол shoulder(12)→wrist(16) ≈ 0° ± 30°, рука вытянута
    if (lv(lms,12) < VIS_MIN || lv(lms,16) < VIS_MIN || lv(lms,15) < VIS_MIN) {
      waveActive = false; waveHandPX = null; return;
    }
    const angleRW = Math.atan2(ly(lms,16)-ly(lms,12), lx(lms,16)-lx(lms,12)) * 180/Math.PI;
    const armLen  = Math.hypot(lx(lms,16)-lx(lms,12), ly(lms,16)-ly(lms,12));
    const refW    = Math.abs(lx(lms,11)-lx(lms,12)) || 100;
    if (Math.abs(angleRW) > 30 || armLen < refW * 0.8) {
      waveActive = false; waveHandPX = null; return;
    }

    // Скорость левого запястья
    const hx = lx(lms,15), hy = ly(lms,15);
    if (waveHandPX !== null) {
      waveVX = waveVX * 0.65 + (hx - waveHandPX) * 0.35;
      waveVY = waveVY * 0.65 + (hy - waveHandPY) * 0.35;
    }
    waveHandPX = hx; waveHandPY = hy;

    waveActive = waveVY < -2.5; // левая рука движется вверх
    if (waveActive) spawnWave(hx, hy);
  }

  function spawnWave(hx, hy) {
    const spd = Math.max(-waveVY, 3);
    for (let i = 0; i < 14 && waveParts.length < WAVE_MAX; i++) {
      const spread = (Math.random()-0.5) * 55;
      waveParts.push({
        x:  hx + spread,
        y:  hy + (Math.random()-0.5)*25,
        vx: waveVX*0.4 + spread*0.06,
        vy: waveVY*0.5 - Math.random()*spd*0.6,
        life: 1,
        maxLife: 55 + Math.random()*70,
        sz: 2.5 + Math.random()*4,
        hue: waveHue + Math.random()*40,
      });
    }
    waveHue = (waveHue + 3) % 360;
  }

  function updateWaveParticles() {
    if (waveParts.length === 0) return;
    ctx.save();
    ctx.lineCap = 'round';
    for (let i = waveParts.length-1; i >= 0; i--) {
      const p = waveParts[i];
      p.x += p.vx; p.y += p.vy;
      p.vx *= 0.985; p.vy *= 0.985; // плавная инерция
      p.life -= 1/p.maxLife;
      if (p.life <= 0) { waveParts.splice(i,1); continue; }
      ctx.globalAlpha = p.life * p.life * 0.95;
      ctx.fillStyle   = `hsl(${p.hue % 360},100%,82%)`;
      const sr = p.sz * p.life + 0.5;
      ctx.fillRect(p.x-sr, p.y-sr, sr*2, sr*2);
    }
    ctx.restore();
  }

  // ── Обе руки вверх → белый свет + лучи ────────────────────────────────────
  let bothHandsUp       = false;
  let bothHandsStrength = 0;
  const RAYS = [];

  function ensureRays() {
    if (RAYS.length > 0) return;
    for (let i = 0; i < 24; i++) {
      RAYS.push({
        x:   Math.random() * canvas.width,
        y:   Math.random() * canvas.height * 2,
        w:   8  + Math.random() * 55,
        spd: 4  + Math.random() * 9,
        a:   0.18 + Math.random() * 0.62,
      });
    }
  }

  function processBothHandsUp(lms) {
    if (lv(lms,15) < VIS_MIN || lv(lms,16) < VIS_MIN ||
        lv(lms,11) < VIS_MIN || lv(lms,12) < VIS_MIN) {
      bothHandsUp = false; return;
    }
    bothHandsUp = ly(lms,15) < ly(lms,11) && ly(lms,16) < ly(lms,12);
  }

  function drawBothHandsEffect() {
    bothHandsStrength += ((bothHandsUp ? 1 : 0) - bothHandsStrength)
                       * (bothHandsUp ? 0.045 : 0.028);
    if (bothHandsStrength < 0.005) return;

    ensureRays();
    const s = bothHandsStrength;
    ctx.save();

    // Белое свечение — нарастает квадратично для драматичного эффекта
    ctx.globalAlpha = s * s * 0.75;
    ctx.fillStyle   = '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Лучи — тонкие вертикальные прямоугольники, летят снизу вверх
    ctx.fillStyle = '#ffffff';
    for (const r of RAYS) {
      r.y -= r.spd * (0.4 + s * 1.4);
      if (r.y < -canvas.height * 0.8) {
        r.y = canvas.height + 50 + Math.random() * 250;
        r.x = Math.random() * canvas.width;
      }
      const rayH = canvas.height * (0.38 + (r.w / 63) * 0.28);
      // вертикальный градиент луча: прозрачный снизу → яркий → прозрачный сверху
      const grad = ctx.createLinearGradient(0, r.y, 0, r.y - rayH);
      grad.addColorStop(0,    'rgba(255,255,255,0)');
      grad.addColorStop(0.25, `rgba(255,255,255,${r.a * s})`);
      grad.addColorStop(0.75, `rgba(255,255,255,${r.a * s})`);
      grad.addColorStop(1,    'rgba(255,255,255,0)');
      ctx.fillStyle   = grad;
      ctx.globalAlpha = 1;
      ctx.fillRect(r.x - r.w * 0.5, r.y - rayH, r.w, rayH);
    }

    ctx.restore();
  }

  // ── Линии предплечий через весь экран ──────────────────────────────────
  function drawForearmLines(lms) {
    const arms = [
      { e: 13, w: 15, hue: 25  },
      { e: 14, w: 16, hue: 200 },
    ];
    ctx.save();
    ctx.lineCap = 'butt';
    for (const { e, w, hue } of arms) {
      if (lv(lms,e) < VIS_MIN || lv(lms,w) < VIS_MIN) continue;
      const ex = lx(lms,e), ey = ly(lms,e);
      const wx = lx(lms,w), wy = ly(lms,w);
      const dx = wx-ex, dy = wy-ey;
      const len = Math.hypot(dx,dy);
      if (len < 10) continue;
      const nx = dx/len, ny = dy/len;
      const far = Math.max(canvas.width, canvas.height) * 2;
      const vis = Math.min(lv(lms,e), lv(lms,w));
      ctx.strokeStyle = `hsl(${hue},90%,72%)`;
      ctx.shadowColor = `hsl(${hue},90%,72%)`;
      ctx.shadowBlur  = 6;
      // тонкая линия через весь экран
      ctx.globalAlpha = vis * 0.14;
      ctx.lineWidth   = 1;
      ctx.beginPath();
      ctx.moveTo(ex - nx*far, ey - ny*far);
      ctx.lineTo(ex + nx*far, ey + ny*far);
      ctx.stroke();
      // само предплечье ярче
      ctx.globalAlpha = vis * 0.55;
      ctx.lineWidth   = 1.8;
      ctx.beginPath(); ctx.moveTo(ex,ey); ctx.lineTo(wx,wy); ctx.stroke();
    }
    ctx.restore();
  }

  // ── Парящий 3D куб ──────────────────────────────────────────────────────
  let cubeHalfSize  = 110;
  let cubeX3d       = -1;   // -1 = не инициализирован
  let cubeY3d       = 0;
  let cubeRX        = 0, cubeRY = 0, cubeRZ = 0;
  const cubeAutoSpd = { x: 0.004, y: 0.009, z: 0.002 };
  let cubeGrabbed   = false;
  let cubeGrabStr   = 0;
  let cubePrevDist  = null;
  let cubePrevMidX  = null, cubePrevMidY = null;
  let cubePrevAngle = null;

  const CUBE_EDGES = [
    [0,1],[1,2],[2,3],[3,0],
    [4,5],[5,6],[6,7],[7,4],
    [0,4],[1,5],[2,6],[3,7],
  ];

  function cubeProject() {
    const s  = cubeHalfSize;
    const cxr = Math.cos(cubeRX), sxr = Math.sin(cubeRX);
    const cyr = Math.cos(cubeRY), syr = Math.sin(cubeRY);
    const czr = Math.cos(cubeRZ), szr = Math.sin(cubeRZ);
    const local = [
      [-s,-s,-s],[s,-s,-s],[s,s,-s],[-s,s,-s],
      [-s,-s, s],[s,-s, s],[s,s, s],[-s,s, s],
    ];
    return local.map(([x,y,z]) => {
      const y1 = y*cxr - z*sxr, z1 = y*sxr + z*cxr;
      const x2 = x*cyr + z1*syr, z2 = -x*syr + z1*cyr;
      const x3 = x2*czr - y1*szr, y3 = x2*szr + y1*czr;
      const sc = FOCAL / (FOCAL + z2);
      return [cubeX3d + x3*sc, cubeY3d + y3*sc, sc];
    });
  }

  function processCubeGrab(lms) {
    if (!lms || lv(lms,15) < VIS_MIN || lv(lms,16) < VIS_MIN) {
      cubeGrabbed = false; cubePrevDist = null; return;
    }
    const h1x = lx(lms,15), h1y = ly(lms,15);
    const h2x = lx(lms,16), h2y = ly(lms,16);
    const midX = (h1x+h2x)*0.5, midY = (h1y+h2y)*0.5;
    const dist  = Math.hypot(h2x-h1x, h2y-h1y);
    const angle = Math.atan2(h2y-h1y, h2x-h1x);
    const r1 = Math.hypot(h1x-cubeX3d, h1y-cubeY3d);
    const r2 = Math.hypot(h2x-cubeX3d, h2y-cubeY3d);
    const inside = r1 < cubeHalfSize*1.5 && r2 < cubeHalfSize*1.5;

    if (!cubeGrabbed && inside) {
      cubeGrabbed   = true;
      cubePrevDist  = dist; cubePrevMidX = midX; cubePrevMidY = midY;
      cubePrevAngle = angle; return;
    }
    if (cubeGrabbed) {
      if (!inside && Math.hypot(midX-cubeX3d, midY-cubeY3d) > cubeHalfSize*4) {
        cubeGrabbed = false; cubePrevDist = null; return;
      }
      if (cubePrevDist && dist > 5)
        cubeHalfSize = Math.max(40, Math.min(380, cubeHalfSize*(dist/cubePrevDist)));
      if (cubePrevMidX !== null) { cubeX3d += midX-cubePrevMidX; cubeY3d += midY-cubePrevMidY; }
      if (cubePrevAngle !== null) {
        let da = angle - cubePrevAngle;
        if (da >  Math.PI) da -= 2*Math.PI;
        if (da < -Math.PI) da += 2*Math.PI;
        cubeRZ += da;
        // покачивание по Y от горизонтального движения рук
        cubeRY += (midX - cubeX3d) * 0.00018;
        cubeRX += (midY - cubeY3d) * 0.00018;
      }
      cubePrevDist  = dist; cubePrevMidX = midX; cubePrevMidY = midY; cubePrevAngle = angle;
    }
  }

  function drawCube() {
    if (cubeX3d < 0) { cubeX3d = canvas.width*0.5; cubeY3d = canvas.height*0.42; }
    cubeGrabStr += ((cubeGrabbed ? 1 : 0) - cubeGrabStr) * 0.06;
    if (!cubeGrabbed) { cubeRX += cubeAutoSpd.x; cubeRY += cubeAutoSpd.y; cubeRZ += cubeAutoSpd.z; }
    const verts  = cubeProject();
    const hue    = 185 + Math.round(cubeGrabStr * 55);
    const baseA  = 0.28 + cubeGrabStr * 0.55;
    ctx.save();
    ctx.lineCap    = 'round';
    ctx.lineWidth  = 1 + cubeGrabStr * 2.5;
    ctx.strokeStyle = `hsl(${hue},85%,75%)`;
    ctx.shadowColor = `hsl(${hue},100%,70%)`;
    ctx.shadowBlur  = 6 + cubeGrabStr * 18;
    for (const [a, b] of CUBE_EDGES) {
      const [ax, ay, sca] = verts[a];
      const [bx, by, scb] = verts[b];
      ctx.globalAlpha = baseA * (sca+scb)*0.5;
      ctx.beginPath(); ctx.moveTo(ax,ay); ctx.lineTo(bx,by); ctx.stroke();
    }
    ctx.fillStyle  = `hsl(${hue},100%,92%)`;
    ctx.shadowBlur = 4 + cubeGrabStr*10;
    const dotR = 2 + cubeGrabStr*2;
    for (const [px, py, sc] of verts) {
      ctx.globalAlpha = (0.45 + cubeGrabStr*0.45) * sc;
      ctx.beginPath(); ctx.arc(px, py, dotR, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }

  // ── Режим 2: пространство частиц с гравитацией к силуэту ─────────────────
  const M2_RES = 52;
  let   m2Parts = null;   // lazy init
  let   m2Hue   = 0;

  const m2Cv   = document.createElement('canvas');
  m2Cv.width   = m2Cv.height = M2_RES;
  const m2SCtx = m2Cv.getContext('2d', { willReadFrequently: true });
  const m2Mask = new Float32Array(M2_RES * M2_RES);
  let   m2HasBody = false;

  function m2InitParts() {
    m2Parts = [];
    for (let i = 0; i < 4000; i++) {
      m2Parts.push({
        x:  Math.random() * canvas.width,
        y:  Math.random() * canvas.height,
        z:  (Math.random() - 0.5) * 500,
        vx: (Math.random() - 0.5) * 0.7,
        vy: (Math.random() - 0.5) * 0.7,
        vz: (Math.random() - 0.5) * 0.2,
        hue: Math.random() * 360,
        sz:  1.4 + Math.random() * 2.4,
      });
    }
  }

  function m2ReadMask(mask) {
    if (!mask) { m2Mask.fill(0); m2HasBody = false; return; }
    m2SCtx.save();
    m2SCtx.translate(M2_RES, 0); m2SCtx.scale(-1, 1);
    m2SCtx.drawImage(mask, 0, 0, M2_RES, M2_RES);
    m2SCtx.restore();
    const d = m2SCtx.getImageData(0, 0, M2_RES, M2_RES).data;
    let sum = 0;
    for (let i = 0; i < M2_RES * M2_RES; i++) {
      m2Mask[i] = d[i * 4] / 255;
      sum += m2Mask[i];
    }
    m2HasBody = sum > 60;
  }

  // O(1) lookup: экранные координаты → значение маски
  function m2S(x, y) {
    const mx = Math.max(0, Math.min(M2_RES - 1, (x / canvas.width  * M2_RES) | 0));
    const my = Math.max(0, Math.min(M2_RES - 1, (y / canvas.height * M2_RES) | 0));
    return m2Mask[my * M2_RES + mx];
  }

  function updateMode2(mask) {
    if (!m2Parts) m2InitParts();
    m2ReadMask(mask);
    m2Hue = (m2Hue + 0.22) % 360;

    // Двухмасштабный градиент — ближний (точность) + дальний (радиус притяжения)
    const s1x = canvas.width  / M2_RES * 1.5;
    const s2x = canvas.width  / M2_RES * 4.5;
    const s1y = canvas.height / M2_RES * 1.5;
    const s2y = canvas.height / M2_RES * 4.5;

    ctx.save();
    for (let i = 0; i < m2Parts.length; i++) {
      const p = m2Parts[i];

      let edgeness = 0;
      if (m2HasBody) {
        const mv = m2S(p.x, p.y);
        const gx = (m2S(p.x+s1x,p.y) - m2S(p.x-s1x,p.y)) * 0.55 +
                   (m2S(p.x+s2x,p.y) - m2S(p.x-s2x,p.y)) * 0.45;
        const gy = (m2S(p.x,p.y+s1y) - m2S(p.x,p.y-s1y)) * 0.55 +
                   (m2S(p.x,p.y+s2y) - m2S(p.x,p.y-s2y)) * 0.45;
        const gl = Math.hypot(gx, gy) + 0.0001;
        edgeness = Math.min(gl * 2.5, 1);

        if (mv < 0.5) {
          // снаружи — гравитация к краю силуэта
          p.vx += gx / gl * 0.26;
          p.vy += gy / gl * 0.26;
        } else {
          // внутри — выталкиваем обратно к поверхности
          p.vx -= gx / gl * 0.16;
          p.vy -= gy / gl * 0.16;
        }
      }

      // Броуновское движение + затухание
      p.vx += (Math.random() - 0.5) * 0.014;
      p.vy += (Math.random() - 0.5) * 0.014;
      p.vz += (Math.random() - 0.5) * 0.006;
      p.vx *= 0.93; p.vy *= 0.93; p.vz *= 0.97;
      p.x  += p.vx;  p.y  += p.vy;  p.z  += p.vz;

      // Wrap по краям
      if (p.x < -20)                  p.x = canvas.width  + 20;
      if (p.x > canvas.width  + 20)   p.x = -20;
      if (p.y < -20)                  p.y = canvas.height + 20;
      if (p.y > canvas.height + 20)   p.y = -20;
      if (p.z < -250) p.z = 250; else if (p.z > 250) p.z = -250;

      // Глубина → размер и яркость
      const depthN = (p.z + 250) / 500;
      const sc     = 0.45 + depthN;
      const sz     = p.sz * sc;
      const hue    = (p.hue + m2Hue) % 360;
      const lit    = 50 + edgeness * 34 + depthN * 12 | 0;
      const alpha  = 0.25 + edgeness * 0.60 + depthN * 0.12;

      // Гало (большой тусклый) + ядро (малый яркий) — имитация свечения без shadowBlur
      ctx.globalAlpha = alpha * 0.20;
      ctx.fillStyle   = `hsl(${hue},90%,${lit}%)`;
      ctx.fillRect(p.x - sz*2, p.y - sz*2, sz*4, sz*4);
      ctx.globalAlpha = alpha * 0.92;
      ctx.fillStyle   = `hsl(${hue},80%,${lit+16}%)`;
      ctx.fillRect(p.x - sz*.5, p.y - sz*.5, sz, sz);
    }
    ctx.restore();
  }

  function onResults(results) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);

    const lms = results.poseLandmarks;

    if (renderMode === 2) {
      if (lms) updateMode2(results.segmentationMask);
      else      updateMode2(null);
    } else {
      // Детектируем хлопок: резкий скачок амплитуды
      const beat = measureBeat();
      if (beat > 0.04) silFlash = Math.min(1, silFlash + beat * 10);
      silFlash *= 0.88;
      if (lms) {
        smoothShoulders(lms);
        processGesture(lms);
        processGesture2(lms);
        processWaveGesture(lms);
        processBothHandsUp(lms);
        processCubeGrab(lms);
      } else {
        gestureIsActive  = false;
        cloudAngVel     *= 0.95;
        redDiskActive    = false;
        redDiskWasActive = false;
        waveActive       = false;
        waveHandPX       = null;
        bothHandsUp      = false;
        cubeGrabbed      = false;
        cubePrevDist     = null;
      }

      drawGestureLight();
      updateCloudParticles();
      drawRedDisk();
      updateWaveParticles();
      drawCube();

      if (lms) {
        drawForearmLines(lms);
        if (renderMode === 0 && skeletonVisible) drawSkeleton(lms);
        if (renderMode === 1) drawBodyMode(lms);
        drawSilhouette(results.segmentationMask);
      }

      drawBothHandsEffect();
    }
  }

  const pose = new Pose({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });
  pose.setOptions({
    modelComplexity:        1,
    smoothLandmarks:        false, // отключено для нулевой задержки
    enableSegmentation:     true,
    smoothSegmentation:     true,
    minDetectionConfidence: 0.4, // ниже порог = лучше ловит издалека
    minTrackingConfidence:  0.4,
  });
  pose.onResults(onResults);

  let busy = false;
  function loop() {
    if (!busy && video.readyState >= 2) {
      busy = true;
      pose.send({ image: video }).finally(() => { busy = false; });
    }
    requestAnimationFrame(loop);
  }

  navigator.mediaDevices.getUserMedia({
    video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }
  }).then(stream => {
    video.srcObject = stream;
    video.onloadedmetadata = () => { video.play(); statusEl.textContent = ''; loop(); };
    initAudio();
  }).catch(() => { statusEl.textContent = 'Нет доступа к камере'; });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Dance Room — VoidWall</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
    #video {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }
    #canvas {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      z-index: 2;
    }
    #ui { position: fixed; inset: 0; z-index: 10; pointer-events: none; }
    #back {
      position: absolute; top: 18px; left: 18px;
      pointer-events: all;
      color: rgba(255,255,255,0.55);
      font-size: 11px; letter-spacing: 0.08em;
      text-decoration: none;
      background: rgba(0,0,0,0.45);
      padding: 7px 14px; border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(6px);
      transition: color 0.2s, background 0.2s;
    }
    #back:hover { color: #fff; background: rgba(0,0,0,0.65); }
    #label {
      position: absolute; top: 22px; right: 18px;
      font-size: 10px; letter-spacing: 0.3em;
      text-transform: uppercase; color: rgba(255,255,255,0.2);
    }
    #status {
      position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
      font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
      color: rgba(255,255,255,0.35); white-space: nowrap;
    }
    #toggleSkeleton {
      position: absolute; bottom: 28px; right: 18px;
      pointer-events: all;
      color: rgba(255,255,255,0.55);
      font-size: 11px; letter-spacing: 0.08em;
      background: rgba(0,0,0,0.45);
      padding: 7px 14px; border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(6px);
      cursor: pointer;
      transition: color 0.2s, background 0.2s;
      user-select: none;
    }
    #toggleSkeleton:hover { color: #fff; background: rgba(0,0,0,0.65); }
    #toggleSkeleton.hidden { color: rgba(255,255,255,0.25); border-color: rgba(255,255,255,0.06); }
  </style>
</head>
<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<div id="ui">
  <a id="back" href="../vr/">← назад</a>
  <span id="label">Dance Room</span>
  <div id="status">Загрузка...</div>
  <button id="toggleSkeleton">скелет</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script>
  const video    = document.getElementById('video');
  const canvas   = document.getElementById('canvas');
  const ctx      = canvas.getContext('2d');
  const statusEl = document.getElementById('status');

  let skeletonVisible = true;
  const toggleBtn = document.getElementById('toggleSkeleton');
  toggleBtn.addEventListener('click', () => {
    skeletonVisible = !skeletonVisible;
    toggleBtn.classList.toggle('hidden', !skeletonVisible);
  });

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // ── Распознавание рук ─────────────────────────────────────────────────────
  // { gesture: 'fist'|'open'|'neutral', x, y } в экранных координатах
  let latestHand = null;

  // центр ладони: среднее запястья и оснований пальцев
  function handCenter(hl) {
    const ids = [0, 5, 9, 13, 17];
    let sx = 0, sy = 0;
    ids.forEach(i => { sx += hl[i].x; sy += hl[i].y; });
    return {
      x: (1 - sx / ids.length) * canvas.width,
      y:      sy / ids.length  * canvas.height,
    };
  }

  // ориентационно-инвариантное: сравниваем расстояние кончика до запястья
  // с расстоянием от основания (MCP) до запястья
  function detectHandGesture(hl) {
    const TIPS = [8, 12, 16, 20];
    const MCPS = [5,  9, 13, 17];
    const w = hl[0];
    let curled = 0;
    for (let i = 0; i < 4; i++) {
      const td = Math.hypot(hl[TIPS[i]].x - w.x, hl[TIPS[i]].y - w.y);
      const md = Math.hypot(hl[MCPS[i]].x - w.x, hl[MCPS[i]].y - w.y);
      if (td < md * 1.15) curled++;
    }
    return curled >= 3 ? 'fist' : curled <= 1 ? 'open' : 'neutral';
  }

  const handsModel = new Hands({
    locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
  });
  handsModel.setOptions({
    maxNumHands:            1,
    modelComplexity:        0,  // быстрая модель
    minDetectionConfidence: 0.55,
    minTrackingConfidence:  0.5,
  });
  handsModel.onResults(res => {
    if (!res.multiHandLandmarks?.length) { latestHand = null; return; }
    const hl  = res.multiHandLandmarks[0];
    const pos = handCenter(hl);
    latestHand = { gesture: detectHandGesture(hl), ...pos };
  });

  function lx(lms, i) { return (1 - lms[i].x) * canvas.width; }
  function ly(lms, i) { return lms[i].y * canvas.height; }
  function lv(lms, i) { return lms[i].visibility ?? 0; }

  // Сглаживание только для плеч (11, 12) — руки без задержки, плечи стабильны
  const SHOULDER_IDS = [11, 12];
  const shoulderBuf = {};
  const SHOULDER_ALPHA = 0.25;
  SHOULDER_IDS.forEach(id => { shoulderBuf[id] = null; });

  function smoothShoulders(lms) {
    SHOULDER_IDS.forEach(id => {
      const l = lms[id];
      const v = l.visibility ?? 0;
      if (!shoulderBuf[id]) {
        shoulderBuf[id] = { x: l.x, y: l.y, visibility: v };
      } else {
        shoulderBuf[id].x          += (l.x - shoulderBuf[id].x) * SHOULDER_ALPHA;
        shoulderBuf[id].y          += (l.y - shoulderBuf[id].y) * SHOULDER_ALPHA;
        shoulderBuf[id].visibility += (v   - shoulderBuf[id].visibility) * SHOULDER_ALPHA;
      }
      lms[id] = shoulderBuf[id];
    });
    return lms;
  }

  // Вычисляет виртуальную точку — макушку головы (выше носа)
  function crownPoint(lms) {
    const nose    = lms[0];
    // среднее по двум глазам для стабильности
    const eyeY    = (lms[2].y + lms[5].y) * 0.5;
    const eyeVis  = Math.min(lms[2].visibility ?? 0, lms[5].visibility ?? 0);
    const noseToEye = nose.y - eyeY;            // >0 нос ниже глаз
    return {
      x:          nose.x,
      y:          nose.y - noseToEye * 2.2,     // экстраполируем вверх
      visibility: Math.min(nose.visibility ?? 0, eyeVis),
    };
  }

  // Центр ладони: среднее запястья + указательного + мизинца
  function palmPoint(lms, wrist, index, pinky) {
    const vw = lms[wrist].visibility ?? 0;
    const vi = lms[index].visibility ?? 0;
    const vp = lms[pinky].visibility ?? 0;
    const vis = Math.min(vw, Math.max(vi, vp));
    // если пальцы не видны — смещаем от запястья в направлении index finger
    const sx = (lms[wrist].x * 0.5 + lms[index].x * 0.35 + lms[pinky].x * 0.15);
    const sy = (lms[wrist].y * 0.5 + lms[index].y * 0.35 + lms[pinky].y * 0.15);
    return { x: sx, y: sy, visibility: vis };
  }

  const SEGMENTS = [
    { color: '#a78bfa', pairs: [[0,1],[1,2],[2,3],[3,7],[0,4],[4,5],[5,6],[6,8],[9,10]] },
    { color: '#ffffff', pairs: [[11,12],[11,23],[12,24],[23,24]] },
    { color: '#ff2d55', pairs: [[11,13],[13,15],[12,14],[14,16]] },
    { color: '#30d5c8', pairs: [[23,25],[25,27],[24,26],[26,28]] },
    { color: '#ff9f0a', pairs: [[15,17],[15,19],[17,19],[16,18],[16,20],[18,20]] },
    { color: '#32d74b', pairs: [[27,29],[29,31],[27,31],[28,30],[30,32],[28,32]] },
  ];
  const BIG_JOINTS = new Set([11,12,15,16,23,24,27,28]);
  const VIS_MIN = 0.25; // порог ниже которого не рисуем (снижен для дальних планов)

  function drawMarker(x, y, r, color, alpha) {
    ctx.save();
    ctx.globalAlpha  = alpha;
    ctx.shadowBlur   = 18;
    ctx.shadowColor  = color;
    ctx.strokeStyle  = color;
    ctx.lineWidth    = 2;
    // внешнее кольцо
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.stroke();
    // внутренняя точка
    ctx.fillStyle = '#fff';
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(x, y, r * 0.35, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawSkeleton(lms) {
    const crown     = crownPoint(lms);
    const leftPalm  = palmPoint(lms, 15, 19, 17);
    const rightPalm = palmPoint(lms, 16, 20, 18);

    ctx.save();
    ctx.lineCap   = 'round';
    ctx.lineWidth = 3;

    SEGMENTS.forEach(({ color, pairs }) => {
      ctx.strokeStyle = color;
      ctx.shadowColor = color;
      ctx.shadowBlur  = 10;
      pairs.forEach(([a, b]) => {
        const va = lv(lms, a), vb = lv(lms, b);
        if (va < VIS_MIN || vb < VIS_MIN) return;
        ctx.globalAlpha = Math.min(va, vb);
        ctx.beginPath();
        ctx.moveTo(lx(lms, a), ly(lms, a));
        ctx.lineTo(lx(lms, b), ly(lms, b));
        ctx.stroke();
      });
    });

    // Суставы
    ctx.fillStyle   = '#fff';
    ctx.shadowColor = '#fff';
    ctx.shadowBlur  = 12;
    for (let i = 0; i < lms.length; i++) {
      const v = lv(lms, i);
      if (v < VIS_MIN) continue;
      ctx.globalAlpha = v;
      ctx.beginPath();
      ctx.arc(lx(lms, i), ly(lms, i), BIG_JOINTS.has(i) ? 5 : 3, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.restore();

    // Макушка головы
    if (crown.visibility > VIS_MIN) {
      const cx = (1 - crown.x) * canvas.width;
      const cy = crown.y * canvas.height;
      drawMarker(cx, cy, 10, '#a78bfa', crown.visibility);
    }

    // Ладони
    if (leftPalm.visibility > VIS_MIN) {
      const px = (1 - leftPalm.x) * canvas.width;
      const py = leftPalm.y * canvas.height;
      drawMarker(px, py, 12, '#ff9f0a', leftPalm.visibility);
    }
    if (rightPalm.visibility > VIS_MIN) {
      const px = (1 - rightPalm.x) * canvas.width;
      const py = rightPalm.y * canvas.height;
      drawMarker(px, py, 12, '#ff9f0a', rightPalm.visibility);
    }
  }

  // ── Диск ──────────────────────────────────────────────────────────────────
  let diskAngle    = 0;
  let diskDir      = 1;
  let lastArmAngle = null;
  let diskAngVel   = 0;
  let diskScale    = 1;
  let diskBright   = 0;
  let diskBaseR    = 0;
  let diskEx = 0, diskEy = 0;
  let diskWasActive  = false;
  let diskHoldFrames = 0;
  const DISK_HOLD    = 25;

  // Стейт-машин: inactive → active → floating → grabbed → exploding
  const DS = { INACTIVE: 0, ACTIVE: 1, FLOATING: 2, GRABBED: 3, EXPLODING: 4 };
  let diskState    = DS.INACTIVE;
  let diskFloatT0  = 0;   // timestamp начала float
  let diskGrabT0   = 0;   // timestamp начала grab
  let grabPalmX    = 0, grabPalmY = 0;
  const FLOAT_MS   = 3000;
  const GRAB_MS    = 5000;
  const MIN_FLOAT_V = 0.048; // минимальная скорость чтобы диск завис

  const diskParts = [];
  const MAX_PARTS = 160;

  // Мгновенный спавн кольца покоящихся частиц при первой активации жеста
  function spawnIdleRing(ex, ey, displayR) {
    diskParts.length = 0; // чистим старые
    const count = 48;
    for (let i = 0; i < count; i++) {
      const a    = (i / count) * Math.PI * 2 + Math.random() * 0.25;
      const frac = 0.55 + Math.random() * 0.45;
      const r    = Math.min(displayR * frac, displayR * 1.25);
      // минимальная скорость — частицы "стоят" на орбите
      const tang = a + diskDir * Math.PI / 2;
      const spd  = 0.2 + Math.random() * 0.6;
      diskParts.push({
        x: ex + Math.cos(a) * r,
        y: ey + Math.sin(a) * r,
        vx: Math.cos(tang) * spd,
        vy: Math.sin(tang) * spd,
        life: 1,
        maxLife: 90 + Math.random() * 70,
        sz: 1.5 + Math.random() * 1.8,
        hue: 185 + Math.random() * 55,
        t: 0.7, // яркие с самого начала
      });
    }
  }

  // Offscreen canvas для диска — пересоздаётся только при смене размера/яркости
  const glowCanvas = document.createElement('canvas');
  const glowCtx    = glowCanvas.getContext('2d');
  let   glowCachedR = -1, glowCachedB = -1;

  function rebuildGlowCache(displayR) {
    const sz = Math.ceil(displayR * 2.5);
    if (glowCanvas.width !== sz) { glowCanvas.width = glowCanvas.height = sz; }
    const gc = glowCtx, c = sz / 2;
    gc.clearRect(0, 0, sz, sz);

    const outer = gc.createRadialGradient(c, c, 0, c, c, c);
    outer.addColorStop(0,   `rgba(60,140,255,${diskBright * 0.20})`);
    outer.addColorStop(0.5, `rgba(40,100,255,${diskBright * 0.08})`);
    outer.addColorStop(1,   'rgba(0,0,0,0)');
    gc.fillStyle = outer;
    gc.fillRect(0, 0, sz, sz);

    const core = gc.createRadialGradient(c, c, 0, c, c, displayR * 0.9);
    core.addColorStop(0,    `rgba(150,225,255,${0.50 * diskBright})`);
    core.addColorStop(0.35, `rgba(90,180,255,${0.28 * diskBright})`);
    core.addColorStop(0.70, `rgba(50,120,255,${0.08 * diskBright})`);
    core.addColorStop(1,    'rgba(0,0,0,0)');
    gc.fillStyle = core;
    gc.fillRect(0, 0, sz, sz);

    glowCachedR = displayR;
    glowCachedB = diskBright;
  }

  function renderDiskShape(ex, ey, displayR) {
    if (displayR < 10 || diskBright < 0.015) return;

    // перестраиваем кэш только при заметном изменении
    if (Math.abs(diskBright - glowCachedB) > 0.04 || Math.abs(displayR - glowCachedR) > 6) {
      rebuildGlowCache(displayR);
    }
    const half = glowCanvas.width / 2;
    ctx.globalAlpha = 1;
    ctx.drawImage(glowCanvas, ex - half, ey - half);

    // источник света на локте
    const srcR = 18 + diskBright * 58;
    const src  = ctx.createRadialGradient(ex, ey, 0, ex, ey, srcR);
    src.addColorStop(0,    `rgba(255,255,255,${Math.min(0.98, diskBright * 1.4)})`);
    src.addColorStop(0.18, `rgba(200,240,255,${diskBright * 1.1})`);
    src.addColorStop(0.50, `rgba(90,170,255,${diskBright * 0.55})`);
    src.addColorStop(1,    'rgba(0,0,0,0)');
    ctx.fillStyle = src;
    ctx.beginPath();
    ctx.arc(ex, ey, srcR, 0, Math.PI * 2);
    ctx.fill();
  }

  // Жест: правый локоть отведён в сторону
  function elbowDiskGesture(lms) {
    const vs = lv(lms, 12), ve = lv(lms, 14), vw = lv(lms, 16);
    if (vs < 0.4 || ve < 0.4 || vw < 0.4) return null;
    const sx = lx(lms, 12), sy = ly(lms, 12);
    const ex = lx(lms, 14), ey = ly(lms, 14);
    const dx = ex - sx, dy = Math.abs(ey - sy);
    const shoulderW = Math.abs(lx(lms, 11) - lx(lms, 12));
    if (dx < shoulderW * 0.7) return null;
    if (dy > dx * 0.55)       return null;
    return { ex, ey, wx: lx(lms, 16), wy: ly(lms, 16) };
  }

  // Орбитальная частица: { orbitR, orbitA, orbitSpd, life, maxLife, sz, hue, bright }
  // orbitSpd в рад/кадр — строго по окружности

  const BASE_ORB_SPD = 0.014; // медленное базовое вращение в покое

  function makeOrbParticle(baseR, bright) {
    const t = Math.min(diskAngVel / 0.09, 1);
    return {
      orbitR:   baseR * (0.80 + Math.random() * 0.38),
      orbitA:   Math.random() * Math.PI * 2,
      orbitSpd: BASE_ORB_SPD + diskAngVel * 3.8 + Math.random() * 0.008,
      life:     1,
      maxLife:  60 + Math.random() * 80,
      sz:       1.4 + t * 2.2,
      hue:      185 + Math.random() * 55,
      bright:   bright ?? (0.55 + t * 0.45),
    };
  }

  // начальное кольцо: 80 частиц равномерно по всему периметру
  function spawnIdleRing(ex, ey, baseR) {
    diskParts.length = 0;
    for (let i = 0; i < 80; i++) {
      const p = makeOrbParticle(baseR, 0.72);
      p.orbitA = (i / 80) * Math.PI * 2 + Math.random() * 0.12;
      diskParts.push(p);
    }
  }

  // поддерживаем пул: пока жест активен — восполняем умерших
  function maintainOrbitPool(baseR) {
    const TARGET = 90;
    const needed = Math.min(TARGET - diskParts.length, 5);
    for (let i = 0; i < needed; i++) diskParts.push(makeOrbParticle(baseR));
  }

  function updateDiskParticles() {
    if (diskParts.length === 0) return;
    const cx  = diskEx, cy = diskEy;
    const t   = Math.min(diskAngVel / 0.09, 1);

    ctx.save();
    ctx.lineCap = 'round';

    for (let i = diskParts.length - 1; i >= 0; i--) {
      const p = diskParts[i];

      // летящие частицы взрыва
      if (p.type === 'fly') {
        p.x  += p.vx; p.y += p.vy;
        p.vx *= 0.93; p.vy *= 0.93;
        p.life -= 1 / p.maxLife;
        if (p.life <= 0) { diskParts.splice(i, 1); continue; }
        const a = p.life * p.life * p.bright;
        ctx.globalAlpha = a;
        ctx.lineWidth   = p.sz * p.life + 0.3;
        ctx.strokeStyle = `hsl(${p.hue},100%,${88 + p.bright * 10}%)`;
        const ang = Math.atan2(p.vy, p.vx);
        const len = Math.hypot(p.vx, p.vy) * 3 * p.life;
        ctx.beginPath();
        ctx.moveTo(p.x - Math.cos(ang) * len, p.y - Math.sin(ang) * len);
        ctx.lineTo(p.x, p.y);
        ctx.stroke();
        continue;
      }

      // обновляем орбитальный угол — частица СТРОГО по окружности
      p.orbitSpd = BASE_ORB_SPD + diskAngVel * 3.8; // синхронизируем со скоростью
      p.orbitA  += p.orbitSpd * diskDir;
      p.life    -= 1 / p.maxLife;
      if (p.life <= 0) { diskParts.splice(i, 1); continue; }

      const r = p.orbitR;

      // длина дуги-хвоста: растёт со скоростью
      const trailAng = Math.min(p.orbitSpd * 16 * p.life, Math.PI * 0.6);
      const startA   = p.orbitA - diskDir * trailAng;
      const ccw      = diskDir < 0;

      // яркость: base + бонус за скорость
      const bright = p.bright * (0.6 + t * 0.4);

      // хвост
      ctx.globalAlpha = p.life * p.life * bright * 0.28;
      ctx.lineWidth   = p.sz * p.life * 0.5 + 0.3;
      ctx.strokeStyle = `hsl(${p.hue},90%,68%)`;
      ctx.beginPath();
      ctx.arc(cx, cy, r, startA, startA + diskDir * trailAng * 0.6, ccw);
      ctx.stroke();

      // голова
      ctx.globalAlpha = p.life * p.life * bright;
      ctx.lineWidth   = p.sz * p.life + 0.5;
      ctx.strokeStyle = `hsl(${p.hue},100%,${86 + t * 12}%)`;
      ctx.beginPath();
      ctx.arc(cx, cy, r, startA + diskDir * trailAng * 0.6, p.orbitA, ccw);
      ctx.stroke();
    }
    ctx.restore();
  }

  function tickDisk() {
    diskAngVel *= 0.96;
    const t = Math.min(diskAngVel / 0.09, 1);
    diskBright += (t * 0.45 - diskBright) * 0.05;
    if (diskAngVel < 0.0003 && diskBright < 0.02) return;
    const displayR = diskBaseR * diskScale;
    renderDiskShape(diskEx, diskEy, displayR);
  }

  // Взрыв: 150 частиц разлетаются во все стороны
  function spawnExplosion() {
    const cx = diskEx, cy = diskEy;
    const r  = diskBaseR * diskScale;
    diskParts.length = 0;
    for (let i = 0; i < 150; i++) {
      const a   = Math.random() * Math.PI * 2;
      const spd = 3 + Math.random() * 11;
      diskParts.push({
        type:    'fly',
        x:       cx + Math.cos(a) * r * Math.random(),
        y:       cy + Math.sin(a) * r * Math.random(),
        vx:      Math.cos(a) * spd,
        vy:      Math.sin(a) * spd,
        life:    1,
        maxLife: 55 + Math.random() * 55,
        sz:      1.8 + Math.random() * 3,
        hue:     185 + Math.random() * 55,
        bright:  0.95,
      });
    }
    diskBright = 1.0; // вспышка
  }

  // Возвращает ближайшую ладонь к точке (tx,ty) в экранных координатах
  function nearestPalm(lms, tx, ty) {
    const lp = palmPoint(lms, 15, 19, 17);
    const rp = palmPoint(lms, 16, 20, 18);
    const lpx = (1 - lp.x) * canvas.width,  lpy = lp.y * canvas.height;
    const rpx = (1 - rp.x) * canvas.width,  rpy = rp.y * canvas.height;
    const ld  = lp.visibility > 0.3 ? Math.hypot(lpx - tx, lpy - ty) : Infinity;
    const rd  = rp.visibility > 0.3 ? Math.hypot(rpx - tx, rpy - ty) : Infinity;
    if (ld < rd) return { x: lpx, y: lpy, d: ld };
    if (rd < Infinity) return { x: rpx, y: rpy, d: rd };
    return null;
  }

  function drawDisk(g) {
    const { ex, ey, wx, wy } = g;
    const baseR = Math.hypot(wx - ex, wy - ey);
    if (baseR < 20) return;

    diskEx = ex; diskEy = ey; diskBaseR = baseR;

    if (!diskWasActive) {
      diskBright = 0.60;
      diskScale  = 1;
      diskState  = DS.ACTIVE;
      spawnIdleRing(ex, ey, baseR);
    }
    diskWasActive = true;

    const armAngle = Math.atan2(wy - ey, wx - ex);
    let delta = 0;
    if (lastArmAngle !== null) {
      delta = armAngle - lastArmAngle;
      if (delta >  Math.PI) delta -= 2 * Math.PI;
      if (delta < -Math.PI) delta += 2 * Math.PI;
    }
    lastArmAngle = armAngle;
    if (Math.abs(delta) > 0.001) diskDir = Math.sign(delta);

    diskAngVel = diskAngVel * 0.90 + Math.abs(delta) * 0.10;

    const t = Math.min(diskAngVel / 0.09, 1);
    diskScale  += (1 + t * 2.4 - diskScale) * 0.06;
    // при статичном локте — минимальная яркость 0.45, растёт со скоростью
    const targetBright = 0.45 + t * 0.50;
    diskBright += (targetBright - diskBright) * 0.07;

    maintainOrbitPool(baseR); // восполняем умерших
    renderDiskShape(ex, ey, baseR * diskScale);
  }

  function onResults(results) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    updateDiskParticles();

    const lms = results.poseLandmarks;

    // ── Стейт-машин диска ──────────────────────────────────────────────────
    const now = performance.now();

    if (diskState === DS.ACTIVE) {
      const g = lms && elbowDiskGesture(lms);
      if (g) {
        diskHoldFrames = DISK_HOLD;
        drawDisk(g);
      } else {
        lastArmAngle = null;
        diskWasActive = false;
        if (diskHoldFrames > 0) {
          diskHoldFrames--;
          renderDiskShape(diskEx, diskEy, diskBaseR * diskScale);
        } else {
          // скорость была высокой — диск зависает
          if (diskAngVel >= MIN_FLOAT_V) {
            diskState   = DS.FLOATING;
            diskFloatT0 = now;
          } else {
            diskState = DS.INACTIVE;
            tickDisk();
          }
        }
      }

    } else if (diskState === DS.FLOATING) {
      const elapsed = now - diskFloatT0;

      // пульсирующая подсказка «сожми кулак в центре»
      diskBright = 0.42 + Math.sin(now / 180) * 0.13;
      maintainOrbitPool(diskBaseR);
      renderDiskShape(diskEx, diskEy, diskBaseR * diskScale);

      // захват — кулак в радиусе диска
      if (latestHand?.gesture === 'fist') {
        const d = Math.hypot(latestHand.x - diskEx, latestHand.y - diskEy);
        if (d < diskBaseR * 1.5) {
          diskState  = DS.GRABBED;
          diskGrabT0 = now;
          grabPalmX  = latestHand.x;
          grabPalmY  = latestHand.y;
        }
      }

      if (elapsed >= FLOAT_MS) {
        diskState = DS.EXPLODING;
        spawnExplosion();
      }

    } else if (diskState === DS.GRABBED) {
      // диск следует за ладонью
      if (latestHand) {
        grabPalmX = latestHand.x;
        grabPalmY = latestHand.y;
        // раскрытая ладонь — взрыв
        if (latestHand.gesture === 'open') {
          diskState = DS.EXPLODING;
          spawnExplosion();
        }
      }
      diskEx = grabPalmX; diskEy = grabPalmY;

      const elapsed = now - diskGrabT0;
      diskBright = 0.55 + (elapsed / GRAB_MS) * 0.4;
      maintainOrbitPool(diskBaseR);
      renderDiskShape(diskEx, diskEy, diskBaseR * diskScale);

      if (elapsed >= GRAB_MS) {
        diskState = DS.EXPLODING;
        spawnExplosion();
      }

    } else if (diskState === DS.EXPLODING) {
      // вспышка гаснет
      diskBright *= 0.88;
      if (diskBright > 0.05) renderDiskShape(diskEx, diskEy, diskBaseR * diskScale);
      // возвращаемся в inactive когда все частицы умерли
      if (diskParts.length === 0) {
        diskState  = DS.INACTIVE;
        diskBright = 0;
        diskAngVel = 0;
      }

    } else {
      // DS.INACTIVE — ждём жест
      if (lms && elbowDiskGesture(lms)) {
        diskState = DS.ACTIVE;
        diskHoldFrames = DISK_HOLD;
        drawDisk(elbowDiskGesture(lms));
      }
    }
    // ──────────────────────────────────────────────────────────────────────

    if (lms && skeletonVisible) drawSkeleton(smoothShoulders(lms));
  }

  const pose = new Pose({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });
  pose.setOptions({
    modelComplexity:        1,
    smoothLandmarks:        false, // отключено для нулевой задержки
    enableSegmentation:     false,
    smoothSegmentation:     false,
    minDetectionConfidence: 0.4, // ниже порог = лучше ловит издалека
    minTrackingConfidence:  0.4,
  });
  pose.onResults(onResults);

  let poseBusy = false, handsBusy = false, hTick = 0;
  function loop() {
    if (!poseBusy && video.readyState >= 2) {
      poseBusy = true;
      pose.send({ image: video }).finally(() => { poseBusy = false; });
    }
    // руки каждый 3-й кадр — достаточно для жестов
    if (!handsBusy && video.readyState >= 2 && hTick++ % 3 === 0) {
      handsBusy = true;
      handsModel.send({ image: video }).finally(() => { handsBusy = false; });
    }
    requestAnimationFrame(loop);
  }

  navigator.mediaDevices.getUserMedia({
    video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }
  }).then(stream => {
    video.srcObject = stream;
    video.onloadedmetadata = () => { video.play(); statusEl.textContent = ''; loop(); };
  }).catch(() => { statusEl.textContent = 'Нет доступа к камере'; });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Dance Room — VoidWall</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
    #video {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }
    #canvas {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      z-index: 2;
    }
    #ui { position: fixed; inset: 0; z-index: 10; pointer-events: none; }
    #back {
      position: absolute; top: 18px; left: 18px;
      pointer-events: all;
      color: rgba(255,255,255,0.55);
      font-size: 11px; letter-spacing: 0.08em;
      text-decoration: none;
      background: rgba(0,0,0,0.45);
      padding: 7px 14px; border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(6px);
      transition: color 0.2s, background 0.2s;
    }
    #back:hover { color: #fff; background: rgba(0,0,0,0.65); }
    #label {
      position: absolute; top: 22px; right: 18px;
      font-size: 10px; letter-spacing: 0.3em;
      text-transform: uppercase; color: rgba(255,255,255,0.2);
    }
    #status {
      position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
      font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
      color: rgba(255,255,255,0.35); white-space: nowrap;
    }
    #toggleSkeleton {
      position: absolute; bottom: 28px; right: 18px;
      pointer-events: all;
      color: rgba(255,255,255,0.55);
      font-size: 11px; letter-spacing: 0.08em;
      background: rgba(0,0,0,0.45);
      padding: 7px 14px; border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(6px);
      cursor: pointer;
      transition: color 0.2s, background 0.2s;
      user-select: none;
    }
    #toggleSkeleton:hover { color: #fff; background: rgba(0,0,0,0.65); }
    #toggleSkeleton.hidden { color: rgba(255,255,255,0.25); border-color: rgba(255,255,255,0.06); }
  </style>
</head>
<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<div id="ui">
  <a id="back" href="../vr/">← назад</a>
  <span id="label">Dance Room</span>
  <div id="status">Загрузка...</div>
  <button id="toggleSkeleton">скелет</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
<script>
  const video    = document.getElementById('video');
  const canvas   = document.getElementById('canvas');
  const ctx      = canvas.getContext('2d');
  const statusEl = document.getElementById('status');

  let skeletonVisible = true;
  const toggleBtn = document.getElementById('toggleSkeleton');
  toggleBtn.addEventListener('click', () => {
    skeletonVisible = !skeletonVisible;
    toggleBtn.classList.toggle('hidden', !skeletonVisible);
  });

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  function lx(lms, i) { return (1 - lms[i].x) * canvas.width; }
  function ly(lms, i) { return lms[i].y * canvas.height; }
  function lv(lms, i) { return lms[i].visibility ?? 0; }

  // Сглаживание только для плеч (11, 12) — руки без задержки, плечи стабильны
  const SHOULDER_IDS = [11, 12];
  const shoulderBuf = {};
  const SHOULDER_ALPHA = 0.25;
  SHOULDER_IDS.forEach(id => { shoulderBuf[id] = null; });

  function smoothShoulders(lms) {
    SHOULDER_IDS.forEach(id => {
      const l = lms[id];
      const v = l.visibility ?? 0;
      if (!shoulderBuf[id]) {
        shoulderBuf[id] = { x: l.x, y: l.y, visibility: v };
      } else {
        shoulderBuf[id].x          += (l.x - shoulderBuf[id].x) * SHOULDER_ALPHA;
        shoulderBuf[id].y          += (l.y - shoulderBuf[id].y) * SHOULDER_ALPHA;
        shoulderBuf[id].visibility += (v   - shoulderBuf[id].visibility) * SHOULDER_ALPHA;
      }
      lms[id] = shoulderBuf[id];
    });
    return lms;
  }

  // Вычисляет виртуальную точку — макушку головы (выше носа)
  function crownPoint(lms) {
    const nose    = lms[0];
    // среднее по двум глазам для стабильности
    const eyeY    = (lms[2].y + lms[5].y) * 0.5;
    const eyeVis  = Math.min(lms[2].visibility ?? 0, lms[5].visibility ?? 0);
    const noseToEye = nose.y - eyeY;            // >0 нос ниже глаз
    return {
      x:          nose.x,
      y:          nose.y - noseToEye * 2.2,     // экстраполируем вверх
      visibility: Math.min(nose.visibility ?? 0, eyeVis),
    };
  }

  // Центр ладони: среднее запястья + указательного + мизинца
  function palmPoint(lms, wrist, index, pinky) {
    const vw = lms[wrist].visibility ?? 0;
    const vi = lms[index].visibility ?? 0;
    const vp = lms[pinky].visibility ?? 0;
    const vis = Math.min(vw, Math.max(vi, vp));
    // если пальцы не видны — смещаем от запястья в направлении index finger
    const sx = (lms[wrist].x * 0.5 + lms[index].x * 0.35 + lms[pinky].x * 0.15);
    const sy = (lms[wrist].y * 0.5 + lms[index].y * 0.35 + lms[pinky].y * 0.15);
    return { x: sx, y: sy, visibility: vis };
  }

  const SEGMENTS = [
    { color: '#a78bfa', pairs: [[0,1],[1,2],[2,3],[3,7],[0,4],[4,5],[5,6],[6,8],[9,10]] },
    { color: '#ffffff', pairs: [[11,12],[11,23],[12,24],[23,24]] },
    { color: '#ff2d55', pairs: [[11,13],[13,15],[12,14],[14,16]] },
    { color: '#30d5c8', pairs: [[23,25],[25,27],[24,26],[26,28]] },
    { color: '#ff9f0a', pairs: [[15,17],[15,19],[17,19],[16,18],[16,20],[18,20]] },
    { color: '#32d74b', pairs: [[27,29],[29,31],[27,31],[28,30],[30,32],[28,32]] },
  ];
  const BIG_JOINTS = new Set([11,12,15,16,23,24,27,28]);
  const VIS_MIN = 0.25; // порог ниже которого не рисуем (снижен для дальних планов)

  function drawMarker(x, y, r, color, alpha) {
    ctx.save();
    ctx.globalAlpha  = alpha;
    ctx.shadowBlur   = 18;
    ctx.shadowColor  = color;
    ctx.strokeStyle  = color;
    ctx.lineWidth    = 2;
    // внешнее кольцо
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.stroke();
    // внутренняя точка
    ctx.fillStyle = '#fff';
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(x, y, r * 0.35, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawSkeleton(lms) {
    const crown     = crownPoint(lms);
    const leftPalm  = palmPoint(lms, 15, 19, 17);
    const rightPalm = palmPoint(lms, 16, 20, 18);

    ctx.save();
    ctx.lineCap   = 'round';
    ctx.lineWidth = 3;

    SEGMENTS.forEach(({ color, pairs }) => {
      ctx.strokeStyle = color;
      ctx.shadowColor = color;
      ctx.shadowBlur  = 10;
      pairs.forEach(([a, b]) => {
        const va = lv(lms, a), vb = lv(lms, b);
        if (va < VIS_MIN || vb < VIS_MIN) return;
        ctx.globalAlpha = Math.min(va, vb);
        ctx.beginPath();
        ctx.moveTo(lx(lms, a), ly(lms, a));
        ctx.lineTo(lx(lms, b), ly(lms, b));
        ctx.stroke();
      });
    });

    // Суставы
    ctx.fillStyle   = '#fff';
    ctx.shadowColor = '#fff';
    ctx.shadowBlur  = 12;
    for (let i = 0; i < lms.length; i++) {
      const v = lv(lms, i);
      if (v < VIS_MIN) continue;
      ctx.globalAlpha = v;
      ctx.beginPath();
      ctx.arc(lx(lms, i), ly(lms, i), BIG_JOINTS.has(i) ? 5 : 3, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.restore();

    // Макушка головы
    if (crown.visibility > VIS_MIN) {
      const cx = (1 - crown.x) * canvas.width;
      const cy = crown.y * canvas.height;
      drawMarker(cx, cy, 10, '#a78bfa', crown.visibility);
    }

    // Ладони
    if (leftPalm.visibility > VIS_MIN) {
      const px = (1 - leftPalm.x) * canvas.width;
      const py = leftPalm.y * canvas.height;
      drawMarker(px, py, 12, '#ff9f0a', leftPalm.visibility);
    }
    if (rightPalm.visibility > VIS_MIN) {
      const px = (1 - rightPalm.x) * canvas.width;
      const py = rightPalm.y * canvas.height;
      drawMarker(px, py, 12, '#ff9f0a', rightPalm.visibility);
    }
  }

  // ── Диск ──────────────────────────────────────────────────────────────────
  let diskAngle    = 0;
  let diskDir      = 1;     // направление вращения
  let lastArmAngle = null;
  let diskAngVel   = 0;     // сглаженная угловая скорость (рад/кадр)
  let diskScale    = 1;
  let diskBright   = 0;
  let diskBaseR    = 0;     // запоминаем радиус для продолжения спина
  let diskEx = 0, diskEy = 0;

  // частицы: { x, y, vx, vy, life, maxLife, r, hue }
  const diskParts = [];

  // Жест: правый локоть отведён в сторону
  function elbowDiskGesture(lms) {
    const vs = lv(lms, 12), ve = lv(lms, 14), vw = lv(lms, 16);
    if (vs < 0.4 || ve < 0.4 || vw < 0.4) return null;
    const sx = lx(lms, 12), sy = ly(lms, 12);
    const ex = lx(lms, 14), ey = ly(lms, 14);
    const dx = ex - sx, dy = Math.abs(ey - sy);
    const shoulderW = Math.abs(lx(lms, 11) - lx(lms, 12));
    if (dx < shoulderW * 0.7) return null;
    if (dy > dx * 0.55)       return null;
    return { ex, ey, wx: lx(lms, 16), wy: ly(lms, 16) };
  }

  function spawnDiskParticles(ex, ey, displayR) {
    const speed = diskAngVel;
    // базовый поток частиц + бонус за скорость
    const count = 3 + Math.floor(speed / 0.008);
    for (let i = 0; i < count; i++) {
      // спавним по всей площади диска, не только на краю
      const frac   = 0.4 + Math.random() * 0.7; // 40–110% радиуса
      const a      = Math.random() * Math.PI * 2;
      const r      = displayR * frac;
      const tang   = a + diskDir * Math.PI / 2;
      const spd    = 0.8 + speed * 80 * frac + Math.random() * 1.5;
      diskParts.push({
        x: ex + Math.cos(a) * r,
        y: ey + Math.sin(a) * r,
        vx: Math.cos(tang) * spd * 0.55 + Math.cos(a) * spd * 0.45,
        vy: Math.sin(tang) * spd * 0.55 + Math.sin(a) * spd * 0.45,
        life: 1,
        maxLife: 50 + Math.random() * 60,
        r: 1.8 + Math.random() * 3,
        hue: 180 + Math.random() * 70,
      });
    }
  }

  function updateDiskParticles() {
    ctx.save();
    for (let i = diskParts.length - 1; i >= 0; i--) {
      const p = diskParts[i];
      p.x  += p.vx; p.y += p.vy;
      p.vx *= 0.93; p.vy *= 0.93;
      p.life -= 1 / p.maxLife;
      if (p.life <= 0) { diskParts.splice(i, 1); continue; }
      const alpha = p.life * p.life;
      ctx.globalAlpha = alpha * 0.85;
      ctx.shadowBlur  = 10;
      ctx.shadowColor = `hsl(${p.hue},100%,72%)`;
      ctx.fillStyle   = `hsl(${p.hue},100%,${72 + (1 - p.life) * 18}%)`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * (0.5 + p.life * 0.5), 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  // Диск продолжает спин на каждом rAF-кадре независимо от позы
  function tickDisk() {
    if (diskAngVel < 0.0005) return;
    diskAngle  += diskAngVel * diskDir;
    diskAngVel *= 0.97; // инерция: медленно затухает без жеста
    const displayR = diskBaseR * diskScale;
    if (diskAngVel > 0.003 && diskBaseR > 0) {
      spawnDiskParticles(diskEx, diskEy, displayR);
    }
    renderDiskShape(diskEx, diskEy, displayR);
  }

  function renderDiskShape(ex, ey, displayR) {
    if (displayR < 10) return;
    ctx.save();
    ctx.translate(ex, ey);
    ctx.rotate(diskAngle);

    // слой 1: широкое мягкое свечение за пределами диска
    const glow = ctx.createRadialGradient(0, 0, displayR * 0.1, 0, 0, displayR * 1.6);
    glow.addColorStop(0,   `rgba(60,160,255,${0.12 + diskBright * 0.18})`);
    glow.addColorStop(0.5, `rgba(40,100,255,${0.06 + diskBright * 0.10})`);
    glow.addColorStop(1,   'rgba(20,60,255,0)');
    ctx.globalAlpha = 1;
    ctx.fillStyle   = glow;
    ctx.beginPath();
    ctx.arc(0, 0, displayR * 1.6, 0, Math.PI * 2);
    ctx.fill();

    // слой 2: основное тело диска — мягкий градиент, нет жёсткого края
    const body = ctx.createRadialGradient(0, 0, 0, 0, 0, displayR);
    body.addColorStop(0,    `rgba(120,220,255,${0.5 + diskBright * 0.4})`);
    body.addColorStop(0.35, `rgba(80,180,255,${0.3 + diskBright * 0.3})`);
    body.addColorStop(0.70, `rgba(50,120,255,${0.12 + diskBright * 0.18})`);
    body.addColorStop(1,    'rgba(20,60,255,0)');
    ctx.fillStyle = body;
    ctx.beginPath();
    ctx.arc(0, 0, displayR, 0, Math.PI * 2);
    ctx.fill();

    // слой 3: спицы — только прозрачные полосы (нет жёстких линий)
    const SPOKES = 8;
    for (let k = 0; k < SPOKES; k++) {
      const a   = (k / SPOKES) * Math.PI * 2;
      const hot = k === 0;
      const spokeAlpha = hot
        ? 0.55 + diskBright * 0.35
        : 0.04 + diskBright * 0.08;
      // рисуем как очень мягкий линейный градиент
      const gx1 = Math.cos(a) * displayR, gy1 = Math.sin(a) * displayR;
      const sg = ctx.createLinearGradient(0, 0, gx1, gy1);
      sg.addColorStop(0,   `rgba(255,255,255,${spokeAlpha})`);
      sg.addColorStop(0.6, `rgba(160,220,255,${spokeAlpha * 0.5})`);
      sg.addColorStop(1,   'rgba(80,160,255,0)');
      ctx.globalAlpha = 1;
      ctx.strokeStyle = sg;
      ctx.lineWidth   = hot ? 3 + diskBright * 3 : 1.5;
      ctx.shadowBlur  = hot ? 14 + diskBright * 16 : 0;
      ctx.shadowColor = '#50c8ff';
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(gx1, gy1);
      ctx.stroke();
    }

    // хаб
    ctx.globalAlpha = 1;
    const hub = ctx.createRadialGradient(0, 0, 0, 0, 0, 10 + diskBright * 12);
    hub.addColorStop(0,   `rgba(255,255,255,${0.9 + diskBright * 0.1})`);
    hub.addColorStop(0.4, `rgba(160,230,255,0.7)`);
    hub.addColorStop(1,   'rgba(80,180,255,0)');
    ctx.shadowColor = '#80dfff';
    ctx.shadowBlur  = 20 + diskBright * 25;
    ctx.fillStyle   = hub;
    ctx.beginPath();
    ctx.arc(0, 0, 10 + diskBright * 12, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  function drawDisk(g) {
    const { ex, ey, wx, wy } = g;
    const baseR = Math.hypot(wx - ex, wy - ey);
    if (baseR < 20) return;

    diskEx = ex; diskEy = ey; diskBaseR = baseR;

    const armAngle = Math.atan2(wy - ey, wx - ex);
    let delta = 0;
    if (lastArmAngle !== null) {
      delta = armAngle - lastArmAngle;
      if (delta >  Math.PI) delta -= 2 * Math.PI;
      if (delta < -Math.PI) delta += 2 * Math.PI;
    }
    lastArmAngle = armAngle;

    if (Math.abs(delta) > 0.001) diskDir = Math.sign(delta);

    // тяжёлая инерция: скорость медленно набирается и медленно гасится
    diskAngVel  = diskAngVel * 0.90 + Math.abs(delta) * 0.10;
    diskAngle  += diskAngVel * diskDir;

    const t    = Math.min(diskAngVel / 0.09, 1);
    diskScale  += (1 + t * 2.6 - diskScale) * 0.06;
    diskBright += (t - diskBright)           * 0.06;

    const displayR = baseR * diskScale;
    if (diskAngVel > 0.002) spawnDiskParticles(ex, ey, displayR);
    renderDiskShape(ex, ey, displayR);
  }

  function onResults(results) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    updateDiskParticles();

    const lms = results.poseLandmarks;
    if (!lms) return;

    const g = elbowDiskGesture(lms);
    if (g) {
      drawDisk(g);
    } else {
      lastArmAngle = null;
      diskScale  += (1        - diskScale) * 0.05;
      diskBright += (0        - diskBright) * 0.05;
      tickDisk(); // диск продолжает крутиться по инерции
    }

    if (skeletonVisible) drawSkeleton(smoothShoulders(lms));
  }

  const pose = new Pose({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });
  pose.setOptions({
    modelComplexity:        1,
    smoothLandmarks:        false, // отключено для нулевой задержки
    enableSegmentation:     false,
    smoothSegmentation:     false,
    minDetectionConfidence: 0.4, // ниже порог = лучше ловит издалека
    minTrackingConfidence:  0.4,
  });
  pose.onResults(onResults);

  let busy = false;
  function loop() {
    if (!busy && video.readyState >= 2) {
      busy = true;
      pose.send({ image: video }).finally(() => { busy = false; });
    }
    requestAnimationFrame(loop);
  }

  navigator.mediaDevices.getUserMedia({
    video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }
  }).then(stream => {
    video.srcObject = stream;
    video.onloadedmetadata = () => { video.play(); statusEl.textContent = ''; loop(); };
  }).catch(() => { statusEl.textContent = 'Нет доступа к камере'; });
</script>
</body>
</html>

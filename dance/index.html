<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Dance Room — VoidWall</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
    #video {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }
    #canvas {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      z-index: 2;
    }
    #ui { position: fixed; inset: 0; z-index: 10; pointer-events: none; }
    #back {
      position: absolute; top: 18px; left: 18px;
      pointer-events: all;
      color: rgba(255,255,255,0.55);
      font-size: 11px; letter-spacing: 0.08em;
      text-decoration: none;
      background: rgba(0,0,0,0.45);
      padding: 7px 14px; border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(6px);
      transition: color 0.2s, background 0.2s;
    }
    #back:hover { color: #fff; background: rgba(0,0,0,0.65); }
    #label {
      position: absolute; top: 22px; right: 18px;
      font-size: 10px; letter-spacing: 0.3em;
      text-transform: uppercase; color: rgba(255,255,255,0.2);
    }
    #status {
      position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
      font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
      color: rgba(255,255,255,0.35); white-space: nowrap;
    }
  </style>
</head>
<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<div id="ui">
  <a id="back" href="../vr/">← назад</a>
  <span id="label">Dance Room</span>
  <div id="status">Загрузка...</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
<script>
  const video    = document.getElementById('video');
  const canvas   = document.getElementById('canvas');
  const ctx      = canvas.getContext('2d');
  const statusEl = document.getElementById('status');

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  function lx(lms, i) { return (1 - lms[i].x) * canvas.width; }
  function ly(lms, i) { return lms[i].y * canvas.height; }
  function lv(lms, i) { return lms[i].visibility ?? 0; }

  // Сглаживание только для плеч (11, 12) — руки без задержки, плечи стабильны
  const SHOULDER_IDS = [11, 12];
  const shoulderBuf = {};
  const SHOULDER_ALPHA = 0.25;
  SHOULDER_IDS.forEach(id => { shoulderBuf[id] = null; });

  function smoothShoulders(lms) {
    SHOULDER_IDS.forEach(id => {
      const l = lms[id];
      const v = l.visibility ?? 0;
      if (!shoulderBuf[id]) {
        shoulderBuf[id] = { x: l.x, y: l.y, visibility: v };
      } else {
        shoulderBuf[id].x          += (l.x - shoulderBuf[id].x) * SHOULDER_ALPHA;
        shoulderBuf[id].y          += (l.y - shoulderBuf[id].y) * SHOULDER_ALPHA;
        shoulderBuf[id].visibility += (v   - shoulderBuf[id].visibility) * SHOULDER_ALPHA;
      }
      lms[id] = shoulderBuf[id];
    });
    return lms;
  }

  // Вычисляет виртуальную точку — макушку головы (выше носа)
  function crownPoint(lms) {
    const nose    = lms[0];
    // среднее по двум глазам для стабильности
    const eyeY    = (lms[2].y + lms[5].y) * 0.5;
    const eyeVis  = Math.min(lms[2].visibility ?? 0, lms[5].visibility ?? 0);
    const noseToEye = nose.y - eyeY;            // >0 нос ниже глаз
    return {
      x:          nose.x,
      y:          nose.y - noseToEye * 2.2,     // экстраполируем вверх
      visibility: Math.min(nose.visibility ?? 0, eyeVis),
    };
  }

  // Центр ладони: среднее запястья + указательного + мизинца
  function palmPoint(lms, wrist, index, pinky) {
    const vw = lms[wrist].visibility ?? 0;
    const vi = lms[index].visibility ?? 0;
    const vp = lms[pinky].visibility ?? 0;
    const vis = Math.min(vw, Math.max(vi, vp));
    // если пальцы не видны — смещаем от запястья в направлении index finger
    const sx = (lms[wrist].x * 0.5 + lms[index].x * 0.35 + lms[pinky].x * 0.15);
    const sy = (lms[wrist].y * 0.5 + lms[index].y * 0.35 + lms[pinky].y * 0.15);
    return { x: sx, y: sy, visibility: vis };
  }

  const SEGMENTS = [
    { color: '#a78bfa', pairs: [[0,1],[1,2],[2,3],[3,7],[0,4],[4,5],[5,6],[6,8],[9,10]] },
    { color: '#ffffff', pairs: [[11,12],[11,23],[12,24],[23,24]] },
    { color: '#ff2d55', pairs: [[11,13],[13,15],[12,14],[14,16]] },
    { color: '#30d5c8', pairs: [[23,25],[25,27],[24,26],[26,28]] },
    { color: '#ff9f0a', pairs: [[15,17],[15,19],[17,19],[16,18],[16,20],[18,20]] },
    { color: '#32d74b', pairs: [[27,29],[29,31],[27,31],[28,30],[30,32],[28,32]] },
  ];
  const BIG_JOINTS = new Set([11,12,15,16,23,24,27,28]);
  const VIS_MIN = 0.25; // порог ниже которого не рисуем (снижен для дальних планов)

  function drawMarker(x, y, r, color, alpha) {
    ctx.save();
    ctx.globalAlpha  = alpha;
    ctx.shadowBlur   = 18;
    ctx.shadowColor  = color;
    ctx.strokeStyle  = color;
    ctx.lineWidth    = 2;
    // внешнее кольцо
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.stroke();
    // внутренняя точка
    ctx.fillStyle = '#fff';
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(x, y, r * 0.35, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function drawSkeleton(lms) {
    const crown     = crownPoint(lms);
    const leftPalm  = palmPoint(lms, 15, 19, 17);
    const rightPalm = palmPoint(lms, 16, 20, 18);

    ctx.save();
    ctx.lineCap   = 'round';
    ctx.lineWidth = 3;

    SEGMENTS.forEach(({ color, pairs }) => {
      ctx.strokeStyle = color;
      ctx.shadowColor = color;
      ctx.shadowBlur  = 10;
      pairs.forEach(([a, b]) => {
        const va = lv(lms, a), vb = lv(lms, b);
        if (va < VIS_MIN || vb < VIS_MIN) return;
        ctx.globalAlpha = Math.min(va, vb);
        ctx.beginPath();
        ctx.moveTo(lx(lms, a), ly(lms, a));
        ctx.lineTo(lx(lms, b), ly(lms, b));
        ctx.stroke();
      });
    });

    // Суставы
    ctx.fillStyle   = '#fff';
    ctx.shadowColor = '#fff';
    ctx.shadowBlur  = 12;
    for (let i = 0; i < lms.length; i++) {
      const v = lv(lms, i);
      if (v < VIS_MIN) continue;
      ctx.globalAlpha = v;
      ctx.beginPath();
      ctx.arc(lx(lms, i), ly(lms, i), BIG_JOINTS.has(i) ? 5 : 3, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.restore();

    // Макушка головы
    if (crown.visibility > VIS_MIN) {
      const cx = (1 - crown.x) * canvas.width;
      const cy = crown.y * canvas.height;
      drawMarker(cx, cy, 10, '#a78bfa', crown.visibility);
    }

    // Ладони
    if (leftPalm.visibility > VIS_MIN) {
      const px = (1 - leftPalm.x) * canvas.width;
      const py = leftPalm.y * canvas.height;
      drawMarker(px, py, 12, '#ff9f0a', leftPalm.visibility);
    }
    if (rightPalm.visibility > VIS_MIN) {
      const px = (1 - rightPalm.x) * canvas.width;
      const py = rightPalm.y * canvas.height;
      drawMarker(px, py, 12, '#ff9f0a', rightPalm.visibility);
    }
  }

  // ── Диск ──────────────────────────────────────────────────────────────────
  let diskAngle    = 0;
  let lastArmAngle = null;
  let diskAngVel   = 0;   // сглаженная угловая скорость (рад/кадр)
  let diskScale    = 1;   // текущий множитель радиуса
  let diskBright   = 0;   // яркость 0–1

  // частицы диска: { x, y, vx, vy, life, maxLife, r, hue }
  const diskParts = [];

  // Жест: правый локоть отведён в сторону (верхнее плечо ~горизонтально)
  function elbowDiskGesture(lms) {
    const vs = lv(lms, 12), ve = lv(lms, 14), vw = lv(lms, 16);
    if (vs < 0.4 || ve < 0.4 || vw < 0.4) return null;
    const sx = lx(lms, 12), sy = ly(lms, 12);
    const ex = lx(lms, 14), ey = ly(lms, 14);
    const dx = ex - sx, dy = Math.abs(ey - sy);
    const shoulderW = Math.abs(lx(lms, 11) - lx(lms, 12));
    if (dx < shoulderW * 0.7) return null;
    if (dy > dx * 0.55)       return null;
    return { ex, ey, wx: lx(lms, 16), wy: ly(lms, 16) };
  }

  function spawnDiskParticles(ex, ey, baseR, displayR, delta) {
    const speed = Math.abs(diskAngVel);
    const count = Math.floor(speed / 0.015) + 1; // больше частиц = быстрее
    const spinDir = Math.sign(delta || 1);
    for (let i = 0; i < count; i++) {
      // случайный угол на краю диска
      const a = Math.random() * Math.PI * 2;
      const r = displayR * (0.85 + Math.random() * 0.2);
      const px = ex + Math.cos(a) * r;
      const py = ey + Math.sin(a) * r;
      // скорость: тангенциальная (по направлению вращения) + разлёт наружу
      const tang = a + spinDir * Math.PI / 2;
      const spd  = 1.5 + speed * 60 + Math.random() * 2;
      diskParts.push({
        x: px, y: py,
        vx: Math.cos(tang) * spd * 0.6 + Math.cos(a) * spd * 0.5,
        vy: Math.sin(tang) * spd * 0.6 + Math.sin(a) * spd * 0.5,
        life: 1,
        maxLife: 40 + Math.random() * 40,
        r: 1.5 + Math.random() * 2.5,
        hue: 185 + Math.random() * 60, // циан→синий→фиолетовый
      });
    }
  }

  function updateDiskParticles() {
    ctx.save();
    ctx.shadowBlur = 8;
    for (let i = diskParts.length - 1; i >= 0; i--) {
      const p = diskParts[i];
      p.x  += p.vx; p.y += p.vy;
      p.vx *= 0.94; p.vy *= 0.94;
      p.life -= 1 / p.maxLife;
      if (p.life <= 0) { diskParts.splice(i, 1); continue; }
      const a = p.life * p.life; // квадратичное затухание
      ctx.globalAlpha = a * 0.9;
      ctx.shadowColor = `hsl(${p.hue},100%,70%)`;
      ctx.fillStyle   = `hsl(${p.hue},100%,${70 + (1 - p.life) * 20}%)`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * p.life + 0.5, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawDisk(g) {
    const { ex, ey, wx, wy } = g;
    const baseR = Math.hypot(wx - ex, wy - ey);
    if (baseR < 20) return;

    // угол предплесья → скорость → масштаб
    const armAngle = Math.atan2(wy - ey, wx - ex);
    let delta = 0;
    if (lastArmAngle !== null) {
      delta = armAngle - lastArmAngle;
      if (delta >  Math.PI) delta -= 2 * Math.PI;
      if (delta < -Math.PI) delta += 2 * Math.PI;
      diskAngle += delta;
    }
    lastArmAngle = armAngle;

    // сглаживаем скорость и плавно двигаем масштаб/яркость
    diskAngVel  = diskAngVel * 0.82 + Math.abs(delta) * 0.18;
    const t     = Math.min(diskAngVel / 0.10, 1); // 0→1 при скорости 0→0.10 рад/кадр
    diskScale  += (1 + t * 2.8 - diskScale)  * 0.08;
    diskBright += (t - diskBright)            * 0.08;

    const displayR = baseR * diskScale;

    // частицы пропорционально скорости
    if (diskAngVel > 0.005) spawnDiskParticles(ex, ey, baseR, displayR, delta);

    ctx.save();
    ctx.translate(ex, ey);
    ctx.rotate(diskAngle);

    // заливка
    const fill = ctx.createRadialGradient(0, 0, 0, 0, 0, displayR);
    const a0 = 0.35 + diskBright * 0.40;
    const a1 = 0.15 + diskBright * 0.25;
    fill.addColorStop(0,    `rgba(80,200,255,${a0})`);
    fill.addColorStop(0.55, `rgba(60,140,255,${a1})`);
    fill.addColorStop(1,    'rgba(40,80,255,0)');
    ctx.globalAlpha = 1;
    ctx.fillStyle   = fill;
    ctx.beginPath();
    ctx.arc(0, 0, displayR, 0, Math.PI * 2);
    ctx.fill();

    // кольцо — ярче и толще со скоростью
    const ringBlur = 20 + diskBright * 35;
    const ringW    =  2 + diskBright *  4;
    ctx.shadowColor = `hsl(${195 + diskBright * 30},100%,70%)`;
    ctx.shadowBlur  = ringBlur;
    ctx.strokeStyle = `rgba(${120 + diskBright * 80|0},210,255,${0.75 + diskBright * 0.25})`;
    ctx.lineWidth   = ringW;
    ctx.beginPath();
    ctx.arc(0, 0, displayR, 0, Math.PI * 2);
    ctx.stroke();

    // спицы
    const SPOKES = 8;
    for (let k = 0; k < SPOKES; k++) {
      const a   = (k / SPOKES) * Math.PI * 2;
      const hot = k === 0;
      ctx.globalAlpha = hot ? 0.85 + diskBright * 0.15 : 0.12 + diskBright * 0.15;
      ctx.strokeStyle = hot ? '#fff' : `rgba(120,210,255,0.6)`;
      ctx.lineWidth   = hot ? 2 + diskBright * 2 : 1;
      ctx.shadowBlur  = hot ? 10 + diskBright * 20 : 0;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(Math.cos(a) * displayR, Math.sin(a) * displayR);
      ctx.stroke();
    }

    // хаб
    ctx.globalAlpha = 1;
    ctx.fillStyle   = '#fff';
    ctx.shadowColor = '#50c8ff';
    ctx.shadowBlur  = 14 + diskBright * 20;
    ctx.beginPath();
    ctx.arc(0, 0, 4 + diskBright * 4, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  function onResults(results) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // частицы живут независимо от жеста
    updateDiskParticles();

    const lms = results.poseLandmarks;
    if (!lms) return;

    const g = elbowDiskGesture(lms);
    if (g) {
      drawDisk(g);
    } else {
      lastArmAngle = null;
      // скорость и масштаб плавно гаснут
      diskAngVel *= 0.88;
      diskScale  += (1 - diskScale) * 0.06;
      diskBright += (0 - diskBright) * 0.06;
    }

    drawSkeleton(smoothShoulders(lms));
  }

  const pose = new Pose({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });
  pose.setOptions({
    modelComplexity:        1,
    smoothLandmarks:        false, // отключено для нулевой задержки
    enableSegmentation:     false,
    smoothSegmentation:     false,
    minDetectionConfidence: 0.4, // ниже порог = лучше ловит издалека
    minTrackingConfidence:  0.4,
  });
  pose.onResults(onResults);

  let busy = false;
  function loop() {
    if (!busy && video.readyState >= 2) {
      busy = true;
      pose.send({ image: video }).finally(() => { busy = false; });
    }
    requestAnimationFrame(loop);
  }

  navigator.mediaDevices.getUserMedia({
    video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }
  }).then(stream => {
    video.srcObject = stream;
    video.onloadedmetadata = () => { video.play(); statusEl.textContent = ''; loop(); };
  }).catch(() => { statusEl.textContent = 'Нет доступа к камере'; });
</script>
</body>
</html>

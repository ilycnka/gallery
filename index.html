<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>VoidWall</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      overflow: hidden;
      background: #ffffff;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      font-family: 'Segoe UI', sans-serif;
    }
    canvas { display: block; }

    #logo {
      position: fixed;
      top: 13%;
      left: 50%;
      transform: translateX(-50%);
      font-size: clamp(40px, 9vw, 88px);
      font-weight: 200;
      color: rgba(0, 0, 0, 0.055);
      letter-spacing: -0.02em;
      pointer-events: none;
      z-index: 10;
      white-space: nowrap;
    }
  </style>
</head>
<body>

<div id="logo">VoidWall</div>

<script src="js/i18n.js?v=2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const isMobile = /Android|iPhone|iPad|iPod|webOS/i.test(navigator.userAgent) || window.innerWidth < 768;
I18N.addToggle('light');

// ─── Сцена ───
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xffffff);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 300);
camera.position.set(0, 0, 9);

const renderer = new THREE.WebGLRenderer({ antialias: !isMobile });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(isMobile ? Math.min(window.devicePixelRatio, 1) : Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

// ─── Волновые частицы ───
const PCOUNT = isMobile ? 8000 : 40000;
const waveGeo = new THREE.BufferGeometry();
const wPos = new Float32Array(PCOUNT * 3);

for (let i = 0; i < PCOUNT; i++) {
  wPos[i*3]   = (Math.random() - 0.5) * 46;
  wPos[i*3+1] = (Math.random() - 0.5) * 30;
  wPos[i*3+2] = (Math.random() - 0.5) * 30 + 9;
}

function makeParticleTex() {
  const c = document.createElement('canvas');
  c.width = c.height = 64;
  const ctx = c.getContext('2d');
  const g = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
  g.addColorStop(0,    'rgba(120,120,120,1)');
  g.addColorStop(0.65, 'rgba(120,120,120,1)');
  g.addColorStop(0.85, 'rgba(120,120,120,0.4)');
  g.addColorStop(1,    'rgba(120,120,120,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, 64, 64);
  return new THREE.CanvasTexture(c);
}

waveGeo.setAttribute('position', new THREE.BufferAttribute(wPos, 3));
scene.add(new THREE.Points(waveGeo, new THREE.PointsMaterial({
  map: makeParticleTex(),
  size: isMobile ? 0.055 : 0.036,
  transparent: true, opacity: 0.55,
  alphaTest: 0.01,
  sizeAttenuation: true, depthWrite: false,
})));

// ─── Текстура надписи ───
function createNavTexture(text, opacity, w, h) {
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const ctx = c.getContext('2d');
  ctx.clearRect(0, 0, w, h);
  let size = Math.round(h * 0.38);
  ctx.font = `100 ${size}px Inter, sans-serif`;
  while (ctx.measureText(text).width > w * 0.92 && size > 8) {
    size -= 1;
    ctx.font = `100 ${size}px Inter, sans-serif`;
  }
  ctx.fillStyle = `rgba(0,0,0,${opacity})`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, w / 2, h / 2);
  return new THREE.CanvasTexture(c);
}

// ─── Треугольник-навигация ───
const R = isMobile ? 1.6 : 2.2;
const CANVAS_W = 512, CANVAS_H = 64;
const LABEL_H  = 0.72, LABEL_W = LABEL_H * CANVAS_W / CANVAS_H;

// Вершины равностороннего треугольника: верх, нижний-левый, нижний-правый
const CORNERS = [
  new THREE.Vector3(0,             R,       0),
  new THREE.Vector3(-R * 0.866, -R * 0.5,  0),
  new THREE.Vector3( R * 0.866, -R * 0.5,  0),
];

const NAV = [
  { i18nKey: 'nav_collections', href: 'collections', corner: 0 },
  { i18nKey: 'nav_about',       href: 'about',       corner: 1 },
  { i18nKey: 'nav_acquire',                           corner: 2 },
];

const triGroup = new THREE.Group();
triGroup.position.z = -2;
triGroup.rotation.x = Math.random() * Math.PI * 2;
triGroup.rotation.y = Math.random() * Math.PI * 2;
scene.add(triGroup);

// Рёбра треугольника
const edgeGeo = new THREE.BufferGeometry().setFromPoints([
  CORNERS[0], CORNERS[1], CORNERS[2], CORNERS[0],
]);
triGroup.add(new THREE.Line(edgeGeo,
  new THREE.LineBasicMaterial({ color: 0x1a1a1a, transparent: true, opacity: 0.18 })));

const navMeshes = [];

NAV.forEach(item => {
  const tex  = createNavTexture(I18N.t(item.i18nKey), 0.72, CANVAS_W, CANVAS_H);
  const mesh = new THREE.Mesh(
    new THREE.PlaneGeometry(LABEL_W, LABEL_H),
    new THREE.MeshBasicMaterial({ map: tex, transparent: true, depthWrite: false, side: THREE.DoubleSide })
  );
  // Сдвиг чуть наружу от вершины
  const v   = CORNERS[item.corner];
  const dir = v.clone().normalize();
  mesh.position.copy(v).addScaledVector(dir, 0.42);
  triGroup.add(mesh);
  navMeshes.push({ mesh, item });
});

function rebuildNavTextures() {
  navMeshes.forEach(({ mesh, item }) => {
    mesh.material.map.dispose();
    mesh.material.map = createNavTexture(I18N.t(item.i18nKey), 0.72, CANVAS_W, CANVAS_H);
    mesh.material.needsUpdate = true;
  });
}
// Перестраиваем текстуры когда шрифты загружены
document.fonts.ready.then(rebuildNavTextures);
// Фолбэк на случай если ready не сработал вовремя
setTimeout(rebuildNavTextures, 800);
window.addEventListener('langchange', rebuildNavTextures);

// ─── Вращение колец ───
let isDragging = false;
let dragPrev   = { x: 0, y: 0 };
let dragDist   = 0;
let rotVelX    = 0, rotVelY = 0;

const mouse       = new THREE.Vector2();
const targetMouse = new THREE.Vector2();
const raycaster   = new THREE.Raycaster();
const _ndc        = new THREE.Vector2();
const navMeshList = navMeshes.map(n => n.mesh);

function toNDC(cx, cy) {
  _ndc.set((cx / window.innerWidth) * 2 - 1, -(cy / window.innerHeight) * 2 + 1);
  return _ndc;
}

function handleTap(cx, cy) {
  raycaster.setFromCamera(toNDC(cx, cy), camera);
  const hit = raycaster.intersectObjects(navMeshList)[0];
  const nav = hit ? navMeshes.find(n => n.mesh === hit.object) : null;
  if (nav?.item.href) window.location.href = nav.item.href;
}

function dragStart(x, y) {
  isDragging = true;
  dragPrev   = { x, y };
  dragDist   = 0;
  rotVelX = rotVelY = 0;
}
function dragMove(x, y) {
  if (!isDragging) return;
  const dx = x - dragPrev.x, dy = y - dragPrev.y;
  dragDist += Math.sqrt(dx * dx + dy * dy);
  rotVelY = dx * 0.009;
  rotVelX = dy * 0.009;
  triGroup.rotation.y += rotVelY;
  triGroup.rotation.x += rotVelX;
  dragPrev = { x, y };
  targetMouse.x =  (x / window.innerWidth)  * 2 - 1;
  targetMouse.y = -(y / window.innerHeight) * 2 + 1;
}
function dragEnd(cx, cy) {
  if (dragDist < 8) handleTap(cx, cy);
  isDragging = false;
}

// Мышь
window.addEventListener('mousedown', e => dragStart(e.clientX, e.clientY));
window.addEventListener('mousemove', e => {
  if (isDragging) {
    dragMove(e.clientX, e.clientY);
  } else {
    targetMouse.x =  (e.clientX / window.innerWidth)  * 2 - 1;
    targetMouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(toNDC(e.clientX, e.clientY), camera);
    const hit = raycaster.intersectObjects(navMeshList)[0];
    renderer.domElement.style.cursor =
      (hit && navMeshes.find(n => n.mesh === hit.object)?.item.href) ? 'pointer' : 'default';
  }
});
window.addEventListener('mouseup',   e => dragEnd(e.clientX, e.clientY));

// Касания
let touchId = null;
window.addEventListener('touchstart', e => {
  const t = e.touches[0];
  touchId = t.identifier;
  dragStart(t.clientX, t.clientY);
}, { passive: true });
window.addEventListener('touchmove', e => {
  for (const t of e.touches) {
    if (t.identifier === touchId) { dragMove(t.clientX, t.clientY); break; }
  }
}, { passive: true });
window.addEventListener('touchend', e => {
  for (const t of e.changedTouches) {
    if (t.identifier === touchId) {
      dragEnd(t.clientX, t.clientY);
      touchId = null;
      break;
    }
  }
}, { passive: true });

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── Анимация ───
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  mouse.x += (targetMouse.x - mouse.x) * 0.04;
  mouse.y += (targetMouse.y - mouse.y) * 0.04;

  // Лёгкое дыхание камеры
  camera.position.z = 9 + Math.sin(t * 0.11) * 3.5;
  camera.position.y =     Math.sin(t * 0.07) * 0.25;
  camera.position.x =     Math.sin(t * 0.09) * 0.15;
  camera.rotation.y = -mouse.x * 0.05;
  camera.rotation.x =  mouse.y * 0.04;

  // Частицы летят на зрителя
  const wp = waveGeo.attributes.position.array;
  for (let i = 0; i < PCOUNT; i++) {
    wp[i*3+2] += 0.108;
    if (wp[i*3+2] > 24) wp[i*3+2] -= 36;
  }
  waveGeo.attributes.position.needsUpdate = true;

  // Инерция вращения треугольника
  if (!isDragging) {
    triGroup.rotation.y += rotVelY;
    triGroup.rotation.x += rotVelX;
    rotVelY *= 0.90;
    rotVelX *= 0.90;
  }

  // Треугольник следует за камерой
  triGroup.position.x = camera.position.x;
  triGroup.position.y = camera.position.y;

  // Надписи всегда смотрят на камеру
  navMeshes.forEach(({ mesh }) => mesh.lookAt(camera.position));

  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
